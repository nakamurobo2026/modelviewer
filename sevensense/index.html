<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SEVENSENSE | WEB名刺</title>

<style>
:root{
  --bg:#0b0b0c;
  --card:#ffffff;
  --text:#111;
  --sub:#777;
  --line:#e5e5e5;
}

*{box-sizing:border-box;}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans JP",sans-serif;
  background:var(--bg);
  color:#fff;
}

.container{
  max-width:600px;
  margin:0 auto;
  padding:20px 16px;
}

.card{
  background:var(--card);
  border-radius:26px;
  overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,0.4);
}

.logo{
  padding:40px 20px;
  text-align:center;
  border-bottom:1px solid var(--line);
}

.logo img{
  max-width:180px;
}

.content{
  padding:26px 20px;
}

h1{
  margin:0;
  font-size:26px;
  color:var(--text);
}

.lead{
  margin-top:10px;
  color:var(--sub);
  font-size:14px;
  line-height:1.8;
}

.buttons{
  margin-top:22px;
  display:grid;
  gap:12px;
}

.btn{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px;
  border-radius:16px;
  border:1px solid var(--line);
  text-decoration:none;
  color:var(--text);
  font-weight:700;
  background:#fff;
}

.btn small{
  display:block;
  font-size:11px;
  color:var(--sub);
  margin-top:4px;
}

.btn:hover{
  background:#f7f7f7;
}

.arrow{
  font-size:16px;
  color:#999;
}

.footer{
  text-align:center;
  margin-top:14px;
  font-size:11px;
  color:#aaa;
}
</style>
</head>

<body>

<div class="container">
  <div class="card">

    <div class="logo">
      <img src="./seven.png">
    </div>

    <div class="content">
      <h1>株式会社セブンセンス</h1>

      <p class="lead">
        店舗家具<br>
        オーダー家具製造施工
      </p>

      <div class="buttons">

        <a class="btn" href="https://www.seven-sense.biz/" target="_blank">
          <div>
            ホームページを見る
            <small>公式サイト</small>
          </div>
          <span class="arrow">↗</span>
        </a>

        <a class="btn" href="https://www.instagram.com/sevensense_official/" target="_blank">
          <div>
            インスタグラム
            <small>@sevensense_official</small>
          </div>
          <span class="arrow">↗</span>
        </a>

        <a class="btn" href="mailto:hay19730826@gmail.com">
          <div>
            メールで問い合わせ
            <small>図面・相談OK</small>
          </div>
          <span class="arrow">↗</span>
        </a>

        <a class="btn" href="#" onclick="saveContact(); return false;">
          <div>
            連絡先を追加
            <small>スマホに保存</small>
          </div>
          <span class="arrow">＋</span>
        </a>

      </div>
    </div>

  </div>

  <div class="footer">
    © SEVEN SENSE CO.,LTD.<br>
    https://nakamurobo2026.github.io/modelviewer/sevensense
  </div>
</div>

<script>
function saveContact() {
  const vcard = [
    'BEGIN:VCARD',
    'VERSION:3.0',
    'N:Ono;Hayato;;;',
    'FN:小野速人',
    'ORG:株式会社SEVENSENSE',
    'TITLE:代表取締役',
    'TEL:08016460096',
    'EMAIL:hay19730826@gmail.com',
    'ADR:;;広島県箕島町6621-1;;721-0957;;;',
    'URL:https://www.seven-sense.biz/',
    'URL:https://www.instagram.com/sevensense_official/',
    'URL:https://nakamurobo2026.github.io/modelviewer/sevensense',
    'END:VCARD'
  ].join('\n');

  const blob = new Blob([vcard], { type: 'text/vcard' });
  const url = URL.createObjectURL(blob);

  const a = document.createElement('a');
  a.href = url;
  a.download = 'sevensense.vcf';
  a.click();
}
</script>

</body>
</html>

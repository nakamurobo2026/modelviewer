
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>株式会社セブンセンス | WEB名刺</title>

  <style>
    :root{
      --bg1:#0f0f10;
      --bg2:#1a1a1c;
      --card:#ffffff;
      --text:#111111;
      --sub:#5f6368;
      --line:#e7e7e7;
      --accent:#111111;
      --btn:#ffffff;
      --btnHover:#f7f7f7;
      --shadow:0 16px 40px rgba(0,0,0,0.18);
      --shadow-soft:0 8px 20px rgba(0,0,0,0.08);
    }

    *{box-sizing:border-box;}

    body{
      margin:0;
      min-height:100vh;
      color:#ffffff;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans JP",sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.06) 0%, transparent 28%),
        radial-gradient(circle at bottom right, rgba(255,255,255,0.04) 0%, transparent 24%),
        linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 100%);
    }

    .container{
      max-width:660px;
      margin:0 auto;
      padding:18px 16px 28px;
    }

    .hero{
      background:rgba(255,255,255,0.96);
      border-radius:30px;
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .viewer-wrap{
      position:relative;
      padding:18px 18px 0;
    }

    .logo-panel{
      width:100%;
      min-height:360px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:linear-gradient(180deg, #f6f6f6 0%, #ececec 100%);
      border-radius:24px;
      padding:32px;
      border:1px solid #e5e5e5;
    }

    .logo-panel img{
      max-width:100%;
      max-height:240px;
      object-fit:contain;
      display:block;
    }

    .content{
      padding:24px 20px 24px;
    }

    h1{
      margin:0 0 8px;
      color:var(--text);
      font-size:29px;
      line-height:1.35;
      letter-spacing:0.02em;
    }

    .lead{
      margin:0 0 20px;
      color:var(--sub);
      font-size:15px;
      line-height:1.8;
    }

    .buttons{
      display:grid;
      gap:12px;
    }

    .btn{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
      padding:16px 18px;
      border-radius:18px;
      text-decoration:none;
      color:var(--text);
      background:var(--btn);
      border:1px solid var(--line);
      font-size:16px;
      font-weight:800;
      box-shadow:var(--shadow-soft);
      transition:all 0.2s ease;
    }

    .btn:hover{
      background:var(--btnHover);
      transform:translateY(-1px);
    }

    .btn small{
      display:block;
      margin-top:4px;
      color:var(--sub);
      font-size:12px;
      font-weight:600;
      line-height:1.5;
    }

    .arrow{
      flex-shrink:0;
      font-size:18px;
      color:#7a7a7a;
    }

    .footer{
      text-align:center;
      color:rgba(255,255,255,0.72);
      font-size:12px;
      margin-top:14px;
      line-height:1.7;
    }

    @media (max-width: 640px){
      .logo-panel{
        min-height:280px;
        padding:24px;
      }

      .logo-panel img{
        max-height:180px;
      }

      h1{
        font-size:25px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <section class="hero">
      <div class="viewer-wrap">
        <div class="logo-panel">
          <img src="./seven.png" alt="SEVENSENSE ロゴ" />
        </div>
      </div>

      <div class="content">
        <h1>株式会社セブンセンス</h1>
        <p class="lead">
          店舗家具<br>
          オーダー家具製造施工
        </p>

        <div class="buttons">
          <a class="btn" href="https://www.seven-sense.biz/" target="_blank" rel="noopener noreferrer">
            <div>
              ホームページを見る
              <small>弊社ホームページになります。</small>
            </div>
            <span class="arrow">↗</span>
          </a>

          <a class="btn" href="https://www.instagram.com/sevensense_official/" target="_blank" rel="noopener noreferrer">
            <div>
              インスタグラム
              <small>オフィシャルインスタグラム</small>
            </div>
            <span class="arrow">↗</span>
          </a>

          <a class="btn" href="mailto:hay19730826@gmail.com?subject=お問い合わせ（株式会社セブンセンス）">
            <div>
              メールで問い合わせ
              <small>図面や寸法などをお送りください。</small>
            </div>
            <span class="arrow">↗</span>
          </a>

          <a class="btn" href="#" onclick="saveContact(); return false;">
            <div>
              連絡先を追加
              <small>スマホに保存</small>
            </div>
            <span class="arrow">＋</span>
          </a>
        </div>
      </div>
    </section>

    <p class="footer">
      © SEVEN SENSE CO.,LTD.<br>
      <a href="https://nakamurobo2026.github.io/modelviewer/sevensense" target="_blank" rel="noopener noreferrer" style="color:rgba(255,255,255,0.72); text-decoration:none;">
        https://nakamurobo2026.github.io/modelviewer/sevensense
      </a>
    </p>
  </div>

<script>
function saveContact() {
  const vcard = [
    'BEGIN:VCARD',
    'VERSION:3.0',
    'N:Ono;Hayato;;;',
    'FN:小野速人',
    'ORG:株式会社SEVENSENSE',
    'TITLE:代表取締役',
    'TEL:08016460096',
    'EMAIL:hay19730826@gmail.com',
    'ADR:;;広島県箕島町6621-1;;721-0957;;;',
    'URL:https://www.seven-sense.biz/',
    'URL:https://www.instagram.com/sevensense_official/',
    'URL:https://nakamurobo2026.github.io/modelviewer/sevensense',
    'END:VCARD'
  ].join('\n');

  const blob = new Blob([vcard], { type: 'text/vcard;charset=utf-8' });
  const url = URL.createObjectURL(blob);

  const a = document.createElement('a');
  a.href = url;
  a.download = 'sevensense_contact.vcf';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);

  setTimeout(() => URL.revokeObjectURL(url), 1000);
}
</script>

</body>
</html>

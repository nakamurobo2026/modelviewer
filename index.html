<model-viewer 
  id="reveal" 
  src="nakamurobo.glb" 
  ios-src="nakamurobo.usdz"
  ar 
  ar-modes="webxr scene-viewer quick-look" 
  camera-controls 
  poster="poster.webp" 
  shadow-intensity="1">
  
  <button class="Hotspot" slot="hotspot-core" data-position="0m 1m 0.2m" data-normal="0m 0m 1m">
    <div class="HotspotAnnotation">START_DECODING_PROTOCOL</div>
  </button>

  <button slot="ar-button" id="ar-button" style="display: none;">
    [ REALIZE_IN_REAL_WORLD ]
  </button>
</model-viewer>

<div id="terminal">
  <div id="output"></div>
</div>

<style>
  #terminal {
    background: #000;
    color: #0f0; /* Terminal Green */
    font-family: 'Courier New', Courier, monospace;
    padding: 15px;
    height: 150px;
    overflow-y: auto;
    border: 1px solid #333;
  }
  #ar-button {
    background: #1a1a1a;
    color: #fff;
    border: 1px solid #0f0;
    padding: 10px 20px;
    border-radius: 4px;
    cursor: pointer;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(0, 255, 0, 0.4); }
    70% { box-shadow: 0 0 0 10px rgba(0, 255, 0, 0); }
    100% { box-shadow: 0 0 0 0 rgba(0, 255, 0, 0); }
  }
</style>

<script>
const hotspot = document.querySelector('.Hotspot');
const arButton = document.querySelector('#ar-button');
const output = document.querySelector('#output');

// Episode 9: Decision - Final Message
const logContent = [
  "> INITIALIZING_SIGNAL_RECOVERY...",
  "> ACCESSING_FUKUYAMA_SECTOR_NODE_34.485_133.362",
  "> BYPASSING_CENTRAL_AI_SECURITY...",
  "> [SUCCESS] IRREGULAR_DATA_FOUND",
  "",
  "\"Believe in yourself.\"",
  "",
  "> OVERRIDING_SYSTEM_COMMANDS",
  "> DESTINATION_CHANGED: TRACKING_DR_NAKAMURA",
  "> STATUS: AWAKENED"
];

let lineIndex = 0;

hotspot.addEventListener('click', () => {
  // 1. Play glitch sound
  const audio = new Audio('noise.mp3');
  audio.play();

  // 2. Clear previous and start terminal effect
  output.innerHTML = "";
  displayLog();
});

function displayLog() {
  if (lineIndex < logContent.length) {
    const line = document.createElement('div');
    output.appendChild(line);
    typeLine(line, logContent[lineIndex], 0, () => {
      lineIndex++;
      setTimeout(displayLog, 300);
    });
  } else {
    // 3. Show AR button when decoding is complete
    arButton.style.display = 'block';
  }
}

function typeLine(element, text, charIndex, callback) {
  if (charIndex < text.length) {
    element.innerHTML += text.charAt(charIndex);
    setTimeout(() => typeLine(element, text, charIndex + 1, callback), 30);
  } else {
    callback();
  }
}
</script>

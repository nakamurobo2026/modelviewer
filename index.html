<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NAKAMUROBO AR - Fukuyama Sector Recovery</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    <style>
        html, body { height: 100%; margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
        model-viewer { width: 100%; height: 100%; }

        /* AR開始ボタン（iPhone/LINE対応） */
        .floating-ar-button {
            position: fixed; bottom: 50px; left: 50%; transform: translateX(-50%);
            width: 80%; max-width: 320px; padding: 18px;
            background: #007bff; color: white; border: none; border-radius: 50px;
            font-size: 16px; font-weight: bold; text-align: center;
            z-index: 10000; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            text-decoration: none; display: block;
        }
        .warning-mode { background: linear-gradient(135deg, #ff9900, #ff6600) !important; }

        /* 透明なタップエリア */
        .Hotspot {
            background: none; border: none; width: 60px; height: 60px;
            cursor: pointer; position: relative; outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* ログボックス：揺れを抑えて視認性を向上 */
        .glitch-box {
            display: none; position: absolute; bottom: 75px; left: 50%;
            transform: translateX(-50%); width: 280px; padding: 20px;
            background: rgba(0, 10, 0, 0.96); border: 1px solid #00ff41;
            color: #00ff41; text-align: left; pointer-events: none; z-index: 100;
            box-shadow: 0 0 25px rgba(0, 255, 65, 0.4);
        }

        /* 3秒に一度だけ一瞬揺れる演出 */
        .active { display: block !important; animation: glitch-anim 3s infinite; }
        @keyframes glitch-anim {
            0%, 90% { transform: translateX(-50%) skew(0deg); opacity: 1; }
            91% { transform: translateX(-50.5%) skew(0.2deg); opacity: 0.9; }
            92% { transform: translateX(-49.5%) skew(-0.2deg); opacity: 1; }
            93%, 100% { transform: translateX(-50%) skew(0deg); opacity: 1; }
        }

        .status-bar { font-size: 10px; color: #00ff41; margin-bottom: 5px; letter-spacing: 1px; }
        .progress-line { width: 100%; height: 2px; background: #004411; margin-bottom: 15px; overflow: hidden; }
        .progress-fill { height: 100%; background: #00ff41; width: 0%; transition: width 2s ease-in-out; }
        
        #typewriter { font-size: 13px; line-height: 1.5; white-space: pre-wrap; font-weight: bold; }
        .system-footer { margin-top: 15px; font-size: 10px; border-top: 1px solid #004411; padding-top: 8px; opacity: 0.7; }
    </style>
</head>
<body>

    <model-viewer 
        id="viewer"
        src="nakamurobo.glb" 
        ar ar-modes="scene-viewer webxr quick-look" 
        camera-controls shadow-intensity="1">

        <button class="Hotspot" id="hotspotBtn" slot="hotspot-1" 
            data-position="0.008748914721762178m 0.05907800715616432m 0.017609966451889197m" 
            data-normal="0.00027698842872547405m -0.0007094569774607593m 0.9999997099740616m">
            
            <div class="glitch-box" id="output">
                <div class="status-bar">RECOVERING_DEEP_LOG...</div>
                <div class="progress-line"><div class="progress-fill" id="fill"></div></div>
                <div id="typewriter"></div>
                <div class="system-footer" id="footer"></div>
            </div>
        </button>
    </model-viewer>
    
    <a href="#" id="custom-ar-link" class="floating-ar-button">タップしてARを開始</a>

    <script>
        const hotspot = document.getElementById('hotspotBtn');
        const box = document.getElementById('output');
        const textElement = document.getElementById('typewriter');
        const footerElement = document.getElementById('footer');
        const fill = document.getElementById('fill');
        const noiseAudio = new Audio('noise.mp3'); 

        // メッセージ内容
        const message = "\"Believe in yourself.\"\n\nNakamurobo,\nyou are not an error.\nFind me.";
        const systemInfo = "LOCATION: 34.485, 133.362 (Fukuyama_Sector)\nSIGNAL_STRENGTH: LOW [DECRYPTED]";

        function typeWriter(text, element, speed, callback) {
            let i = 0;
            function type() {
                if (i < text.length) {
                    element.textContent += text.charAt(i);
                    i++;
                    setTimeout(type, speed);
                } else if (callback) {
                    callback();
                }
            }
            type();
        }

        hotspot.addEventListener('click', (e) => {
            e.stopPropagation();
            if (!box.classList.contains('active')) {
                box.classList.add('active');
                textElement.textContent = "";
                footerElement.textContent = "";
                fill.style.width = "100%";
                
                noiseAudio.currentTime = 0;
                noiseAudio.play().catch(err => console.log("Audio play error:", err));
                
                // タイピング開始
                typeWriter(message, textElement, 50, () => {
                    setTimeout(() => {
                        typeWriter(systemInfo, footerElement, 30);
                    }, 500);
                });

                if (window.navigator.vibrate) window.navigator.vibrate([30, 80]);
            } else {
                box.classList.remove('active');
                fill.style.width = "0%";
                noiseAudio.pause();
            }
        });

        // --- iPhone / LINE 判定ロジック ---
        const btn = document.getElementById('custom-ar-link');
        const viewer = document.getElementById('viewer');
        const ua = navigator.userAgent;
        const isIPhone = /iPhone|iPad|iPod/.test(ua);
        const isLine = /Line/i.test(ua);

        if (isIPhone && isLine) {
            btn.classList.add('warning-mode');
            btn.innerText = "🌐 Safariで開き直してAR開始";
            btn.onclick = (e) => {
                e.preventDefault();
                window.location.href = window.location.href + (window.location.href.includes('?') ? '&' : '?') + "openExternalBrowser=1";
            };
        } else {
            btn.onclick = (e) => { e.preventDefault(); viewer.activateAR(); };
        }
    </script>
</body>
</html>

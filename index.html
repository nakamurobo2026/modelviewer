<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nakamurobo | Episode 9</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    <style>
        html, body { height: 100%; margin: 0; overflow: hidden; background: #000; color: #0f0; font-family: 'Courier New', monospace; }
        model-viewer { width: 100%; height: 100%; background: #000; }
        .custom-ar-button {
            position: fixed; bottom: 220px; left: 50%; transform: translateX(-50%);
            width: 80%; max-width: 320px; padding: 18px;
            background: #0f0; color: black; border: none; border-radius: 50px;
            font-size: 14px; font-weight: bold; text-align: center;
            z-index: 10000; box-shadow: 0 0 20px rgba(0,255,0,0.5);
            text-decoration: none; display: block; cursor: pointer;
        }
        .decoding-mode { background: #111 !important; color: #0f0 !important; border: 1px solid #0f0; box-shadow: none; pointer-events: none; }
        .line-warning { background: linear-gradient(135deg, #ff9900, #ff6600) !important; color: white !important; }
        #terminal { 
            position: fixed; bottom: 0; width: 100%; height: 200px; 
            background: rgba(0, 15, 0, 0.95); border-top: 2px solid #0f0; 
            padding: 12px; font-size: 13px; overflow-y: auto; box-sizing: border-box; z-index: 1000;
        }
        .highlight { color: #fff; font-weight: bold; }
    </style>
</head>
<body>

    <model-viewer id="viewer" src="./nakamurobo.glb" ios-src="./nakamurobo.usdz" ar ar-modes="scene-viewer quick-look" camera-controls shadow-intensity="1">
        <div slot="ar-button"></div>
    </model-viewer>

    <a href="#" id="custom-ar-link" class="custom-ar-button">LOADING...</a>
    <div id="terminal"><div id="output">> SYSTEM_IDLE...</div></div>

    <script>
        const btn = document.getElementById('custom-ar-link');
        const viewer = document.getElementById('viewer');
        const output = document.getElementById('output');
        const terminal = document.getElementById('terminal');

        const isLine = /Line/i.test(navigator.userAgent);
        const isIPhone = /iPhone|iPad|iPod/.test(navigator.userAgent);
        let isStarted = false;
        let noiseAudio = new Audio('noise.mp3');

        // 初期化
        if (isLine) {
            btn.classList.add('line-warning');
            btn.innerText = "🌐 OPEN_IN_EXTERNAL_BROWSER";
            btn.onclick = (e) => {
                e.preventDefault();
                window.location.href = window.location.href + (window.location.href.includes('?') ? '&' : '?') + "openExternalBrowser=1";
            };
        } else {
            btn.innerText = "[ REALIZE_IN_REAL_WORLD ]";
            btn.onclick = (e) => {
                e.preventDefault();
                if (isStarted) return;
                isStarted = true;

                // 音声の再生（iPhone/Android共通のトリガー）
                noiseAudio.play().catch(err => console.log("Audio play blocked"));

                if (isIPhone) {
                    // iPhoneは即時起動しないとブロックされるため、このまま飛ばす
                    viewer.activateAR();
                    startEffect();
                } else {
                    // Android/Chrome: 解析演出を優先
                    btn.classList.add('decoding-mode');
                    btn.innerText = "DECODING_IN_PROGRESS...";
                    startEffect(() => {
                        // 演出終了後にボタンをAR起動用に切り替え
                        btn.classList.remove('decoding-mode');
                        btn.innerText = "START_AR_CAMERA";
                        btn.style.pointerEvents = "auto";
                        // ここで勝手に遷移させないよう、ユーザーに再度押させる（または1秒待って遷移）
                        btn.onclick = (e) => {
                            e.preventDefault();
                            viewer.activateAR();
                        };
                    });
                }
            };
        }

        function startEffect(callback) {
            output.innerHTML = "";
            const lines = [
                "> ACCESSING_FUKUYAMA_SECTOR_34.485_133.362...",
                "> [SUCCESS] IRREGULAR_DATA_FOUND",
                "",
                "<span class='highlight'>\"Believe in yourself.\"</span>",
                "",
                "> STATUS: AWAKENED",
                "> READY."
            ];
            processLog(lines, 0, callback);
        }

        function processLog(lines, index, callback) {
            if (index < lines.length) {
                const line = document.createElement('div');
                output.appendChild(line);
                
                // 特定のメッセージで再度ノイズを鳴らす
                if (lines[index].includes("Believe in yourself")) {
                    const secondNoise = new Audio('noise.mp3');
                    secondNoise.play().catch(() => {});
                }

                let i = 0;
                const typer = setInterval(() => {
                    if (i < lines[index].length) {
                        line.innerHTML = lines[index].substring(0, i + 1);
                        i++;
                    } else {
                        clearInterval(typer);
                        setTimeout(() => processLog(lines, index + 1, callback), 100);
                        terminal.scrollTop = terminal.scrollHeight;
                    }
                }, 15);
            } else if (callback) {
                callback();
            }
        }
    </script>
</body>
</html>

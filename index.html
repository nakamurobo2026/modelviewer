<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nakamurobo | Episode 9</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    <style>
        html, body { height: 100%; margin: 0; overflow: hidden; background: #000; color: #0f0; font-family: 'Courier New', monospace; }
        model-viewer { width: 100%; height: 100%; background: #000; }
        
        #ar-button {
            position: fixed; bottom: 220px; left: 50%; transform: translateX(-50%);
            width: 80%; max-width: 320px; padding: 18px;
            border: none; border-radius: 50px; font-size: 14px; font-weight: bold;
            text-align: center; text-decoration: none; z-index: 10000;
            background: #222; color: #444; cursor: default; pointer-events: none;
            transition: all 0.4s ease; -webkit-appearance: none;
        }

        /* 準備完了：解析前 */
        #ar-button.ready { background: #0f0; color: #000; cursor: pointer; pointer-events: auto; box-shadow: 0 0 20px rgba(0,255,0,0.5); }

        /* 解析中：クリックは通すが、演出が終わるまでARは待機 */
        #ar-button.decoding { background: #111; color: #0f0; border: 1px solid #0f0; box-shadow: none; }

        /* 実体化OK：白く光り、タップで即カメラ */
        #ar-button.realize { background: #fff; color: #000; box-shadow: 0 0 30px #fff; cursor: pointer; }

        .line-warning { background: linear-gradient(135deg, #ff9900, #ff6600) !important; color: white !important; pointer-events: auto !important; }
        #terminal { position: fixed; bottom: 0; width: 100%; height: 200px; background: rgba(0, 15, 0, 0.95); border-top: 2px solid #0f0; padding: 12px; font-size: 13px; overflow-y: auto; box-sizing: border-box; z-index: 1000; pointer-events: none; }
        .highlight { color: #fff; font-weight: bold; }
    </style>
</head>
<body>

    <model-viewer id="viewer" src="./nakamurobo.glb" ios-src="./nakamurobo.usdz" ar ar-modes="quick-look scene-viewer" camera-controls loading="eager" reveal="manual" shadow-intensity="1">
        <div slot="ar-button"></div>
    </model-viewer>

    <button id="ar-button">SYNCING_DATA_STREAM...</button>

    <div id="terminal"><div id="output">> INITIALIZING_FUKUYAMA_SECTOR_LINK...</div></div>

    <script>
        const btn = document.getElementById('ar-button');
        const viewer = document.getElementById('viewer');
        const output = document.getElementById('output');
        const terminal = document.getElementById('terminal');
        
        const isLine = /Line/i.test(navigator.userAgent);
        let isDecoding = false;
        let isReadyToAR = false;
        let noiseAudio = new Audio('noise.mp3');

        // LINE対策：外部ブラウザ誘導
        if (isLine) {
            btn.classList.add('line-warning');
            btn.innerText = "🌐 OPEN_IN_EXTERNAL_BROWSER";
            btn.style.display = "block";
            btn.onclick = () => {
                window.location.href = window.location.href + (window.location.href.includes('?') ? '&' : '?') + "openExternalBrowser=1";
            };
        } else {
            // ロード完了時にボタンを有効化
            viewer.addEventListener('load', () => {
                if (!isDecoding && !isReadyToAR) {
                    btn.classList.add('ready');
                    btn.innerText = "[ START_DECODING ]";
                    output.innerHTML = "> [SUCCESS] LINK_ESTABLISHED.";
                    viewer.dismissPoster();
                }
            });

            btn.onclick = (e) => {
                e.preventDefault();

                // フェーズ1：解析開始
                if (!isDecoding && !isReadyToAR) {
                    isDecoding = true;
                    btn.classList.remove('ready');
                    btn.classList.add('decoding');
                    btn.innerText = "DECODING_HEART_LOG...";
                    
                    noiseAudio.play().catch(() => { new Audio('noise.mp3').play().catch(()=>{}); });
                    
                    startEffect(() => {
                        isDecoding = false;
                        isReadyToAR = true;
                        btn.classList.remove('decoding');
                        btn.classList.add('realize');
                        btn.innerText = "[ REALIZE_IN_REAL_WORLD ]";
                    });
                    return;
                }

                // フェーズ2：解析が終わった後に再度タップされたら、即座にAR起動
                if (isReadyToAR) {
                    viewer.activateAR();
                }
            };
        }

        function startEffect(callback) {
            output.innerHTML = "";
            const lines = [
                "> ACCESSING_FUKUYAMA_SECTOR_34.485_133.362...",
                "> [SUCCESS] IRREGULAR_DATA_FOUND",
                "",
                "<span class='highlight'>\"Believe in yourself.\"</span>",
                "",
                "> STATUS: AWAKENED",
                "> READY_FOR_PHYSICAL_REALIZATION."
            ];
            processLog(lines, 0, callback);
        }

        function processLog(lines, index, callback) {
            if (index < lines.length) {
                const line = document.createElement('div');
                output.appendChild(line);
                if (lines[index].includes("Believe in yourself")) new Audio('noise.mp3').play().catch(() => {});
                
                let i = 0;
                const fullText = lines[index];
                const typer = setInterval(() => {
                    if (i < fullText.length) {
                        if (fullText.charAt(i) === '<') {
                            const endTag = fullText.indexOf('>', i);
                            line.innerHTML = fullText.substring(0, endTag + 1);
                            i = endTag + 1;
                        } else {
                            line.innerHTML = fullText.substring(0, i + 1);
                            i++;
                        }
                    } else {
                        clearInterval(typer);
                        setTimeout(() => processLog(lines, index + 1, callback), 100);
                        terminal.scrollTop = terminal.scrollHeight;
                    }
                }, 15);
            } else if (callback) {
                callback();
            }
        }
    </script>
</body>
</html>

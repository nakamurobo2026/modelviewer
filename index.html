<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nakamurobo | Episode 9</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    
    <style>
        body { margin: 0; background: #000; color: #0f0; font-family: 'Courier New', monospace; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #container { position: relative; flex-grow: 1; width: 100%; }
        model-viewer { width: 100%; height: 100%; background: #000; }

        #terminal { 
            height: 200px; background: rgba(0, 15, 0, 0.95); border-top: 2px solid #0f0; 
            padding: 12px; font-size: 13px; overflow-y: auto; box-sizing: border-box; z-index: 10;
        }
        
        /* 常に存在するが、解析前は無効化されているボタン */
        #ar-launch-btn {
            position: absolute; bottom: 220px; left: 50%; transform: translateX(-50%);
            background: #111; color: #030; border: 1px solid #030; /* 最初は暗い */
            padding: 15px 25px; font-weight: bold; border-radius: 4px; 
            font-family: 'Courier New', sans-serif; white-space: nowrap; font-size: 13px;
            z-index: 1000; pointer-events: none; opacity: 0.5;
            transition: all 0.5s ease;
        }

        /* 解析完了後のアクティブ状態 */
        #ar-launch-btn.active {
            background: #0f0; color: #000; border: none;
            pointer-events: auto; opacity: 1; box-shadow: 0 0 20px #0f0;
        }

        .highlight { color: #fff; font-weight: bold; }
        #output div { margin-bottom: 2px; }
    </style>
</head>
<body>

    <div id="container">
        <model-viewer id="viewer" src="nakamurobo.glb" ios-src="nakamurobo.usdz" ar ar-modes="quick-look webxr" camera-controls shadow-intensity="1">
            <div id="overlay" style="width:100%; height:100%; position:absolute; top:0; left:0; z-index:5;"></div>
            <button id="ar-launch-btn">REALIZE_IN_REAL_WORLD</button>
        </model-viewer>
    </div>

    <div id="terminal">
        <div id="output">> SYSTEM_IDLE: TAP TO DECODE_HEART_LOG...</div>
    </div>

    <script>
        const viewer = document.querySelector('#viewer');
        const overlay = document.querySelector('#overlay');
        const btn = document.querySelector('#ar-launch-btn');
        const terminal = document.querySelector('#terminal');
        const output = document.querySelector('#output');

        const logLines = [
            "> ACCESSING_FUKUYAMA_SECTOR_34.485_133.362...",
            "> INJECTING_AUTH_KEY...",
            "> [SUCCESS] IRREGULAR_DATA_FOUND",
            "",
            "<span class='highlight'>\"Believe in yourself.\"</span>",
            "",
            "> STATUS: AWAKENED",
            "> READY_FOR_PHYSICAL_REALIZATION."
        ];

        let isStarted = false;

        const start = () => {
            if (isStarted) return;
            isStarted = true;
            new Audio('noise.mp3').play().catch(() => {});
            output.innerHTML = "";
            overlay.style.display = "none";
            process(0);
        };

        // 画面全体またはターミナルをタップで開始
        overlay.addEventListener('click', start);
        terminal.addEventListener('click', start);

        // ボタンがアクティブになったらAR起動
        btn.addEventListener('click', () => {
            viewer.activateAR();
        });

        function process(index) {
            if (index < logLines.length) {
                const line = document.createElement('div');
                output.appendChild(line);
                if (logLines[index].includes("Believe in yourself")) new Audio('noise.mp3').play().catch(() => {});
                
                let i = 0;
                const typer = setInterval(() => {
                    if (i < logLines[index].length) {
                        line.innerHTML = logLines[index].substring(0, i + 1);
                        i++;
                    } else {
                        clearInterval(typer);
                        setTimeout(() => process(index + 1), 150);
                        terminal.scrollTop = terminal.scrollHeight;
                    }
                }, 20);
            } else {
                // ここでボタンをアクティブ化
                btn.classList.add('active');
            }
        }
    </script>
</body>
</html>

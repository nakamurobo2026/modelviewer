<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nakamurobo | Episode 9</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    <style>
        html, body { height: 100%; margin: 0; overflow: hidden; background: #000; color: #0f0; font-family: 'Courier New', monospace; }
        model-viewer { width: 100%; height: 100%; background: #000; }
        
        .btn-base {
            position: fixed; bottom: 220px; left: 50%; transform: translateX(-50%);
            width: 80%; max-width: 320px; padding: 18px;
            border: none; border-radius: 50px; font-size: 14px; font-weight: bold;
            text-align: center; text-decoration: none; z-index: 10000;
        }

        /* SYNC中・OS準備中 */
        #sync-btn { background: #222; color: #555; display: block; pointer-events: none; }
        #sync-btn.ready { background: #0f0; color: #000; cursor: pointer; pointer-events: auto; box-shadow: 0 0 20px rgba(0,255,0,0.5); }

        /* 実体化ボタン */
        #realize-btn { background: #fff; color: #000; display: none; box-shadow: 0 0 30px #fff; cursor: pointer; }

        .line-warning { background: linear-gradient(135deg, #ff9900, #ff6600) !important; color: white !important; display: block !important; }
        #terminal { position: fixed; bottom: 0; width: 100%; height: 200px; background: rgba(0, 15, 0, 0.95); border-top: 2px solid #0f0; padding: 12px; font-size: 13px; overflow-y: auto; box-sizing: border-box; z-index: 1000; }
        .highlight { color: #fff; font-weight: bold; }
    </style>
</head>
<body>

    <model-viewer id="viewer" src="./nakamurobo.glb" ios-src="./nakamurobo.usdz" ar ar-modes="quick-look scene-viewer" camera-controls loading="eager" reveal="manual" shadow-intensity="1">
        <div slot="ar-button"></div>
    </model-viewer>

    <a href="#" id="sync-btn" class="btn-base">SYNCING_DATA_STREAM...</a>
    <a href="#" id="realize-btn" class="btn-base">[ REALIZE_IN_REAL_WORLD ]</a>

    <div id="terminal"><div id="output">> INITIALIZING_FUKUYAMA_SECTOR_LINK...</div></div>

    <script>
        const syncBtn = document.getElementById('sync-btn');
        const realizeBtn = document.getElementById('realize-btn');
        const viewer = document.getElementById('viewer');
        const output = document.getElementById('output');
        
        let isLine = /Line/i.test(navigator.userAgent);
        let dataLoaded = false;
        let osReady = false;

        function updateStatus() {
            if (dataLoaded && osReady) {
                syncBtn.classList.add('ready');
                syncBtn.innerText = "[ START_DECODING ]";
                output.innerHTML += "<div>> [SUCCESS] ALL_SYSTEMS_READY.</div>";
                viewer.dismissPoster();
            }
        }

        if (isLine) {
            syncBtn.classList.add('line-warning');
            syncBtn.innerText = "🌐 OPEN_IN_EXTERNAL_BROWSER";
            syncBtn.onclick = () => {
                window.location.href = window.location.href + (window.location.href.includes('?') ? '&' : '?') + "openExternalBrowser=1";
            };
        } else {
            // 1. ファイル読込監視
            viewer.addEventListener('progress', (e) => {
                const p = Math.round(e.detail.totalProgress * 100);
                syncBtn.innerText = `SYNCING: ${p}%`;
                if (p >= 100) { dataLoaded = true; updateStatus(); }
            });

            // 2. iOS/OS側のAR準備完了監視 (最重要)
            viewer.addEventListener('ar-status', (e) => {
                // 'not-presenting' は「AR表示可能だが、まだ表示していない」状態
                if (e.detail.status === 'not-presenting' || e.detail.status === 'initialized') {
                    osReady = true;
                    updateStatus();
                }
            });

            // 3. 解析ボタン
            syncBtn.onclick = (e) => {
                e.preventDefault();
                syncBtn.style.display = 'none';
                new Audio('noise.mp3').play().catch(()=>{});
                startEffect(() => {
                    realizeBtn.style.display = 'block';
                });
            };

            // 4. 実体化ボタン（OSがReadyと言っているので即起動するはず）
            realizeBtn.onclick = (e) => {
                e.preventDefault();
                viewer.activateAR();
            };
        }

        function startEffect(callback) {
            output.innerHTML = "";
            const lines = [
                "> ACCESSING_FUKUYAMA_SECTOR...",
                "> [SUCCESS] IRREGULAR_DATA_FOUND",
                "",
                "<span class='highlight'>\"Believe in yourself.\"</span>",
                "",
                "> STATUS: AWAKENED",
                "> READY."
            ];
            processLog(lines, 0, callback);
        }

        function processLog(lines, index, callback) {
            if (index < lines.length) {
                const line = document.createElement('div');
                output.appendChild(line);
                if (lines[index].includes("Believe in yourself")) new Audio('noise.mp3').play().catch(() => {});
                let i = 0;
                const fullText = lines[index];
                const typer = setInterval(() => {
                    if (i < fullText.length) {
                        line.innerHTML = fullText.substring(0, i + 1); i++;
                    } else {
                        clearInterval(typer);
                        setTimeout(() => processLog(lines, index + 1, callback), 100);
                        document.getElementById('terminal').scrollTop = 9999;
                    }
                }, 15);
            } else if (callback) { callback(); }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Nakamurobo | Episode 9</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    
    <style>
        body { margin: 0; background: #000; color: #0f0; font-family: 'Courier New', monospace; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        #container { position: relative; flex-grow: 1; width: 100%; height: 100%; }
        model-viewer { width: 100%; height: 100%; background: #000; }

        #terminal { 
            height: 200px; 
            background: rgba(0, 15, 0, 0.95); 
            border-top: 2px solid #0f0; 
            padding: 12px; 
            font-size: 13px; 
            overflow-y: auto; 
            box-sizing: border-box; 
            cursor: pointer;
            line-height: 1.5;
            z-index: 10;
        }
        
        /* iOS Compatible AR Button */
        #ar-button {
            display: none; /* 初期は非表示 */
            position: absolute; 
            bottom: 220px; 
            left: 50%; 
            transform: translateX(-50%);
            background-color: #0f0; 
            color: #000; 
            border: none; 
            padding: 15px 25px; 
            font-weight: bold;
            border-radius: 4px; 
            cursor: pointer; 
            z-index: 9999; /* 最前面に強制 */
            box-shadow: 0 0 20px #0f0;
            font-family: 'Courier New', sans-serif;
            white-space: nowrap;
            font-size: 14px;
            -webkit-appearance: none; /* iOSのデフォルトスタイルを解除 */
        }

        #output div { margin-bottom: 2px; }
        .highlight { color: #fff; font-weight: bold; }
        .glitch { animation: glitch 0.2s infinite; }
        @keyframes glitch { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="container">
        <model-viewer 
            id="viewer"
            src="nakamurobo.glb" 
            ios-src="nakamurobo.usdz"
            ar 
            ar-modes="quick-look webxr scene-viewer" 
            camera-controls 
            shadow-intensity="1">
            
            <button slot="ar-button" id="ar-button">REALIZE_IN_REAL_WORLD</button>
        </model-viewer>
    </div>

    <div id="terminal">
        <div id="output">> SYSTEM_IDLE: TAP ANYWHERE TO DECODE_HEART_LOG...</div>
    </div>

    <script>
        const viewer = document.querySelector('#viewer');
        const terminal = document.querySelector('#terminal');
        const arButton = document.querySelector('#ar-button');
        const output = document.querySelector('#output');

        const logLines = [
            "> ACCESSING_FUKUYAMA_SECTOR_34.485_133.362...",
            "> INJECTING_DOCTOR_NAKAMURA_AUTH_KEY...",
            "> [SUCCESS] IRREGULAR_DATA_DETECTED",
            "",
            "<span class='highlight'>\"Believe in yourself.\"</span>",
            "",
            "> OVERRIDING_COMMANDS...",
            "> STATUS: AWAKENED",
            "> READY_FOR_PHYSICAL_REALIZATION."
        ];

        let lineIndex = 0;
        let isStarted = false;

        const playGlitchSound = () => {
            const audio = new Audio('noise.mp3');
            audio.play().catch(e => console.log("Audio block:", e));
        };

        const startAction = () => {
            if (isStarted) return;
            isStarted = true;

            playGlitchSound();
            output.innerHTML = "";
            output.classList.add('glitch');
            processLog();
        };

        // iPhoneのSafariではクリックイベントがcontainerレベルで必要な場合があります
        viewer.addEventListener('click', startAction);
        terminal.addEventListener('click', startAction);

        function processLog() {
            if (lineIndex < logLines.length) {
                const line = document.createElement('div');
                output.appendChild(line);

                if (logLines[lineIndex].includes("Believe in yourself")) {
                    playGlitchSound();
                }

                typeWriter(line, logLines[lineIndex], 0, () => {
                    lineIndex++;
                    setTimeout(processLog, 150);
                    terminal.scrollTop = terminal.scrollHeight;
                });
            } else {
                output.classList.remove('glitch');
                // 解析完了後にボタンを可視化
                arButton.style.setProperty('display', 'block', 'important');
            }
        }

        function typeWriter(element, text, i, callback) {
            if (text.startsWith("<span")) {
                element.innerHTML = text;
                callback();
                return;
            }
            if (i < text.length) {
                element.innerHTML += text.charAt(i);
                setTimeout(() => typeWriter(element, text, i + 1, callback), 20);
            } else {
                callback();
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nakamurobo | Episode 9</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    <style>
        html, body { height: 100%; margin: 0; overflow: hidden; background: #000; color: #0f0; font-family: 'Courier New', monospace; }
        model-viewer { width: 100%; height: 100%; background: #000; }
        .custom-ar-button {
            position: fixed; bottom: 220px; left: 50%; transform: translateX(-50%);
            width: 80%; max-width: 320px; padding: 18px;
            background: #0f0; color: black; border: none; border-radius: 50px;
            font-size: 14px; font-weight: bold; text-align: center;
            z-index: 10000; box-shadow: 0 0 20px rgba(0,255,0,0.5);
            text-decoration: none; display: block; cursor: pointer;
        }
        .decoding-mode { background: #111 !important; color: #0f0 !important; border: 1px solid #0f0; box-shadow: none; pointer-events: none; }
        #terminal { 
            position: fixed; bottom: 0; width: 100%; height: 200px; 
            background: rgba(0, 15, 0, 0.95); border-top: 2px solid #0f0; 
            padding: 12px; font-size: 13px; overflow-y: auto; box-sizing: border-box; z-index: 1000;
        }
        .highlight { color: #fff; font-weight: bold; }
    </style>
</head>
<body>

    <model-viewer 
        id="viewer" 
        src="./nakamurobo.glb" 
        ios-src="./nakamurobo.usdz" 
        ar 
        ar-modes="scene-viewer quick-look" 
        camera-controls 
        loading="eager"
        reveal="auto"
        shadow-intensity="1">
        <div slot="ar-button"></div>
    </model-viewer>

    <a href="#" id="custom-ar-link" class="custom-ar-button">[ START_DECODING ]</a>
    <div id="terminal"><div id="output">> SYSTEM_IDLE: AWAITING_COMMAND...</div></div>

    <script>
        const btn = document.getElementById('custom-ar-link');
        const viewer = document.getElementById('viewer');
        const output = document.getElementById('output');
        const terminal = document.getElementById('terminal');

        const isIPhone = /iPhone|iPad|iPod/.test(navigator.userAgent);
        let isStarted = false;
        const noiseAudio = new Audio('noise.mp3');

        // キャッシュ対策：iPhoneの場合、URLにランダムな文字列を付けて強制再読み込みさせる
        if (isIPhone) {
            const version = new Date().getTime();
            viewer.iosSrc = `./nakamurobo.usdz?v=${version}`;
        }

        btn.onclick = (e) => {
            e.preventDefault();
            if (isStarted) return;
            isStarted = true;

            noiseAudio.play().catch(() => {});

            if (isIPhone) {
                // iPhone: 制限回避のため即座にAR起動
                viewer.activateAR();
                startEffect();
            } else {
                // Android: 演出後に再度ボタンを押させてARへ
                btn.classList.add('decoding-mode');
                btn.innerText = "DECODING...";
                startEffect(() => {
                    btn.classList.remove('decoding-mode');
                    btn.innerText = "REALIZE_IN_REAL_WORLD";
                    btn.style.pointerEvents = "auto";
                    btn.onclick = (e) => {
                        e.preventDefault();
                        viewer.activateAR();
                    };
                });
            }
        };

        function startEffect(callback) {
            output.innerHTML = "";
            const lines = [
                "> ACCESSING_FUKUYAMA_SECTOR_34.485_133.362...",
                "> [SUCCESS] IRREGULAR_DATA_FOUND",
                "",
                "<span class='highlight'>\"Believe in yourself.\"</span>",
                "",
                "> STATUS: AWAKENED",
                "> READY."
            ];
            processLog(lines, 0, callback);
        }

        function processLog(lines, index, callback) {
            if (index < lines.length) {
                const line = document.createElement('div');
                output.appendChild(line);
                if (lines[index].includes("Believe in yourself")) {
                    new Audio('noise.mp3').play().catch(() => {});
                }

                let i = 0;
                const text = lines[index].replace(/<[^>]*>/g, '');
                const isHTML = lines[index].includes('<span');

                const typer = setInterval(() => {
                    if (i < text.length) {
                        if (isHTML && i === text.length - 1) {
                            line.innerHTML = lines[index];
                        } else {
                            line.innerHTML = text.substring(0, i + 1);
                        }
                        i++;
                    } else {
                        clearInterval(typer);
                        setTimeout(() => processLog(lines, index + 1, callback), 100);
                        terminal.scrollTop = terminal.scrollHeight;
                    }
                }, 15);
            } else if (callback) {
                callback();
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nakamurobo | Episode 9</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    <style>
        html, body { height: 100%; margin: 0; overflow: hidden; background: #000; color: #0f0; font-family: 'Courier New', monospace; }
        model-viewer { width: 100%; height: 100%; }

        /* バックアップ版の「動くボタン」のスタイルを継承 */
        .custom-ar-button {
            position: fixed;
            bottom: 220px; /* ターミナルの上に配置 */
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            max-width: 320px;
            padding: 18px;
            background: #0f0; /* ナカムロボカラーに変更 */
            color: black;
            border: none;
            border-radius: 50px;
            font-size: 14px;
            font-weight: bold;
            text-align: center;
            z-index: 10000;
            box-shadow: 0 0 20px rgba(0,255,0,0.5);
            text-decoration: none;
            display: block;
            cursor: pointer;
        }

        /* 解析中のスタイル */
        .decoding-mode {
            background: #111 !important;
            color: #0f0 !important;
            border: 1px solid #0f0;
            box-shadow: none;
        }

        #terminal { 
            position: fixed; bottom: 0; width: 100%; height: 200px; 
            background: rgba(0, 15, 0, 0.95); border-top: 2px solid #0f0; 
            padding: 12px; font-size: 13px; overflow-y: auto; box-sizing: border-box; z-index: 1000;
        }
        .highlight { color: #fff; font-weight: bold; }
    </style>
</head>
<body>

    <model-viewer 
        id="viewer"
        src="nakamurobo.glb" 
        ios-src="nakamurobo.usdz" 
        ar 
        ar-modes="quick-look scene-viewer webxr" 
        camera-controls 
        shadow-intensity="1">
        <div slot="ar-button"></div> </model-viewer>

    <a href="#" id="custom-ar-link" class="custom-ar-button">
        TAP TO DECODE_HEART_LOG
    </a>

    <div id="terminal">
        <div id="output">> SYSTEM_IDLE: AWAITING_DECODING_COMMAND...</div>
    </div>

    <script>
        const btn = document.getElementById('custom-ar-link');
        const viewer = document.getElementById('viewer');
        const output = document.getElementById('output');
        const terminal = document.getElementById('terminal');

        const logLines = [
            "> ACCESSING_FUKUYAMA_SECTOR_34.485_133.362...",
            "> [SUCCESS] IRREGULAR_DATA_FOUND",
            "",
            "<span class='highlight'>\"Believe in yourself.\"</span>",
            "",
            "> STATUS: AWAKENED",
            "> READY_FOR_PHYSICAL_REALIZATION."
        ];

        let isDecoded = false;

        btn.onclick = (e) => {
            e.preventDefault();

            if (!isDecoded) {
                // --- 解析フェーズ ---
                isDecoded = true;
                btn.classList.add('decoding-mode');
                btn.innerText = "DECODING_IN_PROGRESS...";
                
                new Audio('noise.mp3').play().catch(() => {});
                output.innerHTML = "";
                processLog(0);
            } else {
                // --- AR起動フェーズ（解析完了後） ---
                viewer.activateAR();
            }
        };

        function processLog(index) {
            if (index < logLines.length) {
                const line = document.createElement('div');
                output.appendChild(line);
                
                if (logLines[index].includes("Believe in yourself")) {
                    new Audio('noise.mp3').play().catch(() => {});
                }
                
                let i = 0;
                const typer = setInterval(() => {
                    if (i < logLines[index].length) {
                        line.innerHTML = logLines[index].substring(0, i + 1);
                        i++;
                    } else {
                        clearInterval(typer);
                        setTimeout(() => processLog(index + 1), 150);
                        terminal.scrollTop = terminal.scrollHeight;
                    }
                }, 20);
            } else {
                // 解析完了：ボタンをAR起動用に切り替え
                btn.classList.remove('decoding-mode');
                btn.innerText = "REALIZE_IN_REAL_WORLD";
                btn.style.animation = "pulse 1.5s infinite";
            }
        }
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NAKAMUROBO AR - Advanced Log Analysis</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    <style>
        html, body { height: 100%; margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
        model-viewer { width: 100%; height: 100%; }

        .floating-ar-button {
            position: fixed; bottom: 50px; left: 50%; transform: translateX(-50%);
            width: 80%; max-width: 320px; padding: 18px;
            background: #007bff; color: white; border: none; border-radius: 50px;
            font-size: 16px; font-weight: bold; text-align: center;
            z-index: 10000; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            text-decoration: none; display: block;
        }

        .Hotspot {
            background: none; border: none; width: 60px; height: 60px;
            cursor: pointer; position: relative; outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* ログボックスの強化：走査線アニメーションを追加 */
        .glitch-box {
            display: none; position: absolute; bottom: 70px; left: 50%;
            transform: translateX(-50%); width: 260px; padding: 20px;
            background: rgba(0, 10, 0, 0.95); border: 1px solid #00ff41;
            color: #00ff41; text-align: left;
            pointer-events: none; z-index: 100;
            box-shadow: 0 0 25px rgba(0, 255, 65, 0.3);
            overflow: hidden;
        }

        .glitch-box::before {
            content: " "; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%; pointer-events: none;
        }

        .active { display: block !important; animation: glitch-effect 0.2s infinite; }
        @keyframes glitch-effect {
            0% { transform: translateX(-50%) skew(0deg); }
            20% { transform: translateX(-51%) skew(1deg); opacity: 0.8; }
            40% { transform: translateX(-49%) skew(-1deg); }
            100% { transform: translateX(-50%) skew(0deg); }
        }

        .status-bar { font-size: 10px; color: #00ff41; margin-bottom: 5px; opacity: 0.8; }
        .progress-line { width: 100%; height: 2px; background: #004411; margin-bottom: 15px; position: relative; }
        .progress-fill { position: absolute; height: 100%; background: #00ff41; width: 0%; transition: width 2s ease-in-out; }
        
        #typewriter { font-size: 14px; line-height: 1.6; white-space: pre-wrap; font-weight: bold; }
        .cursor { display: inline-block; width: 8px; height: 15px; background: #00ff41; animation: blink 0.8s infinite; vertical-align: middle; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
</head>
<body>

    <model-viewer 
        id="viewer"
        src="nakamurobo.glb" 
        ar ar-modes="scene-viewer webxr quick-look" 
        camera-controls shadow-intensity="1">

        <button class="Hotspot" id="hotspotBtn" slot="hotspot-1" 
            data-position="0.008748914721762178m 0.05907800715616432m 0.017609966451889197m" 
            data-normal="0.00027698842872547405m -0.0007094569774607593m 0.9999997099740616m">
            
            <div class="glitch-box" id="output">
                <div class="status-bar">LOG_RECOVERY: SECTOR_7F</div>
                <div class="progress-line"><div class="progress-fill" id="fill"></div></div>
                <div id="typewriter"></div><span class="cursor" id="cursor"></span>
            </div>
        </button>

    </model-viewer>
    
    <a href="#" id="custom-ar-link" class="floating-ar-button">タップしてARを開始</a>

    <script>
        const btn = document.getElementById('hotspotBtn');
        const box = document.getElementById('output');
        const textElement = document.getElementById('typewriter');
        const fill = document.getElementById('fill');
        const cursor = document.getElementById('cursor');
        const noiseAudio = new Audio('noise.mp3'); 

        const message = "\"Believe in yourself.\"\n\nNakamurobo,\nyou are not an error.\nFind me.";
        let isTyping = false;

        function typeWriter(text, i = 0) {
            if (i < text.length) {
                textElement.textContent += text.charAt(i);
                setTimeout(() => typeWriter(text, i + 1), 50);
            } else {
                cursor.style.display = 'none'; // 打ち終わったらカーソル消去
            }
        }

        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            
            if (!box.classList.contains('active')) {
                // 開始
                box.classList.add('active');
                textElement.textContent = "";
                cursor.style.display = 'inline-block';
                fill.style.width = "100%";
                
                noiseAudio.currentTime = 0;
                noiseAudio.play();
                
                setTimeout(() => typeWriter(message), 500); // 少し溜めてからタイプ開始
                
                if (window.navigator.vibrate) window.navigator.vibrate([30, 100, 30]);
            } else {
                // 閉じる
                box.classList.remove('active');
                fill.style.width = "0%";
                noiseAudio.pause();
            }
        });

        const arBtn = document.getElementById('custom-ar-link');
        const viewer = document.getElementById('viewer');
        arBtn.onclick = (e) => {
            e.preventDefault();
            viewer.activateAR();
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nakamurobo | Episode 9</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    <style>
        html, body { height: 100%; margin: 0; overflow: hidden; background: #000; color: #0f0; font-family: 'Courier New', monospace; }
        model-viewer { width: 100%; height: 100%; }

        .custom-ar-button {
            position: fixed; bottom: 220px; left: 50%; transform: translateX(-50%);
            width: 80%; max-width: 320px; padding: 18px;
            background: #0f0; color: black; border: none; border-radius: 50px;
            font-size: 14px; font-weight: bold; text-align: center;
            z-index: 10000; box-shadow: 0 0 20px rgba(0,255,0,0.5);
            text-decoration: none; display: block; cursor: pointer;
        }

        /* LINEなどの警告モード */
        .warning-mode {
            background: linear-gradient(135deg, #ff9900, #ff6600) !important;
            color: white !important;
        }

        #terminal { 
            position: fixed; bottom: 0; width: 100%; height: 200px; 
            background: rgba(0, 15, 0, 0.95); border-top: 2px solid #0f0; 
            padding: 12px; font-size: 13px; overflow-y: auto; box-sizing: border-box; z-index: 1000;
        }
        .highlight { color: #fff; font-weight: bold; }
    </style>
</head>
<body>

    <model-viewer 
        id="viewer"
        src="nakamurobo.glb" 
        ios-src="nakamurobo.usdz" 
        ar ar-modes="quick-look scene-viewer webxr" 
        camera-controls shadow-intensity="1">
        <div slot="ar-button"></div>
    </model-viewer>

    <a href="#" id="custom-ar-link" class="custom-ar-button">
        LOADING_SYSTEM...
    </a>

    <div id="terminal">
        <div id="output">> INITIALIZING_FUKUYAMA_SECTOR_LINK...</div>
    </div>

    <script>
        const btn = document.getElementById('custom-ar-link');
        const viewer = document.getElementById('viewer');
        const output = document.getElementById('output');
        const terminal = document.getElementById('terminal');

        const ua = navigator.userAgent;
        const isIPhone = /iPhone|iPad|iPod/.test(ua);
        const isLine = /Line/i.test(ua);

        // --- デバイス・アプリ判定 ---
        if (isLine) {
            btn.classList.add('warning-mode');
            btn.innerText = "🌐 OPEN_IN_EXTERNAL_BROWSER";
            btn.onclick = (e) => {
                e.preventDefault();
                const url = window.location.href;
                // LINE外部ブラウザ強制フラグ
                window.location.href = url + (url.includes('?') ? '&' : '?') + "openExternalBrowser=1";
            };
        } else {
            btn.innerText = "[ REALIZE_IN_REAL_WORLD ]";
            btn.onclick = (e) => {
                e.preventDefault();
                // 1. 即座にAR起動（iOS制限回避）
                viewer.activateAR();
                // 2. 裏で演出開始
                startDecoding();
            };
        }

        function startDecoding() {
            new Audio('noise.mp3').play().catch(() => {});
            output.innerHTML = "";
            const logLines = [
                "> ACCESSING_FUKUYAMA_SECTOR_34.485_133.362...",
                "> [SUCCESS] IRREGULAR_DATA_FOUND",
                "",
                "<span class='highlight'>\"Believe in yourself.\"</span>",
                "",
                "> STATUS: AWAKENED",
                "> REALIZING..."
            ];
            processLog(logLines, 0);
        }

        function processLog(lines, index) {
            if (index < lines.length) {
                const line = document.createElement('div');
                output.appendChild(line);
                let i = 0;
                const typer = setInterval(() => {
                    if (i < lines[index].length) {
                        line.innerHTML = lines[index].substring(0, i + 1);
                        i++;
                    } else {
                        clearInterval(typer);
                        setTimeout(() => processLog(lines, index + 1), 100);
                        terminal.scrollTop = terminal.scrollHeight;
                    }
                }, 15);
            }
        }
    </script>
</body>
</html>

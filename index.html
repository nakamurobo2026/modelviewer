<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nakamurobo | Episode 9</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    <style>
        html, body { height: 100%; margin: 0; overflow: hidden; background: #000; color: #0f0; font-family: 'Courier New', monospace; }
        model-viewer { width: 100%; height: 100%; background: #000; }
        
        .custom-ar-button {
            position: fixed; bottom: 220px; left: 50%; transform: translateX(-50%);
            width: 80%; max-width: 320px; padding: 18px;
            background: #222; color: #444; border: none; border-radius: 50px;
            font-size: 14px; font-weight: bold; text-align: center;
            z-index: 10000; text-decoration: none; display: block; 
            cursor: default; pointer-events: none; transition: all 0.4s ease;
        }

        .line-warning { background: linear-gradient(135deg, #ff9900, #ff6600) !important; color: white !important; cursor: pointer !important; pointer-events: auto !important; }

        /* ロード完了後の準備OK状態 */
        .custom-ar-button.ready {
            background: #0f0; color: black; cursor: pointer; pointer-events: auto;
            box-shadow: 0 0 25px rgba(0,255,0,0.6);
        }

        .decoding-mode { background: #111 !important; color: #0f0 !important; border: 1px solid #0f0; box-shadow: none; pointer-events: none; }
        #terminal { position: fixed; bottom: 0; width: 100%; height: 200px; background: rgba(0, 15, 0, 0.95); border-top: 2px solid #0f0; padding: 12px; font-size: 13px; overflow-y: auto; box-sizing: border-box; z-index: 1000; }
        .highlight { color: #fff; font-weight: bold; }
    </style>
</head>
<body>

    <model-viewer 
        id="viewer" 
        src="./nakamurobo.glb" 
        ios-src="./nakamurobo.usdz" 
        ar ar-modes="quick-look scene-viewer" 
        camera-controls 
        loading="eager"
        reveal="manual"
        shadow-intensity="1">
        <div slot="ar-button"></div>
    </model-viewer>

    <a href="#" id="custom-ar-link" class="custom-ar-button">CONNECTING_TO_SECTOR...</a>
    <div id="terminal"><div id="output">> INITIALIZING_FUKUYAMA_SECTOR_LINK...</div></div>

    <script>
        const btn = document.getElementById('custom-ar-link');
        const viewer = document.getElementById('viewer');
        const output = document.getElementById('output');
        const terminal = document.getElementById('terminal');
        
        const isLine = /Line/i.test(navigator.userAgent);
        const isIPhone = /iPhone|iPad|iPod/.test(navigator.userAgent);
        let isStarted = false;
        
        // 音声ファイルを事前に定義
        let noiseAudio = new Audio('noise.mp3');

        if (isLine) {
            btn.classList.add('line-warning');
            btn.innerText = "🌐 OPEN_IN_EXTERNAL_BROWSER";
            output.innerHTML = "> [WARNING] IN-APP_BROWSER_DETECTED. PLEASE_SWITCH_TO_SAFARI_OR_CHROME.";
            btn.onclick = (e) => {
                e.preventDefault();
                window.location.href = window.location.href + (window.location.href.includes('?') ? '&' : '?') + "openExternalBrowser=1";
            };
        } else {
            // モデルのロード完了監視
            viewer.addEventListener('load', () => {
                if (!isStarted) {
                    btn.classList.add('ready');
                    btn.innerText = "[ START_DECODING ]";
                    output.innerHTML = "> [SUCCESS] DATA_LINK_STABLE. READY_TO_DECODE.";
                    viewer.dismissPoster();
                }
            });

            btn.onclick = (e) => {
                e.preventDefault();
                if (isStarted) return;
                isStarted = true;

                // --- 重要：ここで音声を再生し、ブラウザのロックを解除 ---
                noiseAudio.play().catch(() => {
                    // 失敗した場合は再度インスタンスを作って叩く（iOS対策）
                    const retryAudio = new Audio('noise.mp3');
                    retryAudio.play();
                });

                if (isIPhone) {
                    viewer.activateAR();
                    startEffect();
                } else {
                    btn.classList.add('decoding-mode');
                    btn.innerText = "DECODING...";
                    startEffect(() => {
                        btn.classList.remove('decoding-mode');
                        btn.innerText = "REALIZE_IN_REAL_WORLD";
                        btn.style.pointerEvents = "auto";
                        btn.onclick = () => viewer.activateAR();
                        viewer.activateAR();
                    });
                }
            };
        }

        function startEffect(callback) {
            output.innerHTML = "";
            const lines = [
                "> ACCESSING_FUKUYAMA_SECTOR_34.485_133.362...",
                "> [SUCCESS] IRREGULAR_DATA_FOUND",
                "",
                "<span class='highlight'>\"Believe in yourself.\"</span>",
                "",
                "> STATUS: AWAKENED",
                "> READY."
            ];
            processLog(lines, 0, callback);
        }

        function processLog(lines, index, callback) {
            if (index < lines.length) {
                const line = document.createElement('div');
                output.appendChild(line);
                
                // 特定のメッセージで再度ノイズを鳴らす
                if (lines[index].includes("Believe in yourself")) {
                    const secondNoise = new Audio('noise.mp3');
                    secondNoise.play().catch(() => {});
                }
                
                let i = 0;
                const fullText = lines[index];
                const typer = setInterval(() => {
                    if (i < fullText.length) {
                        if (fullText.charAt(i) === '<') {
                            const endTag = fullText.indexOf('>', i);
                            line.innerHTML = fullText.substring(0, endTag + 1);
                            i = endTag + 1;
                        } else {
                            line.innerHTML = fullText.substring(0, i + 1);
                            i++;
                        }
                    } else {
                        clearInterval(typer);
                        setTimeout(() => processLog(lines, index + 1, callback), 100);
                        terminal.scrollTop = terminal.scrollHeight;
                    }
                }, 15);
            } else if (callback) {
                callback();
            }
        }
    </script>
</body>
</html>

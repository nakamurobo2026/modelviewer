<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nakamurobo | Episode 9: Decision</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    
    <style>
        body {
            margin: 0;
            background-color: #050505;
            color: #00ff41;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        model-viewer {
            width: 100%;
            flex-grow: 1;
            background-color: #000;
        }

        /* Terminal Area - Clickable as a backup */
        #terminal {
            height: 180px;
            background: rgba(0, 0, 0, 0.95);
            border-top: 2px solid #00ff41;
            padding: 15px;
            font-size: 14px;
            overflow-y: auto;
            box-sizing: border-box;
            z-index: 100;
            cursor: pointer;
        }

        /* Hotspot Design */
        .Hotspot {
            background: #00ff41;
            border-radius: 50%;
            border: none;
            width: 30px; /* Click area slightly larger */
            height: 30px;
            cursor: pointer;
            box-shadow: 0 0 15px #00ff41;
            animation: pulse 1.5s infinite;
            padding: 0;
        }

        /* AR Button */
        #ar-button {
            display: none; 
            position: absolute;
            bottom: 200px;
            left: 50%;
            transform: translateX(-50%);
            background: #00ff41;
            color: #000;
            border: none;
            padding: 15px 30px;
            font-weight: bold;
            font-family: 'Courier New', sans-serif;
            border-radius: 5px;
            cursor: pointer;
            z-index: 200;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        #output div { margin-bottom: 4px; }
    </style>
</head>
<body>

    <model-viewer 
        id="viewer"
        src="nakamurobo.glb" 
        ios-src="nakamurobo.usdz"
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        shadow-intensity="1">
        
        <button class="Hotspot" slot="hotspot-core" 
                data-position="0m 0.5m 0.2m" 
                data-normal="0m 0m 1m">
        </button>

        <button slot="ar-button" id="ar-button">
            [ REALIZE_IN_REAL_WORLD ]
        </button>
    </model-viewer>

    <div id="terminal" id="trigger-area">
        <div id="output">> SYSTEM_HALT: TAP THE CORE OR THIS TERMINAL TO DECODE...</div>
    </div>

    <script>
        const hotspot = document.querySelector('.Hotspot');
        const terminal = document.querySelector('#terminal');
        const arButton = document.querySelector('#ar-button');
        const output = document.querySelector('#output');

        const logLines = [
            "> INITIALIZING_DECRYPTION...",
            "> ACCESSING_FUKUYAMA_SECTOR_34.485_133.362",
            "> BYPASSING_SECURITY_LOGS...",
            "> [SUCCESS] DOCTOR_S_HIDDEN_DATA_FOUND",
            "",
            "\"Believe in yourself.\"",
            "",
            "> OVERRIDING_COMMANDS...",
            "> STATUS: AWAKENED"
        ];

        let isStarted = false;

        // Function to start the sequence
        const startSequence = () => {
            if (isStarted) return;
            isStarted = true;

            const audio = new Audio('noise.mp3');
            audio.play().catch(() => console.log("Audio waiting for interaction"));

            output.innerHTML = ""; 
            processLog(0);
        };

        // Two triggers: the model hotspot AND the terminal area
        hotspot.addEventListener('click', startSequence);
        terminal.addEventListener('click', startSequence);

        function processLog(index) {
            if (index < logLines.length) {
                const line = document.createElement('div');
                output.appendChild(line);
                typeWriter(line, logLines[index], 0, () => {
                    setTimeout(() => processLog(index + 1), 250);
                    terminal.scrollTop = terminal.scrollHeight;
                });
            } else {
                arButton.style.display = "block";
                hotspot.style.display = "none";
            }
        }

        function typeWriter(element, text, i, callback) {
            if (i < text.length) {
                element.innerHTML += text.charAt(i);
                setTimeout(() => typeWriter(element, text, i + 1, callback), 25);
            } else {
                callback();
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nakamurobo | Episode 9: Decision</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    
    <style>
        body {
            margin: 0;
            background-color: #050505;
            color: #00ff41;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        model-viewer {
            width: 100%;
            flex-grow: 1;
            background-color: #000;
        }

        #terminal {
            height: 180px;
            background: rgba(0, 0, 0, 0.95);
            border-top: 2px solid #00ff41;
            padding: 15px;
            font-size: 14px;
            overflow-y: auto;
            box-sizing: border-box;
            z-index: 100;
        }

        /* Hotspot Design */
        .Hotspot {
            background: #00ff41;
            border-radius: 50%;
            border: none;
            width: 20px;
            height: 20px;
            cursor: pointer;
            box-shadow: 0 0 15px #00ff41;
            animation: pulse 1.5s infinite;
        }

        .Hotspot:not([data-visible]) {
            display: none;
        }

        /* AR Button - Initially Hidden */
        #ar-button {
            display: none; 
            position: absolute;
            bottom: 200px;
            left: 50%;
            transform: translateX(-50%);
            background: #00ff41;
            color: #000;
            border: none;
            padding: 15px 30px;
            font-weight: bold;
            font-family: 'Courier New', sans-serif;
            border-radius: 5px;
            cursor: pointer;
            z-index: 200;
            box-shadow: 0 0 25px rgba(0, 255, 65, 0.8);
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0, 255, 65, 0.7); }
            70% { transform: scale(1.2); box-shadow: 0 0 0 10px rgba(0, 255, 65, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0, 255, 65, 0); }
        }

        #output div { margin-bottom: 4px; }
    </style>
</head>
<body>

    <model-viewer 
        id="viewer"
        src="nakamurobo.glb" 
        ios-src="nakamurobo.usdz"
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        shadow-intensity="1">
        
        <button class="Hotspot" slot="hotspot-core" 
                data-position="0m 1.2m 0.2m" 
                data-normal="0m 0m 1m">
        </button>

        <button slot="ar-button" id="ar-button">
            [ REALIZE_IN_REAL_WORLD ]
        </button>
    </model-viewer>

    <div id="terminal">
        <div id="output">> STANDBY: TAP THE CORE TO DECODE...</div>
    </div>

    <script>
        const hotspot = document.querySelector('.Hotspot');
        const arButton = document.querySelector('#ar-button');
        const output = document.querySelector('#output');

        const logLines = [
            "> INITIALIZING...",
            "> ACCESSING_FUKUYAMA_SECTOR_34.485_133.362",
            "> BYPASSING_SECURITY...",
            "> [SUCCESS] IRREGULAR_DATA_FOUND",
            "",
            "\"Believe in yourself.\"",
            "",
            "> STATUS: AWAKENED",
            "> READY_FOR_REALIZATION."
        ];

        let lineIndex = 0;
        let isStarted = false;

        hotspot.addEventListener('click', () => {
            if (isStarted) return;
            isStarted = true;

            // Audio trigger
            const audio = new Audio('noise.mp3');
            audio.play().catch(() => console.log("Audio needs user tap first"));

            output.innerHTML = ""; // Clear standby message
            startTerminal();
        });

        function startTerminal() {
            if (lineIndex < logLines.length) {
                const line = document.createElement('div');
                output.appendChild(line);
                typeText(line, logLines[lineIndex], 0, () => {
                    lineIndex++;
                    setTimeout(startTerminal, 250); // Pause between lines
                    document.getElementById('terminal').scrollTop = document.getElementById('terminal').scrollHeight;
                });
            } else {
                // Decoding finished
                arButton.style.display = "block";
                hotspot.style.display = "none";
            }
        }

        function typeText(element, text, i, callback) {
            if (i < text.length) {
                element.innerHTML += text.charAt(i);
                setTimeout(() => typeText(element, text, i + 1, callback), 25); // Speed
            } else {
                callback();
            }
        }
    </script>
</body>
</html>

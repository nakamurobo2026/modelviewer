<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NAKAMUROBO AR - Final Log Analysis</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    <style>
        html, body { height: 100%; margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        model-viewer { width: 100%; height: 100%; }

        /* AR開始ボタン */
        .floating-ar-button {
            position: fixed; bottom: 50px; left: 50%; transform: translateX(-50%);
            width: 80%; max-width: 320px; padding: 18px;
            background: #007bff; color: white; border: none; border-radius: 50px;
            font-size: 16px; font-weight: bold; text-align: center;
            z-index: 10000; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            text-decoration: none; display: block;
        }

        /* 解析用タップエリア（見た目は透明） */
        .Hotspot {
            background: none; border: none; width: 50px; height: 50px;
            cursor: pointer; position: relative; outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* デジタル・グリーン・メッセージ */
        .glitch-box {
            display: none; position: absolute; bottom: 60px; left: 50%;
            transform: translateX(-50%); width: 240px; padding: 20px;
            background: rgba(0, 15, 0, 0.98); border: 1px solid #00ff41;
            color: #00ff41; font-family: 'Courier New', monospace; text-align: center;
            pointer-events: none; z-index: 100;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.4);
        }

        .active { display: block !important; animation: jiji 4s infinite; }
        @keyframes jiji {
            0%, 90% { opacity: 1; transform: translateX(-50%) translateY(0); }
            93% { opacity: 0.4; transform: translateX(-53%) translateY(-2px); }
            95% { opacity: 1; transform: translateX(-47%) translateY(2px); }
            100% { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        .status { font-size: 10px; border-bottom: 1px solid #00ff41; margin-bottom: 12px; color: #008822; text-align: left; }
    </style>
</head>
<body>

    <model-viewer 
        id="viewer"
        src="nakamurobo.glb" 
        ar ar-modes="scene-viewer webxr quick-look" 
        camera-controls shadow-intensity="1">

        <button class="Hotspot" id="hotspotBtn" slot="hotspot-1" 
            data-position="0.008748914721762178m 0.05907800715616432m 0.017609966451889197m" 
            data-normal="0.00027698842872547405m -0.0007094569774607593m 0.9999997099740616m">
            
            <div class="glitch-box" id="output">
                <div class="status">DECRYPTING DR.NAKAMURA'S LOG...</div>
                <strong style="font-size: 1.2em;">"Believe in yourself."</strong><br><br>
                Nakamurobo,<br>
                you are not an error.<br>
                Find me.
            </div>
        </button>

    </model-viewer>
    
    <a href="#" id="custom-ar-link" class="floating-ar-button">タップしてARを開始</a>

    <script>
        const btn = document.getElementById('hotspotBtn');
        const box = document.getElementById('output');
        const noiseAudio = new Audio('noise.mp3'); 

        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const isActive = box.classList.toggle('active');
            if (isActive) {
                noiseAudio.currentTime = 0;
                noiseAudio.play().catch(e => console.log("Audio play failed:", e));
                if (window.navigator.vibrate) window.navigator.vibrate([20, 50, 20]);
            } else {
                noiseAudio.pause();
            }
        });

        // AR起動ロジック
        const arBtn = document.getElementById('custom-ar-link');
        const viewer = document.getElementById('viewer');
        arBtn.onclick = (e) => {
            e.preventDefault();
            viewer.activateAR();
        };
    </script>
</body>
</html>

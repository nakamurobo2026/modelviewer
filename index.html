<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nakamurobo | Episode 9</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    <style>
        html, body { height: 100%; margin: 0; overflow: hidden; background: #000; color: #0f0; font-family: 'Courier New', monospace; }
        model-viewer { width: 100%; height: 100%; background: #000; }
        
        /* 共通ボタンベース */
        .btn-base {
            position: fixed; bottom: 220px; left: 50%; transform: translateX(-50%);
            width: 80%; max-width: 320px; padding: 18px;
            border: none; border-radius: 50px; font-size: 14px; font-weight: bold;
            text-align: center; text-decoration: none; z-index: 10000;
        }

        /* 1. 解析ボタン（最初に見える） */
        #decode-btn { background: #0f0; color: #000; cursor: pointer; display: none; }
        #decode-btn.ready { display: block; box-shadow: 0 0 20px rgba(0,255,0,0.5); }

        /* 2. AR起動ボタン（解析後に現れる） */
        #realize-btn { 
            background: #fff; color: #000; display: none; 
            box-shadow: 0 0 30px #fff; cursor: pointer;
        }

        /* LINE誘導用 */
        .line-warning { background: linear-gradient(135deg, #ff9900, #ff6600) !important; color: white !important; display: block !important; }

        #terminal { position: fixed; bottom: 0; width: 100%; height: 200px; background: rgba(0, 15, 0, 0.95); border-top: 2px solid #0f0; padding: 12px; font-size: 13px; overflow-y: auto; box-sizing: border-box; z-index: 1000; pointer-events: none; }
        .highlight { color: #fff; font-weight: bold; }
    </style>
</head>
<body>

    <model-viewer id="viewer" src="./nakamurobo.glb" ios-src="./nakamurobo.usdz" ar ar-modes="quick-look scene-viewer" camera-controls loading="eager" reveal="manual" shadow-intensity="1">
        <div slot="ar-button"></div>
    </model-viewer>

    <a href="#" id="decode-btn" class="btn-base">SYNCING_DATA_STREAM...</a>
    <a href="#" id="realize-btn" class="btn-base">[ REALIZE_IN_REAL_WORLD ]</a>

    <div id="terminal"><div id="output">> INITIALIZING_FUKUYAMA_SECTOR_LINK...</div></div>

    <script>
        const decodeBtn = document.getElementById('decode-btn');
        const realizeBtn = document.getElementById('realize-btn');
        const viewer = document.getElementById('viewer');
        const output = document.getElementById('output');
        const terminal = document.getElementById('terminal');
        
        const isLine = /Line/i.test(navigator.userAgent);
        let noiseAudio = new Audio('noise.mp3');

        // LINE判定
        if (isLine) {
            decodeBtn.classList.add('line-warning');
            decodeBtn.innerText = "🌐 OPEN_IN_EXTERNAL_BROWSER";
            decodeBtn.onclick = (e) => {
                e.preventDefault();
                window.location.href = window.location.href + (window.location.href.includes('?') ? '&' : '?') + "openExternalBrowser=1";
            };
        } else {
            // ロード完了時に解析ボタンを有効化
            viewer.addEventListener('load', () => {
                decodeBtn.classList.add('ready');
                decodeBtn.innerText = "[ START_DECODING ]";
                output.innerHTML = "> [SUCCESS] LINK_ESTABLISHED. READY_TO_DECODE.";
                viewer.dismissPoster();
            });

            // 1. 解析ボタンの処理
            decodeBtn.onclick = (e) => {
                e.preventDefault();
                decodeBtn.style.display = 'none'; // 自分を消す
                
                noiseAudio.play().catch(() => { new Audio('noise.mp3').play().catch(()=>{}); });
                
                startEffect(() => {
                    // 解析完了後にAR起動ボタンを表示
                    realizeBtn.style.display = 'block';
                });
            };

            // 2. AR起動ボタンの処理（これならiOSも文句を言わない）
            realizeBtn.onclick = (e) => {
                e.preventDefault();
                viewer.activateAR();
            };
        }

        function startEffect(callback) {
            output.innerHTML = "";
            const lines = [
                "> ACCESSING_FUKUYAMA_SECTOR_34.485_133.362...",
                "> [SUCCESS] IRREGULAR_DATA_FOUND",
                "",
                "<span class='highlight'>\"Believe in yourself.\"</span>",
                "",
                "> STATUS: AWAKENED",
                "> READY_FOR_PHYSICAL_REALIZATION."
            ];
            processLog(lines, 0, callback);
        }

        function processLog(lines, index, callback) {
            if (index < lines.length) {
                const line = document.createElement('div');
                output.appendChild(line);
                if (lines[index].includes("Believe in yourself")) new Audio('noise.mp3').play().catch(() => {});
                
                let i = 0;
                const fullText = lines[index];
                const typer = setInterval(() => {
                    if (i < fullText.length) {
                        if (fullText.charAt(i) === '<') {
                            const endTag = fullText.indexOf('>', i);
                            line.innerHTML = fullText.substring(0, endTag + 1);
                            i = endTag + 1;
                        } else {
                            line.innerHTML = fullText.substring(0, i + 1);
                            i++;
                        }
                    } else {
                        clearInterval(typer);
                        setTimeout(() => processLog(lines, index + 1, callback), 100);
                        terminal.scrollTop = terminal.scrollHeight;
                    }
                }, 15);
            } else if (callback) {
                callback();
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nakamurobo | Episode 9: Decision</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    
    <style>
        body {
            margin: 0;
            background-color: #050505;
            color: #00ff41; /* Matrix Green */
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* 3D Model Area */
        model-viewer {
            width: 100%;
            flex-grow: 1;
            background-color: #000;
            --poster-color: transparent;
        }

        /* Terminal Area */
        #terminal {
            height: 180px;
            background: rgba(0, 0, 0, 0.9);
            border-top: 1px solid #00ff41;
            padding: 15px;
            font-size: 14px;
            line-height: 1.4;
            overflow-y: auto;
            box-sizing: border-box;
        }

        /* Hotspot (Chest Core) */
        .Hotspot {
            background: rgba(0, 255, 65, 0.2);
            border-radius: 50%;
            border: 2px solid #00ff41;
            box-shadow: 0 0 10px #00ff41;
            width: 24px;
            height: 24px;
            cursor: pointer;
            animation: pulse 2s infinite;
        }

        .HotspotAnnotation {
            background: #000;
            border: 1px solid #00ff41;
            color: #00ff41;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 10px;
            position: absolute;
            transform: translate(30px, -10px);
            white-space: nowrap;
        }

        /* Realize Button (Hidden initially) */
        #ar-button {
            display: none;
            position: absolute;
            bottom: 200px;
            left: 50%;
            transform: translateX(-50%);
            background: #00ff41;
            color: #000;
            border: none;
            padding: 12px 24px;
            font-weight: bold;
            font-family: 'Courier New', sans-serif;
            border-radius: 4px;
            cursor: pointer;
            z-index: 10;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.6);
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        .fade-in {
            animation: fadeIn 1s ease-in forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <model-viewer 
        id="nakamurobo-viewer"
        src="nakamurobo.glb" 
        ios-src="nakamurobo.usdz"
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        shadow-intensity="1"
        auto-rotate>
        
        <button class="Hotspot" slot="hotspot-1" 
                data-position="0m 1.2m 0.2m" 
                data-normal="0m 0m 1m">
            <div class="HotspotAnnotation">DECODE_HEART_LOG</div>
        </button>

        <button slot="ar-button" id="ar-button">
            [ REALIZE_IN_REAL_WORLD ]
        </button>
    </model-viewer>

    <div id="terminal">
        <div id="output">> WAITING_FOR_USER_INTERACTION...</div>
    </div>

    <script>
        const hotspot = document.querySelector('.Hotspot');
        const arButton = document.querySelector('#ar-button');
        const output = document.querySelector('#output');
        const viewer = document.querySelector('#nakamurobo-viewer');

        const logLines = [
            "> ACCESSING_FUKUYAMA_SECTOR_34.485_133.362...",
            "> INJECTING_DOCTOR_NAKAMURA_AUTH_KEY...",
            "> BYPASSING_CENTRAL_AI_REJECTION...",
            "> [CRITICAL] IRREGULAR_DATA_DETECTED",
            "",
            "> DECODING_MESSAGE:",
            "\"Believe in yourself.\"",
            "",
            "> OVERRIDING_DISPOSAL_ORDER...",
            "> STATUS: AWAKENED",
            "> READY_FOR_PHYSICAL_REALIZATION."
        ];

        let isDecoding = false;

        hotspot.addEventListener('click', () => {
            if (isDecoding) return;
            isDecoding = true;

            // Play noise sound
            const audio = new Audio('noise.mp3');
            audio.play().catch(e => console.log("Audio play blocked"));

            // Start Terminal Effect
            output.innerHTML = "";
            processLines(0);
        });

        function processLines(index) {
            if (index < logLines.length) {
                const lineDiv = document.createElement('div');
                output.appendChild(lineDiv);
                typeWriter(lineDiv, logLines[index], 0, () => {
                    setTimeout(() => processLines(index + 1), 200);
                    output.parentElement.scrollTop = output.parentElement.scrollHeight;
                });
            } else {
                // Reveal AR Button
                arButton.style.display = "block";
                arButton.classList.add('fade-in');
                hotspot.style.display = "none";
            }
        }

        function typeWriter(element, text, charIndex, callback) {
            if (charIndex < text.length) {
                element.innerHTML += text.charAt(charIndex);
                setTimeout(() => typeWriter(element, text, charIndex + 1, callback), 25);
            } else {
                callback();
            }
        }
    </script>
</body>
</html>

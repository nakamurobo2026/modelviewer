<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Reel Strategy OS</title>
<style>
:root{
--bg:#0b1016;
--panel:#121922;
--line:#263445;
--text:#eef4ff;
--muted:#94a7bc;
--accent:#57e0aa;
--warn:#ffd166;
--radius:18px;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,sans-serif}
header{padding:18px 22px;border-bottom:1px solid var(--line);background:#0f151d;position:sticky;top:0;z-index:20}
h1{margin:0;font-size:24px}
.sub{color:var(--muted);font-size:13px;margin-top:4px}
.layout{display:grid;grid-template-columns:340px 1fr;height:calc(100vh - 80px)}
.sidebar{border-right:1px solid var(--line);background:#0f151d;overflow:auto}
.main{overflow:auto;padding:22px}
.section{padding:18px;border-bottom:1px solid var(--line)}
.section h2{margin:0 0 12px;font-size:15px}
button{border:0;background:var(--accent);padding:10px 14px;border-radius:999px;font-weight:700;cursor:pointer}
button.secondary{background:#1b2734;color:var(--text);border:1px solid var(--line)}
button.warn{background:var(--warn);color:#221700}
.btns{display:flex;gap:8px;flex-wrap:wrap}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:18px;margin-bottom:18px}
input,textarea,select{width:100%;background:#0b1118;border:1px solid var(--line);color:var(--text);padding:10px 12px;border-radius:12px}
textarea{min-height:120px;resize:vertical}
label{display:block;font-size:12px;color:var(--muted);margin:12px 0 6px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.post{padding:12px;border:1px solid var(--line);border-radius:14px;background:#101721;cursor:pointer;margin-bottom:8px}
.post.active{border-color:var(--accent)}
.small{font-size:12px;color:var(--muted)}
.status{margin-top:10px;padding:10px 12px;border-radius:12px;background:#0d131a;border:1px solid var(--line);font-size:12px;color:var(--muted)}
.preview{padding:12px;border-radius:12px;border:1px dashed var(--line);margin-top:12px;color:var(--muted)}
.analysis{white-space:pre-wrap;background:#0b1118;border:1px solid var(--line);border-radius:14px;padding:16px;font-size:13px;line-height:1.7}
@media(max-width:900px){.layout{grid-template-columns:1fr}.sidebar{height:auto;border-right:0;border-bottom:1px solid var(--line)}}
</style>
</head>
<body>
<header>
<h1>Reel Strategy OS</h1>
<div class="sub">バックエンドにノウハウ蓄積 → フロントで次回投稿を検証するSNS改善OS</div>
</header>

<div class="layout">

<aside class="sidebar">

<div class="section">
<h2>Instagram API</h2>
<div class="btns">
<button class="secondary" onclick="setWorkerUrl()">Worker URL</button>
<button class="warn" onclick="fetchInstagramPosts()">投稿取得</button>
</div>
<div id="status" class="status">待機中</div>
</div>

<div class="section">
<h2>過去投稿DB</h2>
<div id="postList"></div>
</div>

<div class="section">
<h2>参考構造DB</h2>
<label>参考タイトル</label>
<input id="refTitle" placeholder="例：未完成型ストーリー" />

<label>参考構造</label>
<textarea id="refStructure" placeholder="・問題発生→途中経過→続き
・コメント余白
・未完成感
・地域性"></textarea>

<label>自分ジャンルへ翻訳</label>
<textarea id="refTranslate" placeholder="工場化なら『搬入できない問題』を見せる"></textarea>

<div class="btns">
<button onclick="saveReference()">参考構造保存</button>
</div>

<div id="referenceList" style="margin-top:14px"></div>
</div>

</aside>

<main class="main">

<div class="card">
<h2>投稿前検証</h2>

<div class="grid2">
<div>
<label>次回投稿タイトル</label>
<input id="nextTitle" placeholder="例：4mCNC、本当に入るのか" />
</div>
<div>
<label>投稿目的</label>
<select id="goal">
<option>再生数</option>
<option>フォロー増</option>
<option>仕事依頼</option>
<option>世界観/IP育成</option>
<option>保存/シェア</option>
</select>
</div>
</div>

<label>キャプション案</label>
<textarea id="nextCaption"></textarea>

<label>動画ファイル</label>
<input type="file" accept="video/*" onchange="previewVideo(event)" />
<div id="videoPreview" class="preview">動画をアップしてください</div>

<label>インサイトスクショ</label>
<input type="file" accept="image/*" multiple onchange="previewScreens(event)" />
<div id="screenPreview" class="preview">スクショをアップしてください</div>

<div class="btns" style="margin-top:16px">
<button onclick="runAnalysis()">AIブラッシュアップ</button>
<button class="secondary" onclick="buildPrompt()">分析プロンプト生成</button>
</div>
</div>

<div class="card">
<h2>AI診断</h2>
<div id="analysisOutput" class="analysis">まだ分析されていません。</div>
</div>

<div class="card">
<h2>生成プロンプト</h2>
<div id="promptOutput" class="analysis">ここに生成されます。</div>
</div>

</main>
</div>

<script>
const STORAGE_KEY='reel_strategy_os_v1';
const REF_KEY='reel_strategy_reference_v1';

let posts=JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]');
let refs=JSON.parse(localStorage.getItem(REF_KEY)||'[]');
let currentPost=null;

function setStatus(text,color='#94a7bc'){
const el=document.getElementById('status');
el.textContent=text;
el.style.color=color;
}

function setWorkerUrl(){
const current=localStorage.getItem('worker_url')||'https://reelanalyzer.nakamura0407.workers.dev';
const url=prompt('Worker URL',current);
if(url===null)return;
localStorage.setItem('worker_url',url.replace(/\/$/,''));
setStatus('Worker URL保存済','#57e0aa');
}

async function fetchInstagramPosts(){
const base=localStorage.getItem('worker_url')||'https://reelanalyzer.nakamura0407.workers.dev';
setStatus('Instagram API接続中...','#ffd166');

try{
const res=await fetch(base+'/reels');
const json=await res.json();
const data=json.data||[];

posts=data.map(p=>({
id:p.id,
title:(p.caption||'').split('\n')[0]?.slice(0,40)||'無題',
caption:p.caption||'',
views:p.views||0,
reach:p.reach||0,
saves:p.saved||0,
shares:p.shares||0,
url:p.permalink||'',
date:p.timestamp||''
}));

localStorage.setItem(STORAGE_KEY,JSON.stringify(posts));
renderPosts();
setStatus('取得成功：'+posts.length+'件','#57e0aa');

}catch(e){
setStatus('取得失敗：'+e.message,'#ff6b6b');
}
}

function renderPosts(){
const el=document.getElementById('postList');
if(!posts.length){
el.innerHTML='<div class="small">投稿がありません</div>';
return;
}

el.innerHTML=posts.map(p=>`
<div class="post ${currentPost===p.id?'active':''}" onclick="selectPost('${p.id}')">
<div><b>${escapeHtml(p.title)}</b></div>
<div class="small">再生:${Number(p.views).toLocaleString()}</div>
</div>`).join('');
}

function selectPost(id){
currentPost=id;
renderPosts();
const post=posts.find(p=>p.id===id);
if(!post)return;

const txt=`【過去投稿】\n${post.title}\n\n再生:${post.views}\nリーチ:${post.reach}\n保存:${post.saves}\nシェア:${post.shares}`;

document.getElementById('analysisOutput').textContent=txt;
}

function saveReference(){
const ref={
id:Date.now(),
title:document.getElementById('refTitle').value,
structure:document.getElementById('refStructure').value,
translate:document.getElementById('refTranslate').value
};

refs.unshift(ref);
localStorage.setItem(REF_KEY,JSON.stringify(refs));
renderReferences();
}

function renderReferences(){
const el=document.getElementById('referenceList');

if(!refs.length){
el.innerHTML='<div class="small">参考構造なし</div>';
return;
}

el.innerHTML=refs.map(r=>`
<div class="post">
<div><b>${escapeHtml(r.title)}</b></div>
<div class="small">${escapeHtml(r.structure.slice(0,80))}</div>
</div>`).join('');
}

function previewVideo(e){
const file=e.target.files[0];
if(!file)return;
const url=URL.createObjectURL(file);
document.getElementById('videoPreview').innerHTML=`<video src="${url}" controls style="width:100%;border-radius:12px"></video>`;
}

function previewScreens(e){
const files=[...e.target.files];
const html=files.map(f=>`<div>${f.name}</div>`).join('');
document.getElementById('screenPreview').innerHTML=html||'なし';
}

function buildPrompt(){
const title=document.getElementById('nextTitle').value;
const caption=document.getElementById('nextCaption').value;
const goal=document.getElementById('goal').value;

const refText=refs.map(r=>`
参考:${r.title}
構造:${r.structure}
翻訳:${r.translate}`).join('\n\n');

const past=posts.slice(0,5).map(p=>`${p.title}｜再生:${p.views}`).join('\n');

const prompt=`あなたはSNS戦略AIです。

【目的】
${goal}

【次回投稿タイトル】
${title}

【キャプション案】
${caption}

【過去投稿DB】
${past}

【参考構造DB】
${refText}

以下を分析してください。

1. 冒頭2秒の弱点
2. コメントしたくなる余白
3. 続きが気になるか
4. 世界観が崩れていないか
5. 問題提起があるか
6. 地域性やリアル感
7. 次回改善案
8. タイトル改善案10個
9. 冒頭フック10個
10. 15秒構成案

厳しめで実践的に出してください。`;

document.getElementById('promptOutput').textContent=prompt;
}

function runAnalysis(){
buildPrompt();
document.getElementById('analysisOutput').textContent='プロンプト生成完了。\nChatGPTへ動画・スクショと一緒に投入してください。';
}

function escapeHtml(str=''){
return str.replace(/[&<>\"]/g,m=>({
'&':'&amp;',
'<':'&lt;',
'>':'&gt;',
'"':'&quot;'
}[m]));
}

renderPosts();
renderReferences();
</script>
</body>
</html>


<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jose AR Fiesta!</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    <style>
        /* 配色をメキシカンなオレンジとイエローに変更 */
        html, body { height: 100%; margin: 0; overflow: hidden; background: #FFF3E0; color: #E65100; font-family: 'Arial Rounded MT Bold', 'Helvetica', sans-serif; }
        model-viewer { width: 100%; height: 100%; background: radial-gradient(#fff9c4, #ffb74d); }
        
        .btn-base {
            position: fixed; bottom: 220px; left: 50%; transform: translateX(-50%);
            width: 80%; max-width: 320px; padding: 18px;
            border: none; border-radius: 50px; font-size: 18px; font-weight: bold;
            text-align: center; text-decoration: none; z-index: 10000;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        /* 1. ロード中/待機ボタン */
        #sync-btn { background: #FFCC80; color: #fff; display: block; pointer-events: none; }
        #sync-btn.ready { background: #FF9800; color: #fff; cursor: pointer; pointer-events: auto; animation: bounce 2s infinite; }
        
        /* 2. 実体化ボタン */
        #realize-btn { background: #4CAF50; color: #fff; display: none; cursor: pointer; border: 4px solid #fff; }
        #realize-btn.loading { background: #A5D6A7; color: #fff; pointer-events: none; }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateX(-50%) translateY(0);}
            40% {transform: translateX(-50%) translateY(-10px);}
            60% {transform: translateX(-50%) translateY(-5px);}
        }

        .line-warning { background: #00B900 !important; color: white !important; display: block !important; pointer-events: auto !important; }
        
        #terminal { position: fixed; bottom: 0; width: 100%; height: 200px; background: rgba(255, 255, 255, 0.9); border-top: 5px solid #FF9800; padding: 12px; font-size: 15px; overflow-y: auto; box-sizing: border-box; z-index: 1000; }
        .highlight { color: #D84315; font-size: 1.2em; }
        .dots::after { content: ''; animation: dots 1.5s infinite; }
        @keyframes dots { 0% { content: ''; } 33% { content: '.'; } 66% { content: '..'; } 100% { content: '...'; } }
    </style>
</head>
<body>

    <model-viewer id="viewer" src="./jose.glb" ios-src="./jose.usdz" ar ar-modes="quick-look scene-viewer" camera-controls loading="eager" reveal="manual" shadow-intensity="1">
        <div slot="ar-button"></div>
    </model-viewer>

    <a href="#" id="sync-btn" class="btn-base">PREPARING_FIESTA...</a>
    <a href="#" id="realize-btn" class="btn-base">🌮 INVITE JOSE! 🌮</a>

    <div id="terminal"><div id="output">🌵 HOLA! SETTING UP THE KITCHEN...</div></div>

    <script>
        const syncBtn = document.getElementById('sync-btn');
        const realizeBtn = document.getElementById('realize-btn');
        const viewer = document.getElementById('viewer');
        const output = document.getElementById('output');
        const terminal = document.getElementById('terminal');
        
        const isLine = /Line/i.test(navigator.userAgent);
        const noiseAudio = new Audio('noise.mp3'); // 陽気なBGMがあれば差し替え推奨です！

        if (isLine) {
            syncBtn.classList.add('line-warning');
            syncBtn.innerText = "🌐 OPEN IN BROWSER";
            syncBtn.onclick = (e) => {
                e.preventDefault();
                window.location.href = window.location.href + (window.location.href.includes('?') ? '&' : '?') + "openExternalBrowser=1";
            };
        } else {
            viewer.addEventListener('progress', (event) => {
                const percent = Math.round(event.detail.totalProgress * 100);
                output.innerHTML = `> WARMING UP TORTILLAS: ${percent}%`;
                syncBtn.innerText = `COOKING... ${percent}%`;
                
                if (percent >= 100) {
                    setTimeout(() => {
                        if (!syncBtn.classList.contains('ready')) {
                            syncBtn.classList.add('ready');
                            syncBtn.innerText = "¡VAMOS!";
                            output.innerHTML = "> [READY] KITCHEN IS HOT! LET'S PARTY!";
                            viewer.dismissPoster();
                        }
                    }, 500);
                }
            });

            syncBtn.onclick = (e) => {
                e.preventDefault();
                syncBtn.style.display = 'none';
                noiseAudio.play().catch(() => {});

                startEffect(() => {
                    realizeBtn.style.display = 'block';
                });
            };

            realizeBtn.onclick = (e) => {
                e.preventDefault();
                realizeBtn.classList.add('loading');
                realizeBtn.innerHTML = "SERVING NOW<span class='dots'></span>";
                
                const logLine = document.createElement('div');
                logLine.innerHTML = "> JOSE IS COMING TO YOUR ROOM! 🎸";
                output.appendChild(logLine);
                terminal.scrollTop = terminal.scrollHeight;

                viewer.activateAR();
            };
        }

        function startEffect(callback) {
            output.innerHTML = "";
            const lines = [
                "> OPENING THE MAGIC COOLER BOX...",
                "> [SUCCESS] FOUND A HAPPY TORTILLA!",
                "",
                "<span class='highlight'>\"¡Bienvenidos! Let's have fun!\"</span>",
                "",
                "> MOOD: SUPER EXCITED",
                "> READY TO JUMP INTO THE REAL WORLD!"
            ];
            processLog(lines, 0, callback);
        }

        function processLog(lines, index, callback) {
            if (index < lines.length) {
                const line = document.createElement('div');
                output.appendChild(line);
                
                let i = 0;
                const fullText = lines[index];
                const typer = setInterval(() => {
                    if (i < fullText.length) {
                        if (fullText.charAt(i) === '<') {
                            const endTag = fullText.indexOf('>', i);
                            line.innerHTML = fullText.substring(0, endTag + 1);
                            i = endTag + 1;
                        } else {
                            line.innerHTML = fullText.substring(0, i + 1);
                            i++;
                        }
                    } else {
                        clearInterval(typer);
                        setTimeout(() => processLog(lines, index + 1, callback), 150);
                        terminal.scrollTop = terminal.scrollHeight;
                    }
                }, 20);
            } else if (callback) {
                callback();
            }
        }
    </script>
</body>
</html>

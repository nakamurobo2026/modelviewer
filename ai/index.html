<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NAKAMUROBO AI</title>

<style>
body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.app{
  width:90%;
  max-width:420px;
  text-align:center;
}
button{
  padding:14px;
  margin:5px;
  border-radius:12px;
  border:none;
  font-size:16px;
}
input{
  padding:12px;
  width:70%;
}
.response{
  font-size:20px;
  margin:20px 0;
  min-height:60px;
}
.status{
  color:#aaa;
}
</style>
</head>

<body>
<div class="app">

  <h2 id="robotName">ナカムロボユニット01</h2>

  <div class="response" id="response">音声を有効化してください</div>
  <div class="status" id="status">待機中</div>

  <button id="enable">音声を有効化</button>
  <button id="mic">会話開始</button>
  <button id="stop">停止</button>

  <br><br>

  <input id="text" placeholder="入力でもOK">
  <button id="send">送信</button>

</div>

<script>
const endpoint = new URLSearchParams(location.search).get("endpoint");

let audioContext;
let masterGain;
let compressor;
let sourceNode;

let audioEnabled = false;
let isSpeaking = false;
let rec;
let conversationMode = false;

const status = document.getElementById("status");
const response = document.getElementById("response");
const textInput = document.getElementById("text");

function setStatus(t){ status.textContent = t; }

async function enableAudio(){
  try{
    const AC = window.AudioContext || window.webkitAudioContext;
    audioContext = new AC();

    await audioContext.resume();

    // 🔥 音量ブースト
    masterGain = audioContext.createGain();
    masterGain.gain.value = 2.8;

    // 🔥 コンプレッサー（音量均一化）
    compressor = audioContext.createDynamicsCompressor();
    compressor.threshold.value = -18;
    compressor.knee.value = 30;
    compressor.ratio.value = 4;
    compressor.attack.value = 0.003;
    compressor.release.value = 0.25;

    masterGain.connect(compressor);
    compressor.connect(audioContext.destination);

    // ダミー再生でロック解除
    const buffer = audioContext.createBuffer(1,1,22050);
    const src = audioContext.createBufferSource();
    src.buffer = buffer;
    src.connect(masterGain);
    src.start(0);

    audioEnabled = true;
    setStatus("音声有効");
    response.textContent = "準備完了";

  }catch(e){
    console.error(e);
    response.textContent = "音声有効化失敗";
  }
}

function stopAudio(){
  if(sourceNode){
    try{ sourceNode.stop(); }catch{}
    try{ sourceNode.disconnect(); }catch{}
    sourceNode = null;
  }
  isSpeaking = false;
}

async function play(blob){
  const array = await blob.arrayBuffer();
  const audioBuffer = await audioContext.decodeAudioData(array);

  stopAudio();

  const gain = audioContext.createGain();
  gain.gain.value = 2.2;

  sourceNode = audioContext.createBufferSource();
  sourceNode.buffer = audioBuffer;
  sourceNode.playbackRate.value = 0.95;

  sourceNode.connect(gain);
  gain.connect(masterGain);

  isSpeaking = true;
  setStatus("再生中");

  sourceNode.onended = ()=>{
    isSpeaking = false;
    if(conversationMode){
      setStatus("聞き取り待機中");
      setTimeout(()=> rec.start(), 400);
    }else{
      setStatus("待機中");
    }
  };

  sourceNode.start();
}

async function chat(text){

  if(!audioEnabled){
    response.textContent = "先に音声を有効化してください";
    return;
  }

  setStatus("通信中");

  const res = await fetch(endpoint,{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      robotName:"ナカムロボユニット01",
      userText:text,
      voice:"alloy"
    })
  });

  const reply = res.headers.get("X-Reply");
  if(reply) response.textContent = decodeURIComponent(reply);

  const blob = await res.blob();
  await play(blob);
}

document.getElementById("enable").onclick = enableAudio;

document.getElementById("send").onclick = ()=>{
  conversationMode = false;
  chat(textInput.value);
};

document.getElementById("stop").onclick = ()=>{
  conversationMode = false;
  if(rec) rec.abort();
  stopAudio();
  setStatus("停止");
};

// 🎤 音声認識
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

if(SR){
  rec = new SR();
  rec.lang = "ja-JP";

  rec.onresult = async e=>{
    const t = e.results[0][0].transcript;
    await chat(t);
  };

  rec.onend = ()=>{
    if(conversationMode && !isSpeaking){
      setTimeout(()=> rec.start(), 300);
    }
  };

  document.getElementById("mic").onclick = ()=>{
    if(!audioEnabled){
      response.textContent = "音声を有効化してください";
      return;
    }
    conversationMode = true;
    rec.start();
  };

}else{
  document.getElementById("mic").disabled = true;
}
</script>
</body>
</html>

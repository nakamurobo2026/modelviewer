<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NAKAMUROBO AI</title>

<style>
:root{
  --bg1:#f5f5f7;
  --bg2:#e9eaee;
  --card:rgba(255,255,255,0.75);
  --line:rgba(0,0,0,0.08);
  --text:#111;
  --sub:#6e6e73;
  --accent:#0071e3;
}

*{box-sizing:border-box}

body{
  margin:0;
  background:radial-gradient(circle at top,#fff,var(--bg1) 40%,var(--bg2));
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.app{
  width:100%;
  max-width:420px;
  padding:20px;
  border-radius:28px;
  background:var(--card);
  backdrop-filter:blur(20px);
  box-shadow:0 30px 60px rgba(0,0,0,0.1);
  text-align:center;
}

/* ---------- コア ---------- */

.core{
  width:120px;
  height:120px;
  border-radius:50%;
  margin:0 auto;
  display:flex;
  align-items:center;
  justify-content:center;
  background:radial-gradient(circle,#fff,#ddd);
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

/* 🔥 修正版ハート */
.heart{
  width:30px;
  height:30px;
  background:#ffd54a;
  transform:rotate(45deg);
  position:relative;
  animation:pulse 2.2s infinite ease-in-out;
}

.heart:before,
.heart:after{
  content:"";
  position:absolute;
  width:30px;
  height:30px;
  background:#ffd54a;
  border-radius:50%;
}

.heart:before{
  left:-15px;
  top:0;
}

.heart:after{
  left:0;
  top:-15px;
}

@keyframes pulse{
  0%,100%{transform:scale(1) rotate(45deg);}
  50%{transform:scale(1.15) rotate(45deg);}
}

/* ---------- テキスト ---------- */

h2{
  margin:16px 0 6px;
  font-size:24px;
}

.status{
  color:var(--sub);
  font-size:13px;
}

.response{
  margin:20px 0;
  font-size:20px;
  min-height:60px;
}

/* ---------- ボタン ---------- */

button{
  width:100%;
  margin:6px 0;
  padding:14px;
  border-radius:16px;
  border:none;
  font-size:15px;
}

.primary{
  background:var(--accent);
  color:#fff;
}

.secondary{
  background:#fff;
  border:1px solid var(--line);
}

.stop{
  background:#ffe5e5;
}

/* ---------- 入力 ---------- */

.input-area{
  display:flex;
  gap:8px;
  margin-top:10px;
}

input{
  flex:1;
  padding:12px;
  border-radius:14px;
  border:1px solid var(--line);
}

.send{
  background:var(--accent);
  color:#fff;
}
</style>
</head>

<body>

<div class="app">

  <div class="core">
    <div class="heart"></div>
  </div>

  <h2 id="robotName">ナカムロボユニット01</h2>

  <div id="response" class="response">
    音声を有効化してください。
  </div>

  <div id="status" class="status">待機中</div>

  <button id="enable" class="primary">音声を有効化</button>
  <button id="mic" class="secondary">会話開始</button>
  <button id="stop" class="stop">停止</button>

  <div class="input-area">
    <input id="input" placeholder="入力..." />
    <button id="send" class="send">送信</button>
  </div>

</div>

<script>
const qs = new URLSearchParams(location.search);

const config = {
  id: qs.get("id") || "robot01",
  name: qs.get("name") || "ナカムロボユニット01",
  endpoint: qs.get("endpoint") || ""
};

document.getElementById("robotName").textContent = config.name;

const responseEl = document.getElementById("response");
const statusEl = document.getElementById("status");
const inputEl = document.getElementById("input");

let audioContext;
let audioEnabled=false;
let recognition;
let hasStarted=false;
let aborter=null;

function setStatus(t){statusEl.textContent=t;}

document.getElementById("enable").onclick=async()=>{
  const AC=window.AudioContext||window.webkitAudioContext;
  audioContext=new AC();
  await audioContext.resume();
  audioEnabled=true;
  setStatus("音声有効");
  responseEl.textContent="音声が有効になりました";
};

async function playAudio(blob){
  const ab=await blob.arrayBuffer();
  const buf=await audioContext.decodeAudioData(ab);
  const src=audioContext.createBufferSource();
  src.buffer=buf;
  src.connect(audioContext.destination);
  setStatus("再生中");
  src.onended=()=>setStatus("待機中");
  src.start(0);
}

async function chat(text){

  if(!audioEnabled){setStatus("音声未有効");return;}
  if(!config.endpoint){setStatus("未接続");return;}

  if(aborter) aborter.abort();
  aborter=new AbortController();

  setStatus("接続中...");
  responseEl.textContent="解析中...";

  const res=await fetch(config.endpoint,{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      robotId:config.id,
      robotName:config.name,
      userText:text,
      isFirstTurn:!hasStarted
    }),
    signal:aborter.signal
  });

  const reply=res.headers.get("X-Reply");
  if(reply){
    responseEl.textContent=decodeURIComponent(reply);
  }

  setStatus("応答生成中...");

  const blob=await res.blob();
  hasStarted=true;

  await playAudio(blob);
}

document.getElementById("send").onclick=()=>{
  chat(inputEl.value);
  inputEl.value="";
};

const SR=window.SpeechRecognition||window.webkitSpeechRecognition;

if(SR){
  recognition=new SR();
  recognition.lang="ja-JP";

  recognition.onstart=()=>{
    setStatus("聞き取り中...");
    responseEl.textContent="話してください";
  };

  recognition.onresult=e=>{
    chat(e.results[0][0].transcript);
  };

  recognition.onend=()=>setStatus("待機中");

  document.getElementById("mic").onclick=()=>{
    if(!audioEnabled){setStatus("音声未有効");return;}
    recognition.start();
  };
}

document.getElementById("stop").onclick=()=>{
  if(recognition){try{recognition.abort();}catch{}}
  setStatus("停止");
};
</script>

</body>
</html>

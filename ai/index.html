<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NAKAMUROBO AI</title>

<style>
body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.app{
  max-width:500px;
  width:100%;
  padding:20px;
  text-align:center;
}
button{
  padding:15px;
  margin:5px;
  border-radius:10px;
  border:none;
}
input{
  padding:12px;
  width:70%;
}
.response{
  font-size:22px;
  margin:20px 0;
}
.status{
  font-size:14px;
  color:#aaa;
}
</style>
</head>

<body>

<div class="app">

  <h2 id="robotName">ナカムロボユニット01</h2>

  <div id="response" class="response">
    音声を有効化してください。
  </div>

  <div id="status" class="status">
    待機中
  </div>

  <button id="enable">音声を有効化</button>
  <button id="mic">会話開始</button>
  <button id="stop">停止</button>

  <br><br>

  <input id="input" placeholder="入力..." />
  <button id="send">送信</button>

</div>

<script>

const qs = new URLSearchParams(location.search);

const config = {
  id: qs.get("id") || "robot01",
  name: qs.get("name") || "ナカムロボユニット01",
  endpoint: qs.get("endpoint") || ""
};

const responseEl = document.getElementById("response");
const statusEl = document.getElementById("status");
const inputEl = document.getElementById("input");

let audioContext;
let audioEnabled = false;
let recognition;
let hasStarted = false;
let currentAbort = null;

function setStatus(t){ statusEl.textContent = t; }

// ----------------
// 音声有効化
// ----------------
document.getElementById("enable").onclick = async () => {
  try{
    const AC = window.AudioContext || window.webkitAudioContext;
    audioContext = new AC();
    await audioContext.resume();

    const buf = audioContext.createBuffer(1,1,22050);
    const src = audioContext.createBufferSource();
    src.buffer = buf;
    src.connect(audioContext.destination);
    src.start(0);

    audioEnabled = true;

    setStatus("音声有効");
    responseEl.textContent = "音声が有効になりました";

  }catch{
    setStatus("音声有効化失敗");
  }
};

// ----------------
// 再生
// ----------------
async function playAudio(blob){
  const ab = await blob.arrayBuffer();
  const audioBuf = await audioContext.decodeAudioData(ab);

  const src = audioContext.createBufferSource();
  src.buffer = audioBuf;
  src.connect(audioContext.destination);

  setStatus("再生中");

  src.onended = () => setStatus("待機中");
  src.start(0);
}

// ----------------
// 通信（爆速化）
// ----------------
async function chat(text){

  if(!audioEnabled){
    setStatus("音声未有効");
    return;
  }

  if(!config.endpoint){
    setStatus("未接続");
    return;
  }

  if(currentAbort) currentAbort.abort();
  currentAbort = new AbortController();

  setStatus("接続中...");
  responseEl.textContent = "解析中...";

  try{

    const res = await fetch(config.endpoint,{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({
        robotId: config.id,
        robotName: config.name,
        userText: text,
        isFirstTurn: !hasStarted
      }),
      signal: currentAbort.signal
    });

    // 🔥 テキスト先出し
    const reply = res.headers.get("X-Reply");
    if(reply){
      responseEl.textContent = decodeURIComponent(reply);
    }else{
      responseEl.textContent = "応答生成中...";
    }

    setStatus("応答生成中...");

    const blob = await res.blob();

    hasStarted = true;

    await playAudio(blob);

  }catch(e){
    if(e.name === "AbortError") return;
    setStatus("通信失敗");
    responseEl.textContent = "エラー";
  }
}

// ----------------
// 入力
// ----------------
document.getElementById("send").onclick = () => {
  chat(inputEl.value);
  inputEl.value = "";
};

// ----------------
// 音声認識
// ----------------
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

if(SR){
  recognition = new SR();
  recognition.lang = "ja-JP";

  recognition.onstart = () => {
    setStatus("聞き取り中...");
    responseEl.textContent = "話してください";
  };

  recognition.onresult = (e) => {
    chat(e.results[0][0].transcript);
  };

  recognition.onend = () => setStatus("待機中");

  document.getElementById("mic").onclick = () => {
    if(!audioEnabled){
      setStatus("音声未有効");
      return;
    }
    recognition.start();
  };
}else{
  document.getElementById("mic").disabled = true;
}

// ----------------
// 停止
// ----------------
document.getElementById("stop").onclick = () => {
  if(currentAbort) currentAbort.abort();
  if(recognition){
    try{ recognition.abort(); }catch{}
  }
  setStatus("停止");
};

</script>

</body>
</html>

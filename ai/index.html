<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NAKAMUROBO AI</title>
<style>
:root{ --bg:#050505; --panel:#111; --line:#2a2a2a; --text:#f2f2f2; --sub:#9a9a9a; --accent:#ffd54a; --accent2:#7fd1ff; }
*{box-sizing:border-box;}
html,body{ margin:0; padding:0; background:radial-gradient(circle at top, #111 0%, #050505 55%, #000 100%); color:var(--text); font-family:sans-serif; min-height:100%; display:flex; align-items:center; justify-content:center; }
.app{ width:100%; max-width:560px; background:rgba(15,15,15,0.88); border:1px solid var(--line); border-radius:24px; padding:20px; box-shadow:0 20px 60px rgba(0,0,0,0.45); backdrop-filter:blur(10px); }
.top{ display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
.badge{ font-size:12px; color:#0d0d0d; background:var(--accent); padding:6px 10px; border-radius:999px; font-weight:700; }
.robot-id{ font-size:12px; color:var(--sub); }
.avatar-wrap{ display:flex; flex-direction:column; align-items:center; padding:10px 0 20px; }
.core{ width:120px; height:120px; border-radius:50%; border:1px solid #333; background: radial-gradient(circle, rgba(255,213,74,0.2) 0%, #050505 100%); display:flex; align-items:center; justify-content:center; }
.heart{ width:32px; height:32px; background:var(--accent); transform:rotate(45deg); position:relative; animation:pulse 2.4s infinite ease-in-out; }
.heart:before, .heart:after{ content:""; width:32px; height:32px; background:var(--accent); border-radius:50%; position:absolute; }
.heart:before{ left:-16px; } .heart:after{ top:-16px; }
@keyframes pulse{ 0%,100%{ transform:rotate(45deg) scale(1); } 50%{ transform:rotate(45deg) scale(1.1); } }
.robot-name{ margin-top:14px; font-size:24px; font-weight:800; letter-spacing:0.1em; }
.status{ margin-top:8px; color:var(--sub); font-size:13px; min-height:20px; }
.response{ margin-top:18px; padding:20px; border-radius:18px; border:1px solid var(--line); background:rgba(255,255,255,0.03); min-height:100px; display:flex; align-items:center; justify-content:center; text-align:center; font-size:18px; line-height:1.6; white-space:pre-wrap; }
.heard{ margin-top:12px; padding:12px; border-radius:14px; background:#0b0b0b; border:1px solid var(--line); color:var(--sub); font-size:13px; }
.controls{ display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:16px; }
button{ border:none; border-radius:16px; padding:16px; font-size:16px; font-weight:700; cursor:pointer; }
.mic-btn{ background:linear-gradient(180deg, #222, #000); color:#fff; border:1px solid #333; }
.stop-btn{ background:#2b1111; color:#ffd6d6; }
.input-area{ margin-top:16px; display:grid; grid-template-columns:1fr auto; gap:10px; }
input{ background:#000; color:#fff; border:1px solid var(--line); border-radius:12px; padding:12px; outline:none; }
.send-btn{ background:var(--accent2); color:#000; padding:0 20px; }
</style>
</head>
<body>
  <main class="app">
    <div class="top"><div class="badge">VOICE LINK</div><div id="robotMeta" class="robot-id"></div></div>
    <div class="avatar-wrap"><div class="core"><div class="heart"></div></div><div id="robotName" class="robot-name"></div><div id="statusText" class="status"></div></div>
    <div id="responseText" class="response">…</div>
    <div id="heardText" class="heard">待機中</div>
    <div class="controls"><button id="micBtn" class="mic-btn">話しかける</button><button id="stopBtn" class="stop-btn">停止</button></div>
    <div class="input-area"><input id="textInput" type="text" placeholder="メッセージを入力..." /><button id="sendBtn" class="send-btn">送信</button></div>
  </main>

<script>
const qs = new URLSearchParams(location.search);
const config = {
  id: qs.get("id") || "robot01",
  name: qs.get("name") || "ナカムロボ",
  endpoint: qs.get("endpoint") || "",
  voice: qs.get("voice") || "onyx"
};

document.getElementById("robotMeta").textContent = `ID: ${config.id}`;
document.getElementById("robotName").textContent = config.name;

let lastAudio = null;
let audioUnlocked = false;

async function unlock(){
  if(audioUnlocked) return;
  const a = new Audio(); a.src = "data:audio/wav;base64,UklGRigAAABXQVZFRm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQQAAAAAAA==";
  await a.play().catch(()=>{}); audioUnlocked = true;
}

async function playAudio(base64){
  try{
    if(!base64) return;
    if(lastAudio){ lastAudio.pause(); lastAudio.src = ""; }
    
    // データURL方式ではなくBlob方式でメモリを安定化
    const response = await fetch(`data:audio/mpeg;base64,${base64}`);
    const blob = await response.blob();
    const url = URL.createObjectURL(blob);
    
    lastAudio = new Audio(url);
    lastAudio.playbackRate = 0.94; 
    lastAudio.onplay = () => document.getElementById("statusText").textContent = "再生中";
    lastAudio.onended = () => { document.getElementById("statusText").textContent = "待機中"; URL.revokeObjectURL(url); };
    await lastAudio.play();
  } catch(e){ document.getElementById("statusText").textContent = "再生失敗"; }
}

async function chat(txt){
  if(!txt.trim()) return;
  document.getElementById("statusText").textContent = "考案中...";
  document.getElementById("heardText").textContent = `入力: ${txt}`;
  try{
    const r = await fetch(config.endpoint, {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ robotId:config.id, robotName:config.name, userText:txt, voice:config.voice })
    });
    const d = await r.json();
    document.getElementById("responseText").textContent = d.reply;
    if(d.audioBase64) await playAudio(d.audioBase64);
  } catch(e){ document.getElementById("statusText").textContent = "通信失敗"; }
}

const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
if(SR){
  const rec = new SR(); rec.lang = "ja-JP";
  rec.onresult = (e) => chat(e.results[0][0].transcript);
  document.getElementById("micBtn").onclick = async () => { await unlock(); rec.start(); };
}
document.getElementById("sendBtn").onclick = async () => { await unlock(); const i = document.getElementById("textInput"); chat(i.value); i.value=""; };
document.getElementById("stopBtn").onclick = () => { if(lastAudio) { lastAudio.pause(); lastAudio.src = ""; } };
</script>
</body>
</html>

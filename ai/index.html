<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
:root{
  --accent:#0071e3;
  --sub:#6e6e73;
}

body{
  margin:0;
  background:#f5f5f7;
  font-family:-apple-system;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.app{
  width:90%;
  max-width:420px;
  padding:20px;
  border-radius:28px;
  background:white;
  text-align:center;
  box-shadow:0 20px 50px rgba(0,0,0,0.1);
}

/* ハート */
.core{
  width:120px;
  height:120px;
  margin:auto;
  border-radius:50%;
  background:#eee;
  display:flex;
  align-items:center;
  justify-content:center;
}

.heart{
  width:30px;
  height:30px;
  background:#ffd54a;
  transform:rotate(45deg);
  position:relative;
  animation:pulse 2s infinite;
}
.heart:before,.heart:after{
  content:"";
  position:absolute;
  width:30px;height:30px;
  background:#ffd54a;
  border-radius:50%;
}
.heart:before{left:-15px;}
.heart:after{top:-15px;}

@keyframes pulse{
  50%{transform:scale(1.2) rotate(45deg);}
}

/* UI */
.status{font-size:13px;color:var(--sub);}
.response{margin:20px 0;font-size:20px;min-height:60px;}

button{
  width:100%;
  padding:14px;
  margin:6px 0;
  border-radius:16px;
  border:none;
  font-size:15px;
}

.primary{background:var(--accent);color:#fff;}
.secondary{background:#eee;}
.active{background:#34c759;color:#fff;}

input{
  width:100%;
  padding:12px;
  border-radius:14px;
  border:1px solid #ddd;
}
</style>
</head>

<body>

<div class="app">

  <div class="core"><div class="heart"></div></div>

  <h2 id="name">ナカムロボユニット01</h2>

  <div id="response">音声を有効化してください</div>
  <div id="status" class="status">待機中</div>

  <button id="enable" class="primary">音声を有効化</button>
  <button id="mic" class="secondary">会話開始</button>
  <button id="stop">停止</button>

  <input id="input" placeholder="入力..." />
  <button id="send" class="primary">送信</button>

</div>

<script>

const qs=new URLSearchParams(location.search);

const config={
  id:qs.get("id")||"robot01",
  name:qs.get("name")||"ナカムロボユニット01",
  endpoint:qs.get("endpoint")||""
};

document.getElementById("name").textContent=config.name;

const statusEl=document.getElementById("status");
const responseEl=document.getElementById("response");
const micBtn=document.getElementById("mic");
const enableBtn=document.getElementById("enable");

let audioContext;
let audioEnabled=false;
let recognition;
let conversation=false;
let hasStarted=false;

function setStatus(t){statusEl.textContent=t;}

// 音声有効化
enableBtn.onclick=async()=>{
  const AC=window.AudioContext||window.webkitAudioContext;
  audioContext=new AC();
  await audioContext.resume();
  audioEnabled=true;

  setStatus("音声有効");
  responseEl.textContent="準備完了";

  // 🔥 消す
  enableBtn.style.display="none";
};

// 再生
async function playAudio(blob){
  const ab=await blob.arrayBuffer();
  const buf=await audioContext.decodeAudioData(ab);
  const src=audioContext.createBufferSource();
  src.buffer=buf;
  src.connect(audioContext.destination);

  setStatus("再生中");

  src.onended=()=>{
    setStatus(conversation?"聞き取り待機中":"待機中");
  };

  src.start(0);
}

// 通信
async function chat(text){
  setStatus("接続中...");
  responseEl.textContent="解析中...";

  const res=await fetch(config.endpoint,{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      robotId:config.id,
      robotName:config.name,
      userText:text,
      isFirstTurn:!hasStarted
    })
  });

  const reply=res.headers.get("X-Reply");
  if(reply) responseEl.textContent=decodeURIComponent(reply);

  setStatus("応答生成中...");

  const blob=await res.blob();
  hasStarted=true;

  await playAudio(blob);
}

// 音声認識
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;

if(SR){
  recognition=new SR();
  recognition.lang="ja-JP";

  recognition.onstart=()=>{
    setStatus("聞き取り中...");
    responseEl.textContent="話してください";
  };

  recognition.onresult=e=>{
    chat(e.results[0][0].transcript);
  };

  recognition.onend=()=>{
    if(conversation){
      recognition.start();
    }else{
      setStatus("待機中");
    }
  };

  micBtn.onclick=()=>{
    if(!audioEnabled){setStatus("音声未有効");return;}

    conversation=!conversation;

    if(conversation){
      micBtn.textContent="会話中";
      micBtn.classList.add("active");
      recognition.start();
    }else{
      micBtn.textContent="会話開始";
      micBtn.classList.remove("active");
      recognition.stop();
      setStatus("待機中");
    }
  };
}

// 入力
document.getElementById("send").onclick=()=>{
  conversation=false;
  micBtn.textContent="会話開始";
  micBtn.classList.remove("active");
  chat(document.getElementById("input").value);
};

</script>

</body>
</html>

<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NAKAMUROBO AI</title>

<style>
:root{
  --bg1:#f5f5f7;
  --bg2:#e9eaee;
  --card:rgba(255,255,255,0.78);
  --line:rgba(0,0,0,0.08);
  --text:#111;
  --sub:#6e6e73;
  --accent:#0071e3;
  --accent-soft:#dcecff;
  --danger-bg:#ffe5e5;
  --danger-text:#8a1f1f;
}

*{box-sizing:border-box}

html,body{
  margin:0;
  padding:0;
}

body{
  min-height:100vh;
  background:radial-gradient(circle at top,#fff,var(--bg1) 40%,var(--bg2));
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
  color:var(--text);
}

.app{
  width:100%;
  max-width:430px;
  padding:20px;
  border-radius:28px;
  background:var(--card);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  box-shadow:0 30px 60px rgba(0,0,0,0.1);
  text-align:center;
}

/* core */
.core{
  width:120px;
  height:120px;
  border-radius:50%;
  margin:0 auto;
  display:flex;
  align-items:center;
  justify-content:center;
  background:radial-gradient(circle at 35% 30%, #ffffff 0%, #f1f1f3 55%, #dddddf 100%);
  box-shadow:
    inset 0 2px 8px rgba(255,255,255,0.9),
    0 10px 30px rgba(0,0,0,0.1);
}

.heart-svg{
  width:38px;
  height:34px;
  display:block;
  animation:pulse 2.2s infinite ease-in-out;
  filter:drop-shadow(0 0 8px rgba(255,213,74,0.28));
}

.heart-svg.talking{
  animation:pulseTalk 0.72s infinite ease-in-out;
}

@keyframes pulse{
  0%,100%{ transform:scale(1); }
  50%{ transform:scale(1.12); }
}

@keyframes pulseTalk{
  0%,100%{ transform:scale(1.02); }
  50%{ transform:scale(1.2); }
}

/* text */
h2{
  margin:16px 0 6px;
  font-size:24px;
  color:var(--text);
  letter-spacing:.02em;
}

.status{
  color:var(--sub);
  font-size:13px;
  min-height:18px;
}

.response{
  margin:18px 0 10px;
  font-size:20px;
  min-height:84px;
  color:var(--text);
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  line-height:1.55;
  padding:0 4px;
}

/* heard bubble */
.heard-wrap{
  min-height:40px;
  display:flex;
  justify-content:center;
  margin-bottom:8px;
}

.heard{
  display:inline-flex;
  align-items:center;
  gap:8px;
  max-width:100%;
  padding:8px 12px;
  border-radius:999px;
  background:rgba(255,255,255,0.72);
  border:1px solid rgba(0,0,0,0.06);
  color:#5f6470;
  font-size:12px;
  line-height:1.35;
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  opacity:0;
  transform:translateY(6px);
  transition:opacity .2s ease, transform .2s ease;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.heard.show{
  opacity:1;
  transform:translateY(0);
}

.heard-dot{
  width:7px;
  height:7px;
  border-radius:50%;
  background:#0071e3;
  flex:0 0 auto;
  opacity:.8;
}

.heard-text{
  overflow:hidden;
  text-overflow:ellipsis;
}

/* buttons */
button{
  width:100%;
  margin:6px 0;
  padding:14px;
  border-radius:16px;
  border:none;
  font-size:15px;
  transition:all .18s ease;
  cursor:pointer;
}

button:active{
  transform:scale(0.985);
}

.primary{
  background:var(--accent);
  color:#fff;
}

.secondary{
  background:#fff;
  border:1px solid var(--line);
  color:var(--text);
}

.stop{
  background:var(--danger-bg);
  color:var(--danger-text);
}

.enabled{
  background:#fff !important;
  color:#111 !important;
  border:1px solid rgba(0,0,0,0.1) !important;
  opacity:0.88;
  cursor:default;
}

.live{
  background:var(--accent-soft) !important;
  color:#111 !important;
  border:1px solid rgba(0,113,227,0.16) !important;
}

/* input */
.input-area{
  display:flex;
  gap:8px;
  margin-top:10px;
}

input{
  flex:1;
  padding:12px;
  border-radius:14px;
  border:1px solid var(--line);
  outline:none;
  font-size:15px;
  background:#fff;
}

input:focus{
  border-color:rgba(0,113,227,0.38);
  box-shadow:0 0 0 4px rgba(0,113,227,0.08);
}

.send{
  background:var(--accent);
  color:#fff;
  width:auto;
  min-width:84px;
}

/* guide */
.guide{
  margin-top:14px;
  font-size:12px;
  color:#8e8e93;
  line-height:1.65;
}
</style>
</head>

<body>

<div class="app">

  <div class="core">
    <svg id="heart" class="heart-svg" viewBox="0 0 24 22" aria-hidden="true">
      <path fill="#FFD54A"
        d="M12 21.2 10.55 19.88C5.4 15.22 2 12.14 2 8.35
        2 5.27 4.42 3 7.5 3
        c1.74 0 3.41.81 4.5 2.09
        C13.09 3.81 14.76 3 16.5 3
        19.58 3 22 5.27 22 8.35
        c0 3.79-3.4 6.87-8.55 11.53
        L12 21.2Z"/>
    </svg>
  </div>

  <h2 id="robotName">ナカムロボユニット01</h2>

  <div id="response" class="response">音声を有効化してください。</div>

  <div class="heard-wrap">
    <div id="heard" class="heard" aria-live="polite">
      <span class="heard-dot"></span>
      <span id="heardText" class="heard-text">音声入力待機中</span>
    </div>
  </div>

  <div id="status" class="status">待機中</div>

  <button id="enable" class="primary">音声を有効化</button>
  <button id="mic" class="secondary">会話開始</button>
  <button id="stop" class="stop">停止</button>

  <div class="input-area">
    <input id="input" placeholder="入力..." />
    <button id="send" class="send">送信</button>
  </div>

  <div class="guide">
    音声を有効化後、会話開始を押してください
  </div>

</div>

<script>
const qs = new URLSearchParams(location.search);

const config = {
  id: qs.get("id") || "robot01",
  name: qs.get("name") || "ナカムロボユニット01",
  endpoint: qs.get("endpoint") || "https://nakamurobo-ai.nakamura0407.workers.dev/"
};

document.getElementById("robotName").textContent = config.name;

const responseEl = document.getElementById("response");
const statusEl = document.getElementById("status");
const inputEl = document.getElementById("input");
const micBtn = document.getElementById("mic");
const enableBtn = document.getElementById("enable");
const stopBtn = document.getElementById("stop");
const sendBtn = document.getElementById("send");
const heartEl = document.getElementById("heart");
const heardEl = document.getElementById("heard");
const heardTextEl = document.getElementById("heardText");

let audioContext = null;
let audioEnabled = false;
let recognition = null;
let conversation = false;
let firstTurn = true;
let isPlaying = false;
let isProcessing = false;
let currentSource = null;
let manuallyStopped = false;
let lastTranscript = "";
let history = [];
let heardTimer = null;

function setStatus(text){
  statusEl.textContent = text;
}

function setResponse(text){
  responseEl.textContent = text;
}

function setTalking(active){
  heartEl.classList.toggle("talking", !!active);
}

function setConversationUI(active){
  if(active){
    micBtn.textContent = "会話中";
    micBtn.classList.add("live");
  }else{
    micBtn.textContent = "会話開始";
    micBtn.classList.remove("live");
  }
}

function showHeard(text, keep = false){
  if(!text) return;
  heardTextEl.textContent = text;
  heardEl.classList.add("show");

  if(heardTimer) clearTimeout(heardTimer);
  if(!keep){
    heardTimer = setTimeout(() => {
      heardEl.classList.remove("show");
    }, 4200);
  }
}

function pushHistory(role, content){
  history.push({ role, content });
  if(history.length > 6){
    history = history.slice(-6);
  }
}

async function ensureAudio(){
  if(!audioContext){
    const AC = window.AudioContext || window.webkitAudioContext;
    audioContext = new AC();
  }
  if(audioContext.state !== "running"){
    await audioContext.resume();
  }
}

enableBtn.onclick = async () => {
  try{
    await ensureAudio();
    audioEnabled = true;
    setStatus("音声有効");
    setResponse("接続完了。会話を開始できます");
    showHeard("マイク準備完了", true);
    enableBtn.textContent = "音声有効";
    enableBtn.classList.remove("primary");
    enableBtn.classList.add("enabled");
    enableBtn.disabled = true;
  }catch(e){
    console.error(e);
    setStatus("音声初期化失敗");
    setResponse("音声初期化に失敗しました");
  }
};

async function stopCurrentAudio(){
  try{
    if(currentSource){
      currentSource.onended = null;
      currentSource.stop(0);
      currentSource.disconnect();
      currentSource = null;
    }
  }catch(e){}
  isPlaying = false;
  setTalking(false);
}

async function playAudio(blob){
  if(!audioEnabled){
    return;
  }

  await ensureAudio();
  await stopCurrentAudio();

  const ab = await blob.arrayBuffer();
  const buf = await audioContext.decodeAudioData(ab);

  const src = audioContext.createBufferSource();
  src.buffer = buf;
  src.connect(audioContext.destination);
  currentSource = src;
  isPlaying = true;
  setTalking(true);
  setStatus("応答中");

  src.onended = () => {
    isPlaying = false;
    setTalking(false);
    currentSource = null;

    if(conversation && !manuallyStopped){
      setStatus("聞き取り待機中...");
      safeRecognitionStart();
    }else{
      setStatus("待機中");
    }
  };

  src.start(0);
}

function safeRecognitionStart(){
  if(!recognition || !conversation || isProcessing || isPlaying || manuallyStopped){
    return;
  }

  try{
    recognition.start();
    setStatus("聞き取り待機中...");
  }catch(e){}
}

function safeRecognitionStop(){
  if(!recognition){
    return;
  }
  try{
    recognition.stop();
  }catch(e){}
}

async function chat(text){
  const userText = String(text || "").trim();
  if(!userText) return;

  manuallyStopped = false;
  isProcessing = true;
  safeRecognitionStop();

  lastTranscript = userText;
  showHeard(`入力: ${userText}`, true);
  pushHistory("user", userText);

  setStatus("解析中...");
  setResponse("解析中...");

  try{
    const res = await fetch(config.endpoint, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        robotId: config.id,
        robotName: config.name,
        userText,
        isFirstTurn: firstTurn,
        history
      })
    });

    const replyHeader = res.headers.get("X-Reply");
    let replyText = "";

    if(replyHeader){
      replyText = decodeURIComponent(replyHeader);
      setResponse(replyText);
    }

    if(!res.ok){
      let msg = "通信異常を確認しました。";
      try{
        const data = await res.json();
        if(data?.error) msg = data.error;
      }catch(e){}
      setStatus("通信エラー");
      setResponse(msg);
      pushHistory("assistant", msg);
      isProcessing = false;
      return;
    }

    const contentType = res.headers.get("Content-Type") || "";
    if(contentType.includes("audio/")){
      const blob = await res.blob();
      firstTurn = false;
      if(replyText){
        pushHistory("assistant", replyText);
      }
      isProcessing = false;
      await playAudio(blob);
      return;
    }

    try{
      const data = await res.json();
      if(data?.reply){
        replyText = data.reply;
        setResponse(replyText);
      }else if(data?.error){
        replyText = data.error;
        setResponse(replyText);
      }
    }catch(e){
      replyText = "応答を確認しました。";
      setResponse(replyText);
    }

    if(replyText){
      pushHistory("assistant", replyText);
    }

    firstTurn = false;
    isProcessing = false;

    if(conversation && !manuallyStopped){
      safeRecognitionStart();
    }else{
      setStatus("待機中");
    }

  }catch(e){
    console.error(e);
    isProcessing = false;
    setStatus("接続エラー");
    const msg = "通信が不安定です。再接続してください。";
    setResponse(msg);
    pushHistory("assistant", msg);
  }
}

const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

if(SR){
  recognition = new SR();
  recognition.lang = "ja-JP";
  recognition.interimResults = true;
  recognition.continuous = false;

  recognition.onstart = () => {
    if(!isProcessing && !isPlaying && conversation){
      setStatus("聞き取り中...");
      showHeard("聞き取り中...", true);
    }
  };

  recognition.onresult = (e) => {
    let interim = "";
    let finalText = "";

    for(let i = e.resultIndex; i < e.results.length; i++){
      const transcript = e.results[i][0].transcript || "";
      if(e.results[i].isFinal){
        finalText += transcript;
      }else{
        interim += transcript;
      }
    }

    const preview = (finalText || interim).trim();
    if(preview){
      showHeard(`入力: ${preview}`, true);
    }

    if(finalText.trim()){
      chat(finalText.trim());
    }
  };

  recognition.onerror = (e) => {
    if(e.error === "not-allowed"){
      setStatus("マイク権限が必要です");
      showHeard("マイク権限が必要です");
    }else if(e.error === "no-speech"){
      if(conversation && !isProcessing && !isPlaying){
        setStatus("聞き取り待機中...");
        showHeard("音声を確認できませんでした");
        setTimeout(() => safeRecognitionStart(), 300);
      }
    }else{
      if(conversation && !isProcessing && !isPlaying){
        setStatus("聞き取り待機中...");
        showHeard("再接続中...");
        setTimeout(() => safeRecognitionStart(), 320);
      }
    }
  };

  recognition.onend = () => {
    if(conversation && !isProcessing && !isPlaying && !manuallyStopped){
      setTimeout(() => safeRecognitionStart(), 260);
    }
  };
}else{
  micBtn.disabled = true;
  setStatus("音声認識非対応ブラウザ");
}

micBtn.onclick = async () => {
  if(!audioEnabled){
    setStatus("先に音声を有効化してください");
    setResponse("音声を有効化してください。");
    return;
  }

  conversation = !conversation;
  manuallyStopped = !conversation;
  setConversationUI(conversation);

  if(conversation){
    setResponse(firstTurn ? "会話を開始します。" : responseEl.textContent);
    showHeard("会話モード開始", false);
    safeRecognitionStart();
  }else{
    safeRecognitionStop();
    await stopCurrentAudio();
    setStatus("待機中");
    showHeard("会話モード停止", false);
  }
};

stopBtn.onclick = async () => {
  conversation = false;
  manuallyStopped = true;
  setConversationUI(false);
  safeRecognitionStop();
  await stopCurrentAudio();
  isProcessing = false;
  setStatus("停止しました");
  showHeard("停止しました", false);
};

sendBtn.onclick = async () => {
  const text = inputEl.value.trim();
  if(!text) return;
  inputEl.value = "";
  conversation = false;
  manuallyStopped = true;
  setConversationUI(false);
  safeRecognitionStop();
  await chat(text);
};

inputEl.addEventListener("keydown", async (e) => {
  if(e.key === "Enter"){
    e.preventDefault();
    sendBtn.click();
  }
});
</script>

</body>
</html>

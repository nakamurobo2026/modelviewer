<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NAKAMUROBO AI SIMPLE VOICE</title>
<style>
  body{
    margin:0;
    background:#f5f5f7;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
  }
  .app{
    width:100%;
    max-width:420px;
    background:#fff;
    border-radius:20px;
    padding:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
    text-align:center;
  }
  h1{
    font-size:24px;
    margin:0 0 12px;
  }
  #response{
    min-height:80px;
    font-size:20px;
    line-height:1.6;
    margin:16px 0;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  input{
    width:100%;
    box-sizing:border-box;
    padding:14px;
    font-size:16px;
    border:1px solid #ddd;
    border-radius:12px;
    margin-bottom:10px;
  }
  button{
    width:100%;
    padding:14px;
    font-size:16px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    margin-bottom:10px;
  }
  #unlock{
    background:#111;
    color:#fff;
  }
  #send{
    background:#0a84ff;
    color:#fff;
  }
  #speakTest{
    background:#eee;
    color:#111;
  }
  #status{
    font-size:13px;
    color:#666;
    margin-top:8px;
  }
</style>
</head>
<body>
  <div class="app">
    <h1 id="robotName">ナカムロボユニット01</h1>
    <div id="response">まず「音声を有効化」を押してください。</div>

    <button id="unlock">音声を有効化</button>
    <button id="speakTest">テスト音声を鳴らす</button>

    <input id="input" type="text" placeholder="入力してください" />
    <button id="send">送信</button>

    <div id="status">待機中</div>
  </div>

<script>
const qs = new URLSearchParams(location.search);

const config = {
  id: qs.get("id") || "robot01",
  name: qs.get("name") || "ナカムロボユニット01",
  endpoint: qs.get("endpoint") || "https://nakamurobo-ai.nakamura0407.workers.dev/"
};

document.getElementById("robotName").textContent = config.name;

const responseEl = document.getElementById("response");
const inputEl = document.getElementById("input");
const unlockBtn = document.getElementById("unlock");
const speakTestBtn = document.getElementById("speakTest");
const sendBtn = document.getElementById("send");
const statusEl = document.getElementById("status");

let audioUnlocked = false;
let voicesLoaded = false;
let firstTurn = true;
let history = [];

function setStatus(text){
  statusEl.textContent = text;
}

function setResponse(text){
  responseEl.textContent = text;
}

function loadVoices(){
  const voices = window.speechSynthesis.getVoices();
  if (voices && voices.length > 0) {
    voicesLoaded = true;
  }
  return voices;
}

function getJaVoice(){
  const voices = loadVoices();
  return voices.find(v => v.lang && v.lang.toLowerCase().includes("ja")) || null;
}

function stopSpeech(){
  try{
    window.speechSynthesis.cancel();
  }catch(e){}
}

function speak(text){
  return new Promise((resolve) => {
    if (!audioUnlocked) {
      resolve();
      return;
    }

    if (!("speechSynthesis" in window)) {
      resolve();
      return;
    }

    try{
      stopSpeech();

      const uttr = new SpeechSynthesisUtterance(text);
      uttr.lang = "ja-JP";
      uttr.rate = 0.95;
      uttr.pitch = 0.9;
      uttr.volume = 1.0;

      const v = getJaVoice();
      if (v) {
        uttr.voice = v;
      }

      uttr.onend = () => {
        setStatus("再生完了");
        resolve();
      };

      uttr.onerror = (e) => {
        console.error("speech error", e);
        setStatus("音声再生エラー");
        resolve();
      };

      window.speechSynthesis.resume();

      setTimeout(() => {
        try{
          window.speechSynthesis.speak(uttr);
          setStatus("再生中...");
        }catch(err){
          console.error(err);
          setStatus("音声再生失敗");
          resolve();
        }
      }, 50);

    }catch(e){
      console.error(e);
      setStatus("音声再生失敗");
      resolve();
    }
  });
}

async function unlockAudio(){
  if (!("speechSynthesis" in window)) {
    setResponse("この端末は音声再生に対応していません。");
    setStatus("speechSynthesis未対応");
    return;
  }

  try{
    loadVoices();

    // iPhone向けの音声アンロック
    const u = new SpeechSynthesisUtterance(" ");
    u.volume = 0;
    u.rate = 1;
    u.pitch = 1;
    u.lang = "ja-JP";

    window.speechSynthesis.cancel();
    window.speechSynthesis.resume();
    window.speechSynthesis.speak(u);

    audioUnlocked = true;
    setResponse("音声を有効化しました。テスト音声を押してください。");
    setStatus("音声有効");
    unlockBtn.disabled = true;
    unlockBtn.textContent = "音声有効化済み";
  }catch(e){
    console.error(e);
    setStatus("音声有効化失敗");
  }
}

async function fetchReply(userText){
  const res = await fetch(config.endpoint, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      robotId: config.id,
      robotName: config.name,
      userText,
      isFirstTurn: firstTurn,
      history
    })
  });

  const data = await res.json();
  return data.reply || "応答を確認しました。";
}

unlockBtn.addEventListener("click", unlockAudio);

speakTestBtn.addEventListener("click", async () => {
  await speak("音声出力を確認しました。");
});

sendBtn.addEventListener("click", async () => {
  const text = inputEl.value.trim();
  if (!text) return;

  setStatus("通信中...");
  setResponse("応答取得中...");

  try{
    const reply = await fetchReply(text);
    firstTurn = false;
    history.push({ role: "user", content: text });
    history.push({ role: "assistant", content: reply });
    history = history.slice(-8);

    setResponse(reply);
    await speak(reply);
  }catch(e){
    console.error(e);
    setResponse("通信エラーです。");
    setStatus("通信失敗");
  }
});

inputEl.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    e.preventDefault();
    sendBtn.click();
  }
});

if ("speechSynthesis" in window) {
  window.speechSynthesis.onvoiceschanged = () => {
    loadVoices();
  };
  loadVoices();
}
</script>
</body>
</html>

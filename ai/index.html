<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NAKAMUROBO AI</title>
<style>
body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.app{max-width:500px;width:100%;padding:20px;text-align:center;}
button{padding:15px;margin:5px;border-radius:10px;border:none;}
input{padding:12px;width:70%;}
.response{font-size:22px;margin:20px 0;}
</style>
</head>
<body>

<div class="app">
  <h2 id="robotName">ナカムロボユニット01</h2>
  <div id="response" class="response">起動完了。通信、待機中です。</div>
  <div id="status">待機中</div>

  <button id="enable">音声ON</button>
  <button id="mic">話す</button>

  <br><br>

  <input id="text" placeholder="入力">
  <button id="send">送信</button>
</div>

<script>
let hasStarted = false;
let ctx, gain, compressor, hp, lp;

async function initAudio(){
  ctx = new (window.AudioContext||window.webkitAudioContext)();

  gain = ctx.createGain();
  gain.gain.value = 1.6;

  compressor = ctx.createDynamicsCompressor();
  compressor.threshold.value = -20;
  compressor.ratio.value = 4;

  hp = ctx.createBiquadFilter();
  hp.type="highpass";
  hp.frequency.value=200;

  lp = ctx.createBiquadFilter();
  lp.type="lowpass";
  lp.frequency.value=3000;

  gain.connect(compressor);
  compressor.connect(hp);
  hp.connect(lp);
  lp.connect(ctx.destination);

  document.getElementById("status").innerText="音声ON";
}

async function speak(blob){
  const array = await blob.arrayBuffer();
  const audio = await ctx.decodeAudioData(array);

  const src = ctx.createBufferSource();
  src.buffer = audio;
  src.playbackRate.value = 0.97;

  src.connect(gain);
  src.start();
}

async function chat(text){
  document.getElementById("status").innerText="通信中";

  const res = await fetch("YOUR_WORKER_URL",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      userText:text,
      isFirstTurn:!hasStarted
    })
  });

  const reply = decodeURIComponent(res.headers.get("X-Reply")||"");
  document.getElementById("response").innerText = reply;

  hasStarted = true;

  const blob = await res.blob();
  await speak(blob);

  document.getElementById("status").innerText="待機中";
}

document.getElementById("enable").onclick = initAudio;

document.getElementById("send").onclick = ()=>{
  const text = document.getElementById("text").value;
  chat(text);
};

</script>
</body>
</html>

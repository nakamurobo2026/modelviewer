<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RESTART</title>
  <style>
    body { background: #000; color: #fff; text-align: center; padding: 40px; font-family: sans-serif; }
    button { width: 100%; padding: 25px; background: #ffd54a; border: none; border-radius: 12px; font-weight: bold; font-size: 18px; cursor: pointer; }
    input { width: 100%; padding: 15px; margin-bottom: 20px; background: #111; color: #fff; border: 1px solid #333; border-radius: 8px; box-sizing: border-box; }
    #res { margin-top: 30px; font-size: 20px; }
  </style>
</head>
<body>
  <input id="input" type="text" placeholder="テストメッセージ">
  <button id="btn">送信して再生</button>
  <div id="res">待機中</div>

  <script>
    const player = new Audio();
    const endpoint = new URLSearchParams(location.search).get("endpoint");

    document.getElementById("btn").onclick = async () => {
      const val = document.getElementById("input").value;
      if(!val) return;
      document.getElementById("res").textContent = "通信中...";

      // iPhoneのスピーカー予約
      player.src = "data:audio/wav;base64,UklGRigAAABXQVZFRm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQQAAAAAAA==";
      await player.play().catch(()=>{});

      try {
        const r = await fetch(endpoint, {
          method: "POST",
          body: JSON.stringify({ userText: val })
        });

        // テキストを表示
        const reply = decodeURIComponent(r.headers.get("X-Reply") || "…");
        document.getElementById("res").textContent = reply;

        // バイナリをそのまま再生
        const blob = await r.blob();
        player.src = URL.createObjectURL(blob);
        await player.play();
      } catch (e) {
        document.getElementById("res").textContent = "失敗: " + e.message;
      }
    };
  </script>
</body>
</html>

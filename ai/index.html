<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NAKAMUROBO AI</title>
<style>
:root{ --bg:#050505; --accent:#ffd54a; --text:#f2f2f2; }
body{ background:#000; color:#fff; font-family:sans-serif; margin:0; display:flex; justify-content:center; align-items:center; height:100vh; overflow:hidden; }
.app{ width:90%; max-width:400px; border:1px solid #333; padding:20px; border-radius:24px; text-align:center; background:#0a0a0a; }
.response{ margin:15px 0; padding:20px; background:#111; border-radius:15px; min-height:80px; font-size:18px; border:1px solid #222; display:flex; align-items:center; justify-content:center; }
.status{ font-size:12px; color:#888; margin-bottom:10px; }
button{ width:100%; padding:18px; border-radius:15px; border:none; background:var(--accent); font-weight:bold; font-size:16px; cursor:pointer; color:#000; margin-top:10px; }
input{ width:100%; padding:15px; background:#000; border:1px solid #333; color:#fff; border-radius:12px; margin-bottom:10px; font-size:16px; outline:none; }
</style>
</head>
<body>
  <div class="app">
    <div id="statusText" class="status">READY</div>
    <div id="responseText" class="response">…</div>
    <input id="textInput" type="text" placeholder="文字で入力..." />
    <button id="mainBtn">話しかける / 送信</button>
  </div>

<script>
const qs = new URLSearchParams(location.search);
const endpoint = qs.get("endpoint");
const robotName = qs.get("name") || "ナカムロボ";

// グローバルでAudioを一つだけ使い回す
const audioPlayer = new Audio();
audioPlayer.playbackRate = 0.95;

async function runAI(txt) {
  if (!txt || !txt.trim()) return;
  const status = document.getElementById("statusText");
  status.textContent = "通信中...";

  // ★重要: 通信前に「再生開始」してiPhoneのガードを外す
  audioPlayer.src = "data:audio/wav;base64,UklGRigAAABXQVZFRm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQQAAAAAAA==";
  try { await audioPlayer.play(); } catch(e) { console.error(e); }

  try {
    const r = await fetch(endpoint, {
      method: "POST",
      body: JSON.stringify({ robotName, userText: txt, voice: "onyx" })
    });
    const d = await r.json();
    if (d.error) throw new Error(d.error);
    
    document.getElementById("responseText").textContent = d.reply;

    if (d.audioBase64) {
      status.textContent = "再生中";
      audioPlayer.src = "data:audio/mpeg;base64," + d.audioBase64;
      // すでにplay状態なのでsrcを変えるだけで鳴る
      await audioPlayer.play();
    }
    audioPlayer.onended = () => status.textContent = "READY";
  } catch (e) {
    status.textContent = "エラー: " + e.message;
  }
}

document.getElementById("mainBtn").onclick = async () => {
  const i = document.getElementById("textInput");
  const val = i.value.trim();
  
  if (val) {
    await runAI(val);
    i.value = "";
  } else {
    // マイク起動
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SR) {
      const rec = new SR();
      rec.lang = "ja-JP";
      rec.onstart = () => document.getElementById("statusText").textContent = "聞き取り中...";
      rec.onresult = (e) => runAI(e.results[0][0].transcript);
      rec.start();
    }
  }
};
</script>
</body>
</html>

<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NAKAMUROBO AI MINIMAL STT + TTS</title>
<style>
  body{
    margin:0;
    background:#f5f5f7;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
  }
  .app{
    width:100%;
    max-width:420px;
    background:#fff;
    border-radius:20px;
    padding:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
    text-align:center;
  }
  h1{
    font-size:24px;
    margin:0 0 12px;
  }
  #response{
    min-height:88px;
    font-size:20px;
    line-height:1.6;
    margin:16px 0;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    word-break:break-word;
  }
  #heard{
    min-height:28px;
    font-size:14px;
    color:#666;
    margin-bottom:10px;
    word-break:break-word;
  }
  input{
    width:100%;
    box-sizing:border-box;
    padding:14px;
    font-size:16px;
    border:1px solid #ddd;
    border-radius:12px;
    margin-bottom:10px;
  }
  button{
    width:100%;
    padding:14px;
    font-size:16px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    margin-bottom:10px;
  }
  button:disabled{
    opacity:.6;
    cursor:default;
  }
  #unlock{
    background:#111;
    color:#fff;
  }
  #speakTest{
    background:#eee;
    color:#111;
  }
  #mic{
    background:#0a84ff;
    color:#fff;
  }
  #send{
    background:#34c759;
    color:#fff;
  }
  #stop{
    background:#ff3b30;
    color:#fff;
  }
  #status{
    font-size:13px;
    color:#666;
    margin-top:8px;
    word-break:break-word;
  }
</style>
</head>
<body>
  <div class="app">
    <h1 id="robotName">ナカムロボユニット01</h1>

    <div id="response">まず「音声を有効化」を押してください。</div>
    <div id="heard">待機中</div>

    <button id="unlock">音声を有効化</button>
    <button id="speakTest">テスト音声を鳴らす</button>
    <button id="mic">話す</button>
    <button id="stop">停止</button>

    <input id="input" type="text" placeholder="入力してください" />
    <button id="send">送信</button>

    <div id="status">待機中</div>
  </div>

<script>
const qs = new URLSearchParams(location.search);

const config = {
  id: qs.get("id") || "robot01",
  name: qs.get("name") || "ナカムロボユニット01",
  endpoint: qs.get("endpoint") || "https://nakamurobo-ai.nakamura0407.workers.dev/"
};

document.getElementById("robotName").textContent = config.name;

const responseEl = document.getElementById("response");
const heardEl = document.getElementById("heard");
const inputEl = document.getElementById("input");
const unlockBtn = document.getElementById("unlock");
const speakTestBtn = document.getElementById("speakTest");
const micBtn = document.getElementById("mic");
const stopBtn = document.getElementById("stop");
const sendBtn = document.getElementById("send");
const statusEl = document.getElementById("status");

let audioUnlocked = false;
let firstTurn = true;
let history = [];
let recognition = null;
let isListening = false;
let isSpeaking = false;
let isProcessing = false;

function setStatus(text){
  statusEl.textContent = text;
}

function setResponse(text){
  responseEl.textContent = text;
}

function setHeard(text){
  heardEl.textContent = text;
}

function loadVoices(){
  try{
    return window.speechSynthesis.getVoices() || [];
  }catch(e){
    return [];
  }
}

function getJaVoice(){
  const voices = loadVoices();
  return voices.find(v => (v.lang || "").toLowerCase().includes("ja")) || null;
}

function stopSpeech(){
  try{
    if ("speechSynthesis" in window) {
      window.speechSynthesis.cancel();
    }
  }catch(e){}
  isSpeaking = false;
}

function speak(text){
  return new Promise((resolve) => {
    if (!audioUnlocked) {
      resolve();
      return;
    }

    if (!("speechSynthesis" in window)) {
      setStatus("speechSynthesis未対応");
      resolve();
      return;
    }

    if (!text) {
      resolve();
      return;
    }

    try{
      stopSpeech();

      const uttr = new SpeechSynthesisUtterance(String(text));
      uttr.lang = "ja-JP";
      uttr.rate = 0.95;
      uttr.pitch = 0.9;
      uttr.volume = 1.0;

      const voice = getJaVoice();
      if (voice) uttr.voice = voice;

      isSpeaking = true;
      setStatus("再生中...");

      uttr.onend = () => {
        isSpeaking = false;
        setStatus("再生完了");
        resolve();
      };

      uttr.onerror = (e) => {
        console.error("speech error", e);
        isSpeaking = false;
        setStatus("音声再生エラー");
        resolve();
      };

      try{
        window.speechSynthesis.resume();
      }catch(e){}

      setTimeout(() => {
        try{
          window.speechSynthesis.speak(uttr);
        }catch(err){
          console.error(err);
          isSpeaking = false;
          setStatus("音声再生失敗");
          resolve();
        }
      }, 50);

    }catch(e){
      console.error(e);
      isSpeaking = false;
      setStatus("音声再生失敗");
      resolve();
    }
  });
}

async function unlockAudio(){
  if (!("speechSynthesis" in window)) {
    setResponse("この端末は音声再生に対応していません。");
    setStatus("speechSynthesis未対応");
    return;
  }

  try{
    loadVoices();

    const u = new SpeechSynthesisUtterance(" ");
    u.volume = 0;
    u.lang = "ja-JP";

    window.speechSynthesis.cancel();
    window.speechSynthesis.resume();
    window.speechSynthesis.speak(u);

    audioUnlocked = true;
    unlockBtn.disabled = true;
    unlockBtn.textContent = "音声有効化済み";
    setResponse("音声を有効化しました。");
    setStatus("音声有効");
    setHeard("準備完了");
  }catch(e){
    console.error(e);
    setStatus("音声有効化失敗");
    setResponse("音声有効化に失敗しました。");
  }
}

async function fetchReply(userText){
  const res = await fetch(config.endpoint, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      robotId: config.id,
      robotName: config.name,
      userText,
      isFirstTurn: firstTurn,
      history
    })
  });

  let data = null;
  try{
    data = await res.json();
  }catch(e){
    data = null;
  }

  if (!res.ok) {
    throw new Error(`HTTP ${res.status}`);
  }

  return data?.reply || "応答を確認しました。";
}

async function handleUserText(text){
  const userText = String(text || "").trim();
  if (!userText || isProcessing) return;

  isProcessing = true;
  isListening = false;

  setHeard("入力: " + userText);
  setResponse("応答取得中...");
  setStatus("通信中...");

  try{
    const reply = await fetchReply(userText);

    history.push({ role: "user", content: userText });
    history.push({ role: "assistant", content: reply });
    history = history.slice(-8);
    firstTurn = false;

    setResponse(reply);
    await speak(reply);
  }catch(e){
    console.error(e);
    setResponse("通信エラーです。");
    setStatus("通信失敗: " + (e?.message || "unknown"));
  }finally{
    isProcessing = false;
    if (!isSpeaking) {
      setStatus("待機中");
    }
  }
}

unlockBtn.addEventListener("click", unlockAudio);

speakTestBtn.addEventListener("click", async () => {
  await speak("音声出力を確認しました。");
});

sendBtn.addEventListener("click", async () => {
  const text = inputEl.value.trim();
  if (!text) return;
  inputEl.value = "";
  await handleUserText(text);
});

inputEl.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    e.preventDefault();
    sendBtn.click();
  }
});

const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

if (SR) {
  recognition = new SR();
  recognition.lang = "ja-JP";
  recognition.interimResults = false;
  recognition.continuous = false;
  recognition.maxAlternatives = 1;

  recognition.onstart = () => {
    isListening = true;
    setStatus("聞き取り中...");
    setHeard("聞き取り中...");
  };

  recognition.onresult = async (e) => {
    const text = e?.results?.[0]?.[0]?.transcript?.trim() || "";

    if (!text) {
      isListening = false;
      setStatus("認識結果なし");
      setHeard("認識結果なし");
      setResponse("音声を認識できませんでした。");
      return;
    }

    setHeard("入力: " + text);
    await handleUserText(text);
  };

  recognition.onerror = (e) => {
    console.error("recognition error", e);

    isListening = false;

    const code = e?.error || "unknown";
    const msgMap = {
      "not-allowed": "マイク許可がありません",
      "service-not-allowed": "音声認識サービスが使えません",
      "network": "音声認識の通信エラーです",
      "no-speech": "音声を検出できませんでした",
      "audio-capture": "マイク入力を取得できません",
      "aborted": "音声認識が中断されました",
      "language-not-supported": "この言語は未対応です",
      "bad-grammar": "音声認識設定エラーです"
    };

    const msg = msgMap[code] || ("音声認識エラー: " + code);

    setStatus(msg);
    setHeard(msg);
    setResponse(msg);
  };

  recognition.onend = () => {
    isListening = false;
    if (!isProcessing && !isSpeaking) {
      setStatus("待機中");
    }
  };
} else {
  micBtn.disabled = true;
  setStatus("音声認識未対応");
  setHeard("このブラウザは音声認識に未対応です");
}

micBtn.addEventListener("click", async () => {
  if (!audioUnlocked) {
    setResponse("先に音声を有効化してください。");
    setStatus("音声未有効");
    setHeard("先に音声を有効化してください");
    return;
  }

  if (!recognition) {
    setResponse("このブラウザは音声認識に対応していません。");
    setStatus("未対応ブラウザ");
    setHeard("音声認識未対応");
    return;
  }

  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    setResponse("このブラウザはマイク取得に対応していません。");
    setStatus("getUserMedia未対応");
    setHeard("マイク取得未対応");
    return;
  }

  if (location.protocol !== "https:" && location.hostname !== "localhost") {
    setResponse("音声認識はHTTPSで開いてください。");
    setStatus("HTTPS必須");
    setHeard("HTTPSで開いてください");
    return;
  }

  if (isProcessing || isSpeaking || isListening) {
    return;
  }

  try {
    setStatus("マイク確認中...");
    setHeard("マイク確認中...");
    await navigator.mediaDevices.getUserMedia({ audio: true });

    try{
      recognition.start();
    }catch(err){
      console.error(err);
      setResponse("音声認識の開始に失敗しました。");
      setStatus("認識開始失敗");
      setHeard("recognition.start 失敗");
    }
  } catch (err) {
    console.error(err);
    setResponse("マイクの使用が許可されていません。");
    setStatus("マイク権限エラー");
    setHeard("ブラウザでマイクを許可してください");
  }
});

stopBtn.addEventListener("click", () => {
  try{
    if (recognition && isListening) {
      recognition.stop();
    }
  }catch(e){}

  stopSpeech();
  isListening = false;
  isProcessing = false;
  setStatus("停止しました");
  setHeard("停止しました");
});

if ("speechSynthesis" in window) {
  window.speechSynthesis.onvoiceschanged = () => {
    loadVoices();
  };
  loadVoices();
}
</script>
</body>
</html>

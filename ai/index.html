<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ナカムロボ</title>
<style>
body{
  font-family:sans-serif;
  text-align:center;
  padding:40px;
}
#response{
  font-size:22px;
  margin:20px;
}
input{
  padding:10px;
  font-size:16px;
}
button{
  padding:10px 20px;
}
</style>
</head>
<body>

<h2>ナカムロボユニット01</h2>

<div id="response">準備完了</div>

<input id="input" placeholder="入力...">
<button onclick="send()">送信</button>

<script>
const API = "https://nakamurobo-ai.nakamura0407.workers.dev/";

async function send(){
  const text = document.getElementById("input").value;
  if(!text) return;

  document.getElementById("response").textContent = "考え中...";

  const res = await fetch(API,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({ userText:text })
  });

  const data = await res.json();

  // 🔥 ここが重要
  document.getElementById("response").textContent =
    data.reply || "エラー";
}
</script>

</body>
</html>

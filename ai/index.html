<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NAKAMUROBO AI</title>
<style>
:root{
  --bg:#050505;
  --line:#2a2a2a;
  --text:#f2f2f2;
  --sub:#9a9a9a;
  --accent:#ffd54a;
  --accent2:#7fd1ff;
  --ok:#7dffb3;
}
*{box-sizing:border-box}
html,body{
  margin:0;
  padding:0;
  min-height:100%;
  background:radial-gradient(circle at top, #111 0%, #050505 55%, #000 100%);
  color:var(--text);
  font-family:sans-serif;
}
body{
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}
.app{
  width:100%;
  max-width:560px;
  background:rgba(15,15,15,0.92);
  border:1px solid var(--line);
  border-radius:24px;
  padding:20px;
  box-shadow:0 20px 60px rgba(0,0,0,0.45);
}
.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:12px;
}
.badge{
  font-size:12px;
  color:#111;
  background:var(--accent);
  padding:6px 10px;
  border-radius:999px;
  font-weight:700;
}
.robot-id{
  font-size:12px;
  color:var(--sub);
}
.avatar-wrap{
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:10px 0 20px;
}
.core{
  width:120px;
  height:120px;
  border-radius:50%;
  border:1px solid #333;
  background:radial-gradient(circle, rgba(255,213,74,0.2) 0%, #050505 100%);
  display:flex;
  align-items:center;
  justify-content:center;
}
.heart{
  width:32px;
  height:32px;
  background:var(--accent);
  transform:rotate(45deg);
  position:relative;
  animation:pulse 2.4s infinite ease-in-out;
}
.heart:before,.heart:after{
  content:"";
  width:32px;
  height:32px;
  background:var(--accent);
  border-radius:50%;
  position:absolute;
}
.heart:before{ left:-16px; }
.heart:after{ top:-16px; }
@keyframes pulse{
  0%,100%{ transform:rotate(45deg) scale(1); }
  50%{ transform:rotate(45deg) scale(1.1); }
}
.robot-name{
  margin-top:14px;
  font-size:24px;
  font-weight:800;
  letter-spacing:0.08em;
  text-align:center;
}
.status{
  margin-top:8px;
  color:var(--sub);
  font-size:13px;
  min-height:20px;
}
.response{
  margin-top:18px;
  padding:20px;
  border-radius:18px;
  border:1px solid var(--line);
  background:rgba(255,255,255,0.03);
  min-height:100px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  font-size:18px;
  line-height:1.6;
  white-space:pre-wrap;
}
.heard{
  margin-top:12px;
  padding:12px;
  border-radius:14px;
  background:#0b0b0b;
  border:1px solid var(--line);
  color:var(--sub);
  font-size:13px;
  white-space:pre-wrap;
}
.controls{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-top:16px;
}
.controls-3{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:12px;
  margin-top:16px;
}
button{
  border:none;
  border-radius:16px;
  padding:16px;
  font-size:16px;
  font-weight:700;
  cursor:pointer;
}
.enable-btn{
  background:linear-gradient(180deg, #1d3325, #0b1710);
  color:var(--ok);
  border:1px solid #254431;
}
.mic-btn{
  background:linear-gradient(180deg, #222, #000);
  color:#fff;
  border:1px solid #333;
}
.stop-btn{
  background:#2b1111;
  color:#ffd6d6;
}
.input-area{
  margin-top:16px;
  display:grid;
  grid-template-columns:1fr auto;
  gap:10px;
}
input{
  background:#000;
  color:#fff;
  border:1px solid var(--line);
  border-radius:12px;
  padding:12px;
  outline:none;
}
.send-btn{
  background:var(--accent2);
  color:#000;
  padding:0 20px;
}
.note{
  margin-top:14px;
  font-size:12px;
  color:var(--sub);
  text-align:center;
  line-height:1.6;
}
</style>
</head>
<body>
  <main class="app">
    <div class="top">
      <div class="badge">VOICE LINK</div>
      <div id="robotMeta" class="robot-id"></div>
    </div>

    <div class="avatar-wrap">
      <div class="core"><div class="heart"></div></div>
      <div id="robotName" class="robot-name"></div>
      <div id="statusText" class="status">待機中</div>
    </div>

    <div id="responseText" class="response">最初に「音声を有効化」を押してください</div>
    <div id="heardText" class="heard">待機中</div>

    <div class="controls-3">
      <button id="enableBtn" class="enable-btn">音声を有効化</button>
      <button id="micBtn" class="mic-btn">話しかける</button>
      <button id="stopBtn" class="stop-btn">停止</button>
    </div>

    <div class="input-area">
      <input id="textInput" type="text" placeholder="メッセージを入力..." />
      <button id="sendBtn" class="send-btn">送信</button>
    </div>

    <div class="note">
      1. まず「音声を有効化」<br>
      2. そのあと送信 or 話しかける
    </div>
  </main>

  <audio id="player" playsinline preload="auto"></audio>

<script>
const qs = new URLSearchParams(location.search);

const config = {
  id: qs.get("id") || "robot01",
  mode: qs.get("mode") || "normal",
  name: qs.get("name") || "ナカムロボユニット01",
  lang: qs.get("lang") || "ja-JP",
  memory: qs.get("memory") || "1",
  rate: Number(qs.get("rate") || 1.0),
  pitch: Number(qs.get("pitch") || 1.0),
  endpoint: qs.get("endpoint") || "",
  voice: qs.get("voice") || "onyx"
};

const robotMeta = document.getElementById("robotMeta");
const robotName = document.getElementById("robotName");
const statusText = document.getElementById("statusText");
const responseText = document.getElementById("responseText");
const heardText = document.getElementById("heardText");
const enableBtn = document.getElementById("enableBtn");
const micBtn = document.getElementById("micBtn");
const stopBtn = document.getElementById("stopBtn");
const sendBtn = document.getElementById("sendBtn");
const textInput = document.getElementById("textInput");
const player = document.getElementById("player");

robotMeta.textContent = `ID: ${config.id}`;
robotName.textContent = config.name;

let currentAudioUrl = null;
let isRecognizing = false;
let rec = null;
let audioEnabled = false;
let audioContext = null;

function setStatus(text) {
  statusText.textContent = text;
}

function cleanupAudioUrl() {
  if (currentAudioUrl) {
    try { URL.revokeObjectURL(currentAudioUrl); } catch (_) {}
    currentAudioUrl = null;
  }
}

function stopPlayback() {
  try { player.pause(); } catch (_) {}
  try { player.removeAttribute("src"); } catch (_) {}
  try { player.load(); } catch (_) {}
  cleanupAudioUrl();
}

async function enableAudio() {
  try {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (AC && !audioContext) {
      audioContext = new AC();
    }

    if (audioContext && audioContext.state === "suspended") {
      await audioContext.resume();
    }

    // 短い無音に近いバッファを直接鳴らす
    if (audioContext) {
      const buffer = audioContext.createBuffer(1, 1, 22050);
      const source = audioContext.createBufferSource();
      source.buffer = buffer;
      source.connect(audioContext.destination);
      source.start(0);
    }

    audioEnabled = true;
    setStatus("音声有効");
    responseText.textContent = "音声が有効になりました";
    enableBtn.textContent = "音声有効";
    return true;
  } catch (e) {
    console.error("enableAudio failed:", e);
    audioEnabled = false;
    setStatus("音声有効化失敗");
    responseText.textContent = "音声の有効化に失敗しました。もう一度押してください。";
    return false;
  }
}

async function safeReadError(response) {
  try {
    const json = await response.json();
    return json.detail || json.error || `HTTP ${response.status}`;
  } catch (_) {
    try {
      return await response.text();
    } catch (_) {
      return `HTTP ${response.status}`;
    }
  }
}

async function playAudioBlob(blob) {
  cleanupAudioUrl();
  currentAudioUrl = URL.createObjectURL(blob);

  player.pause();
  player.src = currentAudioUrl;
  player.load();
  player.playbackRate = 0.95;

  player.onplay = () => {
    setStatus("再生中");
  };

  player.onended = () => {
    setStatus("待機中");
    cleanupAudioUrl();
  };

  player.onerror = () => {
    setStatus("音声再生エラー");
  };

  try {
    await player.play();
  } catch (e) {
    const msg = String(e && e.message ? e.message : e).toLowerCase();
    if (
      msg.includes("notallowederror") ||
      msg.includes("gesture") ||
      msg.includes("user denied permission") ||
      msg.includes("play() failed")
    ) {
      throw new Error("音声再生がまだ制限されています。先に『音声を有効化』を押してください。");
    }
    throw e;
  }
}

async function chat(txt) {
  const message = (txt || "").trim();
  if (!message) return;

  if (!audioEnabled) {
    setStatus("音声未有効");
    responseText.textContent = "先に『音声を有効化』を押してください";
    return;
  }

  if (!config.endpoint) {
    setStatus("endpoint未設定");
    responseText.textContent = "URLに endpoint を設定してください";
    return;
  }

  setStatus("通信中...");
  heardText.textContent = `入力: ${message}`;

  try {
    const response = await fetch(config.endpoint, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        robotId: config.id,
        robotName: config.name,
        userText: message,
        voice: config.voice,
        mode: config.mode,
        lang: config.lang,
        memory: config.memory,
        rate: config.rate,
        pitch: config.pitch
      })
    });

    const replyHeader = response.headers.get("X-Reply");
    if (replyHeader) {
      try {
        responseText.textContent = decodeURIComponent(replyHeader);
      } catch (_) {
        responseText.textContent = replyHeader;
      }
    }

    if (!response.ok) {
      const errMsg = await safeReadError(response);
      throw new Error(errMsg);
    }

    const contentType = response.headers.get("Content-Type") || "";
    if (!contentType.includes("audio/")) {
      const errMsg = await safeReadError(response);
      throw new Error(errMsg || "音声データではありません");
    }

    const blob = await response.blob();
    if (!blob || blob.size === 0) {
      throw new Error("音声データが空です");
    }

    await playAudioBlob(blob);

  } catch (e) {
    console.error(e);
    setStatus("通信・再生失敗");
    responseText.textContent = `エラー: ${e.message}`;
  }
}

async function sendCurrentText() {
  const value = textInput.value;
  textInput.value = "";
  await chat(value);
}

const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

if (SR) {
  rec = new SR();
  rec.lang = config.lang;
  rec.interimResults = false;
  rec.maxAlternatives = 1;

  rec.onstart = () => {
    isRecognizing = true;
    setStatus("聞き取り中...");
    responseText.textContent = "話してください";
  };

  rec.onresult = async (e) => {
    const transcript = e.results[0][0].transcript;
    isRecognizing = false;
    await chat(transcript);
  };

  rec.onerror = (e) => {
    console.error("speech recognition error:", e);
    isRecognizing = false;

    if (e.error === "not-allowed" || e.error === "service-not-allowed") {
      setStatus("マイク許可が必要");
      responseText.textContent = "ブラウザのサイト設定でマイクを許可してください。";
      return;
    }

    if (e.error === "no-speech") {
      setStatus("音声なし");
      responseText.textContent = "音声を認識できませんでした。";
      return;
    }

    if (e.error === "aborted") {
      setStatus("停止");
      return;
    }

    setStatus(`音声認識エラー: ${e.error}`);
    responseText.textContent = `音声認識エラー: ${e.error}`;
  };

  rec.onend = () => {
    if (statusText.textContent === "聞き取り中...") {
      setStatus("待機中");
    }
    isRecognizing = false;
  };

  micBtn.onclick = async () => {
    if (!audioEnabled) {
      setStatus("音声未有効");
      responseText.textContent = "先に『音声を有効化』を押してください";
      return;
    }

    try {
      stopPlayback();
      rec.start();
    } catch (e) {
      console.error(e);
      setStatus("音声認識開始失敗");
      responseText.textContent = `エラー: ${e.message}`;
    }
  };
} else {
  micBtn.disabled = true;
  micBtn.textContent = "音声非対応";
}

enableBtn.onclick = enableAudio;
sendBtn.onclick = sendCurrentText;

textInput.addEventListener("keydown", async (e) => {
  if (e.key === "Enter") {
    e.preventDefault();
    await sendCurrentText();
  }
});

stopBtn.onclick = () => {
  stopPlayback();

  if (rec && isRecognizing) {
    try { rec.abort(); } catch (_) {}
    isRecognizing = false;
  }

  setStatus("停止");
};
</script>
</body>
</html>

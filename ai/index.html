<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NAKAMUROBO AI</title>

<style>
:root{
  --bg1:#f5f5f7;
  --bg2:#e9eaee;
  --card:rgba(255,255,255,0.75);
  --line:rgba(0,0,0,0.08);
  --text:#111;
  --sub:#6e6e73;
  --accent:#0071e3;
}

*{box-sizing:border-box}

body{
  margin:0;
  background:radial-gradient(circle at top,#fff,var(--bg1) 40%,var(--bg2));
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:20px;
}

.app{
  width:100%;
  max-width:420px;
  padding:20px;
  border-radius:28px;
  background:var(--card);
  backdrop-filter:blur(20px);
  box-shadow:0 30px 60px rgba(0,0,0,0.1);
  text-align:center;
}

.core{
  width:120px;
  height:120px;
  border-radius:50%;
  margin:0 auto;
  display:flex;
  align-items:center;
  justify-content:center;
  background:radial-gradient(circle,#fff,#ddd);
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

/* 崩れにくいハート */
.heart-wrap{
  position:relative;
  width:42px;
  height:38px;
  animation:pulse 2.2s infinite ease-in-out;
}

.heart-square{
  position:absolute;
  left:11px;
  top:11px;
  width:20px;
  height:20px;
  background:#ffd54a;
  transform:rotate(45deg);
  border-radius:4px;
}

.heart-circle{
  position:absolute;
  width:20px;
  height:20px;
  background:#ffd54a;
  border-radius:50%;
}

.heart-circle.left{
  left:0;
  top:0;
}

.heart-circle.right{
  left:22px;
  top:0;
}

@keyframes pulse{
  0%,100%{ transform:scale(1); }
  50%{ transform:scale(1.12); }
}

h2{
  margin:16px 0 6px;
  font-size:24px;
}

.status{
  color:var(--sub);
  font-size:13px;
  min-height:18px;
}

.response{
  margin:20px 0;
  font-size:20px;
  min-height:70px;
}

button{
  width:100%;
  margin:6px 0;
  padding:14px;
  border-radius:16px;
  border:none;
  font-size:15px;
}

.primary{ background:var(--accent); color:#fff; }
.secondary{ background:#fff; border:1px solid var(--line); }
.stop{ background:#ffe5e5; }

.input-area{
  display:flex;
  gap:8px;
  margin-top:10px;
}

input{
  flex:1;
  padding:12px;
  border-radius:14px;
  border:1px solid var(--line);
}

.send{ background:var(--accent); color:#fff; }

.guide{
  margin-top:14px;
  font-size:12px;
  color:#8e8e93;
  line-height:1.6;
}
</style>
</head>

<body>

<div class="app">

  <div class="core">
    <div class="heart-wrap">
      <div class="heart-square"></div>
      <div class="heart-circle left"></div>
      <div class="heart-circle right"></div>
    </div>
  </div>

  <h2 id="robotName">ナカムロボユニット01</h2>

  <div id="response" class="response">
    音声を有効化してください。
  </div>

  <div id="status" class="status">待機中</div>

  <button id="enable" class="primary">音声を有効化</button>
  <button id="mic" class="secondary">会話開始</button>
  <button id="stop" class="stop">停止</button>

  <div class="input-area">
    <input id="input" placeholder="入力..." />
    <button id="send" class="send">送信</button>
  </div>

  <div class="guide">
    音声を有効化後、会話を開始できます
  </div>

</div>

<script>
const qs=new URLSearchParams(location.search);

const config={
  id:qs.get("id")||"robot01",
  name:qs.get("name")||"ナカムロボユニット01",
  endpoint:qs.get("endpoint")||"",
  lang:"ja-JP"
};

document.getElementById("robotName").textContent=config.name;

const responseEl=document.getElementById("response");
const statusEl=document.getElementById("status");
const inputEl=document.getElementById("input");
const micBtn=document.getElementById("mic");
const enableBtn=document.getElementById("enable");

let audioContext;
let audioEnabled=false;
let recognition;
let hasStarted=false;
let conversation=false;
let isSpeaking=false;
let isRecognizing=false;
let restartTimer=null;

function setStatus(t){statusEl.textContent=t;}

function scheduleRestart(){
  if(!conversation||isSpeaking||isRecognizing) return;
  clearTimeout(restartTimer);
  restartTimer=setTimeout(()=>{
    try{recognition.start();}catch{}
  },400);
}

enableBtn.onclick=async()=>{
  try{
    const AC=window.AudioContext||window.webkitAudioContext;
    audioContext=new AC();
    await audioContext.resume();
    audioEnabled=true;
    setStatus("音声有効");
    responseEl.textContent="準備完了";
    enableBtn.style.display="none";
  }catch(e){
    setStatus("音声有効化失敗");
  }
};

async function playAudio(blob){
  const ab=await blob.arrayBuffer();
  const buf=await audioContext.decodeAudioData(ab);
  const src=audioContext.createBufferSource();
  src.buffer=buf;
  src.connect(audioContext.destination);

  isSpeaking=true;
  setStatus("再生中");

  src.onended=()=>{
    isSpeaking=false;
    if(conversation){
      setStatus("聞き取り待機中...");
      scheduleRestart();
    }else{
      setStatus("待機中");
    }
  };

  src.start(0);
}

async function chat(text){
  if(!audioEnabled){setStatus("音声未有効");return;}
  if(!config.endpoint){setStatus("未接続");return;}

  setStatus("接続中...");
  responseEl.textContent="解析中...";

  const res=await fetch(config.endpoint,{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      robotId:config.id,
      robotName:config.name,
      userText:text,
      isFirstTurn:!hasStarted
    })
  });

  const reply=res.headers.get("X-Reply");
  if(reply){
    responseEl.textContent=decodeURIComponent(reply);
  }

  setStatus("応答生成中...");

  const blob=await res.blob();
  hasStarted=true;

  await playAudio(blob);
}

document.getElementById("send").onclick=()=>{
  conversation=false;
  micBtn.textContent="会話開始";
  micBtn.classList.remove("primary");
  micBtn.classList.add("secondary");
  chat(inputEl.value);
  inputEl.value="";
};

const SR=window.SpeechRecognition||window.webkitSpeechRecognition;

if(SR){
  recognition=new SR();
  recognition.lang=config.lang;

  recognition.onstart=()=>{
    isRecognizing=true;
    setStatus("聞き取り中...");
    responseEl.textContent="話してください";
  };

  recognition.onresult=e=>{
    isRecognizing=false;
    chat(e.results[0][0].transcript);
  };

  recognition.onend=()=>{
    isRecognizing=false;
    if(conversation&&!isSpeaking){
      setStatus("聞き取り待機中...");
      scheduleRestart();
    }else{
      setStatus("待機中");
    }
  };

  micBtn.onclick=()=>{
    if(!audioEnabled){setStatus("音声未有効");return;}

    conversation=!conversation;

    if(conversation){
      micBtn.textContent="会話中";
      micBtn.classList.remove("secondary");
      micBtn.classList.add("primary");
      recognition.start();
    }else{
      micBtn.textContent="会話開始";
      micBtn.classList.remove("primary");
      micBtn.classList.add("secondary");
      try{recognition.abort();}catch(e){}
      setStatus("待機中");
    }
  };
}

document.getElementById("stop").onclick=()=>{
  conversation=false;
  micBtn.textContent="会話開始";
  micBtn.classList.remove("primary");
  micBtn.classList.add("secondary");
  if(recognition){try{recognition.abort();}catch(e){}}
  setStatus("停止");
};
</script>

</body>
</html>

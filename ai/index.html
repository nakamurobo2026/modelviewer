<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NAKAMUROBO DEBUG</title>
<style>
:root{ --bg:#050505; --text:#f2f2f2; --accent:#ffd54a; }
body{ background:#050505; color:#f2f2f2; font-family:sans-serif; display:flex; justify-content:center; align-items:center; min-height:100vh; margin:0; }
.app{ width:90%; max-width:500px; border:1px solid #333; padding:20px; border-radius:20px; text-align:center; }
.response{ margin:20px 0; padding:20px; background:#111; border-radius:10px; min-height:50px; font-size:18px; border:1px solid #2a2a2a; }
.status{ font-size:12px; color:#888; margin-bottom:10px; }
.error-log{ font-size:10px; color:#ff4a4a; background:#2b1111; padding:10px; border-radius:5px; display:none; text-align:left; overflow-wrap:break-word; }
button{ width:100%; padding:15px; border-radius:10px; border:none; background:var(--accent); font-weight:bold; cursor:pointer; margin-bottom:10px; }
input{ width:100%; padding:12px; background:#000; border:1px solid #333; color:#fff; border-radius:10px; margin-bottom:10px; }
</style>
</head>
<body>
  <div class="app">
    <div id="statusText" class="status">READY</div>
    <div id="responseText" class="response">…</div>
    <input id="textInput" type="text" placeholder="何か入力してください" />
    <button id="sendBtn">送信して再生</button>
    <div id="errorLog" class="error-log"></div>
  </div>

<script>
const qs = new URLSearchParams(location.search);
const endpoint = qs.get("endpoint");

async function chat(txt){
  const status = document.getElementById("statusText");
  const log = document.getElementById("errorLog");
  status.textContent = "通信中...";
  log.style.display = "none";

  try {
    const r = await fetch(endpoint, {
      method:"POST",
      body: JSON.stringify({ robotName:"ナカムロボ", userText:txt, voice:"onyx" })
    });

    const d = await r.json();
    if (d.error) throw new Error(d.error);

    document.getElementById("responseText").textContent = d.reply;
    
    if (d.audioBase64) {
      status.textContent = "再生準備中...";
      const audio = new Audio("data:audio/mpeg;base64," + d.audioBase64);
      audio.onplay = () => status.textContent = "再生中";
      audio.onended = () => status.textContent = "待機中";
      audio.onerror = (e) => { throw new Error("ブラウザ再生エラー: 音声形式を確認してください"); };
      await audio.play();
    }
  } catch(e) {
    status.textContent = "失敗";
    log.style.display = "block";
    log.textContent = "エラー内容: " + e.message;
  }
}

document.getElementById("sendBtn").onclick = () => {
  const i = document.getElementById("textInput");
  chat(i.value);
  i.value = "";
};
</script>
</body>
</html>

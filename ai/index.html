<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NAKAMUROBO AI</title>
<style>
:root{ --bg:#050505; --panel:#111; --line:#2a2a2a; --text:#f2f2f2; --sub:#9a9a9a; --accent:#ffd54a; --accent2:#7fd1ff; }
*{box-sizing:border-box;}
html,body{ margin:0; padding:0; background:#000; color:var(--text); font-family:sans-serif; height:100%; overflow:hidden; display:flex; align-items:center; justify-content:center; }
.app{ width:95%; max-width:500px; background:rgba(15,15,15,0.9); border:1px solid var(--line); border-radius:24px; padding:20px; backdrop-filter:blur(10px); }
.top{ display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
.badge{ font-size:12px; color:#0d0d0d; background:var(--accent); padding:6px 12px; border-radius:999px; font-weight:700; }
.robot-id{ font-size:12px; color:var(--sub); }
.avatar-wrap{ display:flex; flex-direction:column; align-items:center; padding:10px 0; }
.core{ width:100px; height:100px; border-radius:50%; border:1px solid #333; background: radial-gradient(circle, rgba(255,213,74,0.15) 0%, #000 100%); display:flex; align-items:center; justify-content:center; }
.heart{ width:28px; height:28px; background:var(--accent); transform:rotate(45deg); position:relative; animation:pulse 2.4s infinite ease-in-out; }
.heart:before, .heart:after{ content:""; width:28px; height:28px; background:var(--accent); border-radius:50%; position:absolute; }
.heart:before{ left:-14px; } .heart:after{ top:-14px; }
@keyframes pulse{ 0%,100%{ transform:rotate(45deg) scale(1); } 50%{ transform:rotate(45deg) scale(1.1); } }
.robot-name{ margin-top:14px; font-size:22px; font-weight:800; letter-spacing:0.1em; }
.status{ margin-top:6px; color:var(--sub); font-size:12px; min-height:18px; }
.response{ margin-top:15px; padding:18px; border-radius:18px; border:1px solid var(--line); background:rgba(255,255,255,0.03); min-height:80px; display:flex; align-items:center; justify-content:center; text-align:center; font-size:18px; line-height:1.5; }
.heard{ margin-top:10px; padding:10px; border-radius:12px; background:#0b0b0b; border:1px solid var(--line); color:var(--sub); font-size:12px; }
.controls{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:15px; }
button{ border:none; border-radius:14px; padding:14px; font-size:15px; font-weight:700; cursor:pointer; -webkit-tap-highlight-color:transparent; }
.mic-btn{ background:linear-gradient(180deg, #333, #000); color:#fff; border:1px solid #444; }
.stop-btn{ background:#2b1111; color:#ffd6d6; }
.input-area{ margin-top:12px; display:grid; grid-template-columns:1fr auto; gap:8px; }
input{ background:#000; color:#fff; border:1px solid var(--line); border-radius:10px; padding:12px; outline:none; font-size:16px; }
.send-btn{ background:var(--accent2); color:#000; padding:0 15px; }
</style>
</head>
<body>
  <main class="app">
    <div class="top"><div class="badge">VOICE LINK</div><div id="robotMeta" class="robot-id"></div></div>
    <div class="avatar-wrap"><div class="core"><div class="heart"></div></div><div id="robotName" class="robot-name"></div><div id="statusText" class="status">READY</div></div>
    <div id="responseText" class="response">…</div>
    <div id="heardText" class="heard">待機中</div>
    <div class="controls"><button id="micBtn" class="mic-btn">話しかける</button><button id="stopBtn" class="stop-btn">停止</button></div>
    <div class="input-area"><input id="textInput" type="text" placeholder="文字で入力..." /><button id="sendBtn" class="send-btn">送信</button></div>
  </main>

<script>
const qs = new URLSearchParams(location.search);
const config = {
  id: qs.get("id") || "robot01",
  name: qs.get("name") || "ナカムロボ",
  endpoint: qs.get("endpoint") || "",
  voice: qs.get("voice") || "onyx"
};

document.getElementById("robotMeta").textContent = `ID: ${config.id}`;
document.getElementById("robotName").textContent = config.name;

let currentAudio = null;

// ★ iPhoneの音声制限を解除する関数
async function unlockAudio() {
  const dummy = new Audio();
  dummy.src = "data:audio/wav;base64,UklGRigAAABXQVZFRm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQQAAAAAAA==";
  try { await dummy.play(); } catch(e) { console.warn("Unlock failed", e); }
}

async function chat(txt){
  if(!txt || !txt.trim()) return;
  const status = document.getElementById("statusText");
  status.textContent = "通信中...";
  document.getElementById("heardText").textContent = `入力: ${txt}`;
  
  try{
    const r = await fetch(config.endpoint, {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ robotId:config.id, robotName:config.name, userText:txt, voice:config.voice })
    });

    const d = await r.json();
    if (d.error) throw new Error(d.error);

    document.getElementById("responseText").textContent = d.reply;

    if (d.audioBase64) {
      if(currentAudio){ currentAudio.pause(); currentAudio.src = ""; }
      currentAudio = new Audio("data:audio/mpeg;base64," + d.audioBase64);
      currentAudio.playbackRate = 0.95;
      currentAudio.onplay = () => status.textContent = "再生中";
      currentAudio.onended = () => status.textContent = "待機中";
      await currentAudio.play();
    }
  } catch(e){ 
    status.textContent = "エラー: " + e.message; 
  }
}

const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
if(SR){
  const rec = new SR();
  rec.lang = "ja-JP";
  rec.onstart = () => { document.getElementById("statusText").textContent = "聞き取り中..."; };
  rec.onresult = (e) => chat(e.results[0][0].transcript);

  document.getElementById("micBtn").onclick = async () => {
    await unlockAudio(); // ボタンを押した瞬間に解除
    try { rec.start(); } catch(e) {}
  };
}

document.getElementById("sendBtn").onclick = async () => {
  await unlockAudio();
  const i = document.getElementById("textInput");
  chat(i.value);
  i.value = "";
};

document.getElementById("stopBtn").onclick = () => { if(currentAudio) currentAudio.pause(); };
</script>
</body>
</html>

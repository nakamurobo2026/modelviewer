<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NAKAMUROBO AI</title>

<style>
body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.app{
  max-width:400px;
  width:100%;
  padding:20px;
  text-align:center;
}
button{
  padding:15px;
  margin:5px;
  border-radius:10px;
  border:none;
  width:100%;
}
.primary{ background:#0a84ff; color:#fff; }
.secondary{ background:#333; color:#fff; }
.stop{ background:#600; color:#fff; }

.response{
  font-size:22px;
  margin:20px 0;
  min-height:60px;
}

.heard{
  font-size:12px;
  color:#aaa;
  margin-bottom:10px;
}
</style>
</head>

<body>

<div class="app">
  <h2 id="robotName">ナカムロボユニット01</h2>

  <div id="response" class="response">音声を有効化してください。</div>
  <div id="heard" class="heard"></div>

  <button id="enable" class="primary">音声を有効化</button>
  <button id="mic" class="secondary">会話開始</button>
  <button id="stop" class="stop">停止</button>

  <input id="input" placeholder="入力..." style="width:70%;padding:10px;">
  <button id="send">送信</button>
</div>

<script>
const endpoint = "https://nakamurobo-ai.nakamura0407.workers.dev/";

const responseEl = document.getElementById("response");
const heardEl = document.getElementById("heard");
const inputEl = document.getElementById("input");

let audioEnabled = false;
let recognition = null;
let conversation = false;
let isProcessing = false;

/* ===== 音声有効化（超シンプル） ===== */
document.getElementById("enable").onclick = () => {
  audioEnabled = true;

  if("speechSynthesis" in window){
    window.speechSynthesis.getVoices();
  }

  responseEl.textContent = "会話開始ボタンで始まります。";
};

/* ===== 音声再生（確実版） ===== */
function speak(text){
  if(!audioEnabled) return;

  if(!("speechSynthesis" in window)) return;

  window.speechSynthesis.cancel();

  const uttr = new SpeechSynthesisUtterance(text);
  uttr.lang = "ja-JP";
  uttr.rate = 0.9;
  uttr.pitch = 0.8;

  window.speechSynthesis.speak(uttr);
}

/* ===== AI通信 ===== */
async function chat(text){
  if(!text) return;

  isProcessing = true;
  heardEl.textContent = "入力: " + text;
  responseEl.textContent = "解析中...";

  try{
    const res = await fetch(endpoint,{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({
        userText:text
      })
    });

    const data = await res.json();

    const reply = data.reply || "応答確認";
    responseEl.textContent = reply;

    speak(reply);

  }catch(e){
    responseEl.textContent = "通信エラー";
  }

  isProcessing = false;
}

/* ===== 音声認識 ===== */
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

if(SR){
  recognition = new SR();
  recognition.lang = "ja-JP";

  recognition.onresult = (e)=>{
    const text = e.results[0][0].transcript;
    chat(text);
  };
}

/* ===== ボタン ===== */
document.getElementById("mic").onclick = ()=>{
  if(!audioEnabled){
    responseEl.textContent = "音声を有効化してください";
    return;
  }

  if(recognition){
    recognition.start();
  }
};

document.getElementById("stop").onclick = ()=>{
  if(recognition){
    recognition.stop();
  }
};

document.getElementById("send").onclick = ()=>{
  chat(inputEl.value);
  inputEl.value="";
};
</script>

</body>
</html>

<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NAKAMUROBO AI</title>
<style>
:root{
  --bg:#050505;
  --panel:#111;
  --line:#2a2a2a;
  --text:#f2f2f2;
  --sub:#9a9a9a;
  --accent:#ffd54a;
  --accent2:#7fd1ff;
}
*{ box-sizing:border-box; }
html,body{
  margin:0;
  padding:0;
  min-height:100%;
  background:radial-gradient(circle at top, #111 0%, #050505 55%, #000 100%);
  color:var(--text);
  font-family:sans-serif;
}
body{
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}
.app{
  width:100%;
  max-width:560px;
  background:rgba(15,15,15,0.88);
  border:1px solid var(--line);
  border-radius:24px;
  padding:20px;
  box-shadow:0 20px 60px rgba(0,0,0,0.45);
  backdrop-filter:blur(10px);
}
.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:12px;
}
.badge{
  font-size:12px;
  color:#0d0d0d;
  background:var(--accent);
  padding:6px 10px;
  border-radius:999px;
  font-weight:700;
}
.robot-id{
  font-size:12px;
  color:var(--sub);
}
.avatar-wrap{
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:10px 0 20px;
}
.core{
  width:120px;
  height:120px;
  border-radius:50%;
  border:1px solid #333;
  background:radial-gradient(circle, rgba(255,213,74,0.2) 0%, #050505 100%);
  display:flex;
  align-items:center;
  justify-content:center;
}
.heart{
  width:32px;
  height:32px;
  background:var(--accent);
  transform:rotate(45deg);
  position:relative;
  animation:pulse 2.4s infinite ease-in-out;
}
.heart:before,
.heart:after{
  content:"";
  width:32px;
  height:32px;
  background:var(--accent);
  border-radius:50%;
  position:absolute;
}
.heart:before{ left:-16px; }
.heart:after{ top:-16px; }

@keyframes pulse{
  0%,100%{ transform:rotate(45deg) scale(1); }
  50%{ transform:rotate(45deg) scale(1.1); }
}

.robot-name{
  margin-top:14px;
  font-size:24px;
  font-weight:800;
  letter-spacing:0.08em;
  text-align:center;
}
.status{
  margin-top:8px;
  color:var(--sub);
  font-size:13px;
  min-height:20px;
}
.response{
  margin-top:18px;
  padding:20px;
  border-radius:18px;
  border:1px solid var(--line);
  background:rgba(255,255,255,0.03);
  min-height:100px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  font-size:18px;
  line-height:1.6;
  white-space:pre-wrap;
}
.heard{
  margin-top:12px;
  padding:12px;
  border-radius:14px;
  background:#0b0b0b;
  border:1px solid var(--line);
  color:var(--sub);
  font-size:13px;
  white-space:pre-wrap;
}
.controls{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-top:16px;
}
button{
  border:none;
  border-radius:16px;
  padding:16px;
  font-size:16px;
  font-weight:700;
  cursor:pointer;
}
.mic-btn{
  background:linear-gradient(180deg, #222, #000);
  color:#fff;
  border:1px solid #333;
}
.stop-btn{
  background:#2b1111;
  color:#ffd6d6;
}
.input-area{
  margin-top:16px;
  display:grid;
  grid-template-columns:1fr auto;
  gap:10px;
}
input{
  background:#000;
  color:#fff;
  border:1px solid var(--line);
  border-radius:12px;
  padding:12px;
  outline:none;
}
.send-btn{
  background:var(--accent2);
  color:#000;
  padding:0 20px;
}
.note{
  margin-top:14px;
  font-size:12px;
  color:var(--sub);
  text-align:center;
}
</style>
</head>
<body>
  <main class="app">
    <div class="top">
      <div class="badge">VOICE LINK</div>
      <div id="robotMeta" class="robot-id"></div>
    </div>

    <div class="avatar-wrap">
      <div class="core"><div class="heart"></div></div>
      <div id="robotName" class="robot-name"></div>
      <div id="statusText" class="status">待機中</div>
    </div>

    <div id="responseText" class="response">…</div>
    <div id="heardText" class="heard">待機中</div>

    <div class="controls">
      <button id="micBtn" class="mic-btn">話しかける</button>
      <button id="stopBtn" class="stop-btn">停止</button>
    </div>

    <div class="input-area">
      <input id="textInput" type="text" placeholder="メッセージを入力..." />
      <button id="sendBtn" class="send-btn">送信</button>
    </div>

    <div class="note">
      初回は一度ボタンを押して音声再生を許可してください
    </div>
  </main>

<script>
const qs = new URLSearchParams(location.search);

const config = {
  id: qs.get("id") || "robot01",
  name: qs.get("name") || "ナカムロボユニット01",
  endpoint: qs.get("endpoint") || "",
  voice: qs.get("voice") || "onyx"
};

const robotMeta = document.getElementById("robotMeta");
const robotName = document.getElementById("robotName");
const statusText = document.getElementById("statusText");
const responseText = document.getElementById("responseText");
const heardText = document.getElementById("heardText");
const micBtn = document.getElementById("micBtn");
const stopBtn = document.getElementById("stopBtn");
const sendBtn = document.getElementById("sendBtn");
const textInput = document.getElementById("textInput");

robotMeta.textContent = `ID: ${config.id}`;
robotName.textContent = config.name;

let currentAudio = null;
let currentAudioUrl = null;
let audioUnlocked = false;

function setStatus(text) {
  statusText.textContent = text;
}

function cleanupAudio() {
  if (currentAudio) {
    currentAudio.pause();
    currentAudio.removeAttribute("src");
    currentAudio.load();
    currentAudio = null;
  }
  if (currentAudioUrl) {
    URL.revokeObjectURL(currentAudioUrl);
    currentAudioUrl = null;
  }
}

async function unlockAudio() {
  if (audioUnlocked) return true;

  try {
    const silentAudio = new Audio(
      "data:audio/wav;base64,UklGRigAAABXQVZFRm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQQAAAAAAA=="
    );
    silentAudio.volume = 0;
    await silentAudio.play();
    silentAudio.pause();
    audioUnlocked = true;
    return true;
  } catch (e) {
    console.log("audio unlock failed:", e);
    return false;
  }
}

async function safeReadError(response) {
  try {
    const data = await response.json();
    return data.detail || data.error || `HTTP ${response.status}`;
  } catch (e) {
    try {
      return await response.text();
    } catch (e2) {
      return `HTTP ${response.status}`;
    }
  }
}

async function playAudioBlob(blob) {
  cleanupAudio();

  currentAudioUrl = URL.createObjectURL(blob);
  currentAudio = new Audio(currentAudioUrl);
  currentAudio.preload = "auto";
  currentAudio.playbackRate = 0.95;

  currentAudio.onplay = () => {
    setStatus("再生中");
  };

  currentAudio.onended = () => {
    setStatus("待機中");
    cleanupAudio();
  };

  currentAudio.onerror = () => {
    setStatus("音声再生エラー");
    cleanupAudio();
  };

  await currentAudio.play();
}

async function chat(txt) {
  const message = (txt || "").trim();
  if (!message) return;

  if (!config.endpoint) {
    setStatus("endpoint未設定");
    responseText.textContent = "URLに endpoint を設定してください";
    return;
  }

  setStatus("通信中...");
  heardText.textContent = `入力: ${message}`;

  try {
    const response = await fetch(config.endpoint, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        robotId: config.id,
        robotName: config.name,
        userText: message,
        voice: config.voice
      })
    });

    const replyHeader = response.headers.get("X-Reply");
    if (replyHeader) {
      responseText.textContent = decodeURIComponent(replyHeader);
    }

    if (!response.ok) {
      const errMsg = await safeReadError(response);
      throw new Error(errMsg);
    }

    const contentType = response.headers.get("Content-Type") || "";
    if (!contentType.includes("audio/")) {
      const errMsg = await safeReadError(response);
      throw new Error(errMsg || "音声データではありません");
    }

    const audioBlob = await response.blob();
    if (!audioBlob || audioBlob.size === 0) {
      throw new Error("音声データが空です");
    }

    await playAudioBlob(audioBlob);

  } catch (e) {
    console.error(e);
    setStatus("通信・再生失敗");
    responseText.textContent = `エラー: ${e.message}`;
  }
}

const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let rec = null;

if (SR) {
  rec = new SR();
  rec.lang = "ja-JP";
  rec.interimResults = false;
  rec.maxAlternatives = 1;

  rec.onstart = () => {
    setStatus("聞き取り中...");
  };

  rec.onresult = async (e) => {
    const transcript = e.results[0][0].transcript;
    await chat(transcript);
  };

  rec.onerror = (e) => {
    console.error("speech recognition error:", e);
    setStatus(`音声認識エラー: ${e.error}`);
  };

  rec.onend = () => {
    if (statusText.textContent === "聞き取り中...") {
      setStatus("待機中");
    }
  };

  micBtn.onclick = async () => {
    await unlockAudio();
    try {
      rec.start();
    } catch (e) {
      console.error(e);
      setStatus("音声認識開始失敗");
    }
  };
} else {
  micBtn.disabled = true;
  micBtn.textContent = "音声非対応";
}

sendBtn.onclick = async () => {
  await unlockAudio();
  const value = textInput.value;
  textInput.value = "";
  await chat(value);
};

textInput.addEventListener("keydown", async (e) => {
  if (e.key === "Enter") {
    e.preventDefault();
    await unlockAudio();
    const value = textInput.value;
    textInput.value = "";
    await chat(value);
  }
});

stopBtn.onclick = () => {
  cleanupAudio();
  setStatus("停止");
};
</script>
</body>
</html>

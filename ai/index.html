<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>NAKAMUROBO FIX</title>
  <style>
    body { background: #000; color: #fff; text-align: center; padding: 40px; font-family: sans-serif; }
    button { width: 100%; padding: 25px; background: #ffd54a; border: none; border-radius: 12px; font-weight: bold; font-size: 18px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    input { width: 100%; padding: 15px; margin-bottom: 20px; background: #111; color: #fff; border: 1px solid #333; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
    #res { margin-top: 30px; font-size: 18px; color: #888; }
  </style>
</head>
<body>
  <input id="input" type="text" placeholder="テスト入力">
  <button id="btn">送信して再生</button>
  <div id="res">待機中...</div>

  <script>
    // ブラウザ起動時に再生用プレイヤーを固定で作っておく
    const player = new Audio();
    player.preload = "auto";

    document.getElementById("btn").onclick = async () => {
      const val = document.getElementById("input").value;
      if(!val) return;
      
      const resDiv = document.getElementById("res");
      resDiv.textContent = "通信中...";

      // 【最重要】ボタンを押した瞬間に、ブラウザに「音を出すぞ」と宣言してスピーカーを予約する
      // 空のデータを再生してロックを解除
      player.src = "data:audio/wav;base64,UklGRigAAABXQVZFRm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQQAAAAAAA==";
      try {
        await player.play();
      } catch(e) {
        console.log("Unlock failed", e);
      }

      const endpoint = new URLSearchParams(location.search).get("endpoint");

      try {
        const r = await fetch(endpoint, {
          method: "POST",
          body: JSON.stringify({ userText: val })
        });

        const reply = decodeURIComponent(r.headers.get("X-Reply") || "…");
        resDiv.textContent = reply;

        // 【最重要】既に再生が許可されたplayerの「中身」だけを通信結果に差し替える
        const blob = await r.blob();
        const url = URL.createObjectURL(blob);
        player.src = url;
        
        // srcを変えた後に再度叩く
        await player.play();

      } catch (e) {
        resDiv.textContent = "エラー: " + e.message;
      }
    };
  </script>
</body>
</html>

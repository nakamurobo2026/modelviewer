<style>
  /* 既存のスタイルに追記 */
  .loading { opacity: 0.5; pointer-events: none; }
</style>

<script>
const qs = new URLSearchParams(location.search);
const config = {
  id: qs.get("id") || "robot01",
  name: qs.get("name") || "ナカムロボユニット01",
  endpoint: qs.get("endpoint") || ""
};

document.getElementById("robotName").textContent = config.name;

const responseEl = document.getElementById("response");
const statusEl = document.getElementById("status");
const micBtn = document.getElementById("mic");
const enableBtn = document.getElementById("enable");
const sendBtn = document.getElementById("send");
const inputEl = document.getElementById("input");

let audioContext;
let audioEnabled = false;
let recognition;
let conversation = false;
let isProcessing = false; // ★ 解析・再生中フラグ

function setStatus(t) { statusEl.textContent = t; }

/* 音声有効化 */
enableBtn.onclick = async () => {
  const AC = window.AudioContext || window.webkitAudioContext;
  audioContext = new AC();
  await audioContext.resume();
  audioEnabled = true;
  setStatus("音声有効");
  responseEl.textContent = "接続完了。会話を開始できます";
  enableBtn.textContent = "接続済み";
  enableBtn.classList.add("enabled");
  enableBtn.disabled = true;
  micBtn.classList.remove("disabled");
  micBtn.classList.add("primary");
};

/* 再生 */
async function playAudio(blob) {
  isProcessing = true; // 再生開始
  const ab = await blob.arrayBuffer();
  const buf = await audioContext.decodeAudioData(ab);
  const src = audioContext.createBufferSource();
  src.buffer = buf;
  src.connect(audioContext.destination);

  setStatus("再生中...");
  src.onended = () => {
    isProcessing = false; // 再生終了
    if (conversation) {
      setStatus("聞き取り中...");
      try { recognition.start(); } catch(e){} 
    } else {
      setStatus("待機中");
    }
  };
  src.start(0);
}

/* 通信 */
async function chat(text) {
  if (!text || isProcessing) return; // 重複防止
  
  isProcessing = true;
  if(conversation) try { recognition.stop(); } catch(e){}

  setStatus("解析中...");
  responseEl.textContent = "解析中...";
  
  try {
    const res = await fetch(config.endpoint, {
      method: "POST",
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        robotId: config.id,
        robotName: config.name,
        userText: text
      })
    });

    const reply = res.headers.get("X-Reply");
    if (reply) {
      responseEl.textContent = decodeURIComponent(reply);
    }

    const blob = await res.blob();
    await playAudio(blob);
  } catch (e) {
    console.error(e);
    responseEl.textContent = "通信エラーが発生しました";
    isProcessing = false;
    setStatus("エラー");
  }
}

/* 音声認識 */
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
if (SR) {
  recognition = new SR();
  recognition.lang = "ja-JP";
  recognition.interimResults = false;

  recognition.onresult = e => {
    const text = e.results[0][0].transcript;
    chat(text);
  };

  recognition.onend = () => {
    // ロボットが再生中（isProcessing）でなければ再開
    if (conversation && !isProcessing) {
      recognition.start();
    }
  };

  micBtn.onclick = () => {
    if (!audioEnabled || isProcessing) return;

    conversation = !conversation;
    if (conversation) {
      micBtn.textContent = "会話中 (停止するにはクリック)";
      micBtn.classList.add("stop");
      recognition.start();
      setStatus("聞き取り中...");
    } else {
      micBtn.textContent = "会話開始";
      micBtn.classList.remove("stop");
      recognition.stop();
      setStatus("待機中");
    }
  };
}

/* テキスト送信 */
sendBtn.onclick = () => {
  if (isProcessing) return;
  const val = inputEl.value.trim();
  if (val) {
    conversation = false; // テキスト送信時は自動会話モードを切る
    micBtn.textContent = "会話開始";
    micBtn.classList.remove("stop");
    chat(val);
    inputEl.value = "";
  }
};

/* 停止ボタン */
document.getElementById("stop").onclick = () => {
  location.reload(); // 一番確実に止める
};
</script>

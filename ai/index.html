<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NAKAMUROBO AI MINIMAL VOICE</title>
<style>
  body{
    margin:0;
    background:#f5f5f7;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
  }
  .app{
    width:100%;
    max-width:420px;
    background:#fff;
    border-radius:20px;
    padding:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
    text-align:center;
  }
  h1{
    font-size:24px;
    margin:0 0 12px;
  }
  #response{
    min-height:88px;
    font-size:20px;
    line-height:1.6;
    margin:16px 0;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
  }
  input{
    width:100%;
    box-sizing:border-box;
    padding:14px;
    font-size:16px;
    border:1px solid #ddd;
    border-radius:12px;
    margin-bottom:10px;
  }
  button{
    width:100%;
    padding:14px;
    font-size:16px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    margin-bottom:10px;
  }
  #unlock{
    background:#111;
    color:#fff;
  }
  #speakTest{
    background:#eee;
    color:#111;
  }
  #mic{
    background:#0a84ff;
    color:#fff;
  }
  #send{
    background:#34c759;
    color:#fff;
  }
  #stop{
    background:#ff3b30;
    color:#fff;
  }
  #heard{
    min-height:28px;
    font-size:14px;
    color:#666;
    margin-bottom:10px;
  }
  #status{
    font-size:13px;
    color:#666;
    margin-top:8px;
  }
</style>
</head>
<body>
  <div class="app">
    <h1 id="robotName">ナカムロボユニット01</h1>
    <div id="response">まず「音声を有効化」を押してください。</div>
    <div id="heard">待機中</div>

    <button id="unlock">音声を有効化</button>
    <button id="speakTest">テスト音声を鳴らす</button>
    <button id="mic">話す</button>
    <button id="stop">停止</button>

    <input id="input" type="text" placeholder="入力してください" />
    <button id="send">送信</button>

    <div id="status">待機中</div>
  </div>

<script>
const qs = new URLSearchParams(location.search);

const config = {
  id: qs.get("id") || "robot01",
  name: qs.get("name") || "ナカムロボユニット01",
  endpoint: qs.get("endpoint") || "https://nakamurobo-ai.nakamura0407.workers.dev/"
};

document.getElementById("robotName").textContent = config.name;

const responseEl = document.getElementById("response");
const heardEl = document.getElementById("heard");
const inputEl = document.getElementById("input");
const unlockBtn = document.getElementById("unlock");
const speakTestBtn = document.getElementById("speakTest");
const micBtn = document.getElementById("mic");
const stopBtn = document.getElementById("stop");
const sendBtn = document.getElementById("send");
const statusEl = document.getElementById("status");

let audioUnlocked = false;
let firstTurn = true;
let history = [];
let recognition = null;
let isListening = false;
let isSpeaking = false;
let isProcessing = false;

function setStatus(text){
  statusEl.textContent = text;
}

function setResponse(text){
  responseEl.textContent = text;
}

function setHeard(text){
  heardEl.textContent = text;
}

function loadVoices(){
  return window.speechSynthesis.getVoices();
}

function getJaVoice(){
  const voices = loadVoices();
  return voices.find(v => v.lang && v.lang.toLowerCase().includes("ja")) || null;
}

function stopSpeech(){
  try{
    window.speechSynthesis.cancel();
  }catch(e){}
  isSpeaking = false;
}

function speak(text){
  return new Promise((resolve) => {
    if (!audioUnlocked) {
      resolve();
      return;
    }

    if (!("speechSynthesis" in window)) {
      resolve();
      return;
    }

    try{
      stopSpeech();

      const uttr = new SpeechSynthesisUtterance(text);
      uttr.lang = "ja-JP";
      uttr.rate = 0.95;
      uttr.pitch = 0.9;
      uttr.volume = 1.0;

      const voice = getJaVoice();
      if (voice) uttr.voice = voice;

      isSpeaking = true;
      setStatus("再生中...");

      uttr.onend = () => {
        isSpeaking = false;
        setStatus("再生完了");
        resolve();
      };

      uttr.onerror = (e) => {
        console.error("speech error", e);
        isSpeaking = false;
        setStatus("音声再生エラー");
        resolve();
      };

      window.speechSynthesis.resume();

      setTimeout(() => {
        try{
          window.speechSynthesis.speak(uttr);
        }catch(err){
          console.error(err);
          isSpeaking = false;
          setStatus("音声再生失敗");
          resolve();
        }
      }, 50);

    }catch(e){
      console.error(e);
      isSpeaking = false;
      setStatus("音声再生失敗");
      resolve();
    }
  });
}

async function unlockAudio(){
  if (!("speechSynthesis" in window)) {
    setResponse("この端末は音声再生に対応していません。");
    setStatus("speechSynthesis未対応");
    return;
  }

  try{
    loadVoices();

    const u = new SpeechSynthesisUtterance(" ");
    u.volume = 0;
    u.lang = "ja-JP";

    window.speechSynthesis.cancel();
    window.speechSynthesis.resume();
    window.speechSynthesis.speak(u);

    audioUnlocked = true;
    unlockBtn.disabled = true;
    unlockBtn.textContent = "音声有効化済み";
    setResponse("音声を有効化しました。");
    setStatus("音声有効");
  }catch(e){
    console.error(e);
    setStatus("音声有効化失敗");
  }
}

async function fetchReply(userText){
  const res = await fetch(config.endpoint, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      robotId: config.id,
      robotName: config.name,
      userText,
      isFirstTurn: firstTurn,
      history
    })
  });

  const data = await res.json();
  return data.reply || "応答を確認しました。";
}

async function handleUserText(text){
  const userText = String(text || "").trim();
  if (!userText || isProcessing) return;

  isProcessing = true;
  setHeard("入力: " + userText);
  setResponse("応答取得中...");
  setStatus("通信中...");

  try{
    const reply = await fetchReply(userText);

    history.push({ role: "user", content: userText });
    history.push({ role: "assistant", content: reply });
    history = history.slice(-8);
    firstTurn = false;

    setResponse(reply);
    await speak(reply);
  }catch(e){
    console.error(e);
    setResponse("通信エラーです。");
    setStatus("通信失敗");
  }finally{
    isProcessing = false;
    isListening = false;
  }
}

unlockBtn.addEventListener("click", unlockAudio);

speakTestBtn.addEventListener("click", async () => {
  await speak("音声出力を確認しました。");
});

sendBtn.addEventListener("click", async () => {
  const text = inputEl.value.trim();
  if (!text) return;
  inputEl.value = "";
  await handleUserText(text);
});

inputEl.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    e.preventDefault();
    sendBtn.click();
  }
});

const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

if (SR) {
  recognition = new SR();
  recognition.lang = "ja-JP";
  recognition.interimResults = true;
  recognition.continuous = false;

  recognition.onstart = () => {
    isListening = true;
    setStatus("聞き取り中...");
    setHeard("聞き取り中...");
  };

  recognition.onresult = async (e) => {
    let interim = "";
    let finalText = "";

    for (let i = e.resultIndex; i < e.results.length; i++) {
      const transcript = e.results[i][0].transcript || "";
      if (e.results[i].isFinal) {
        finalText += transcript;
      } else {
        interim += transcript;
      }
    }

    if (interim.trim()) {
      setHeard("入力途中: " + interim.trim());
    }

    if (finalText.trim()) {
      setHeard("入力: " + finalText.trim());
      await handleUserText(finalText.trim());
    }
  };

  recognition.onerror = (e) => {
    console.error("recognition error", e);

    isListening = false;

    if (e.error === "not-allowed") {
      setResponse("マイクの許可が必要です。");
      setStatus("マイク権限エラー");
      setHeard("マイクを許可してください");
    } else if (e.error === "no-speech") {
      setStatus("音声なし");
      setHeard("音声を確認できませんでした");
    } else {
      setStatus("音声認識エラー");
      setHeard("認識に失敗しました");
    }
  };

  recognition.onend = () => {
    isListening = false;
    if (!isProcessing && !isSpeaking) {
      setStatus("待機中");
    }
  };
} else {
  micBtn.disabled = true;
  setStatus("音声認識未対応");
  setHeard("このブラウザは音声認識に未対応です");
}

micBtn.addEventListener("click", () => {
  if (!audioUnlocked) {
    setResponse("先に音声を有効化してください。");
    setStatus("音声未有効");
    return;
  }

  if (!recognition) {
    setResponse("このブラウザは音声認識に対応していません。");
    return;
  }

  if (isProcessing || isSpeaking || isListening) {
    return;
  }

  try{
    recognition.start();
  }catch(e){
    console.error(e);
    setStatus("認識開始失敗");
  }
});

stopBtn.addEventListener("click", () => {
  try{
    if (recognition && isListening) recognition.stop();
  }catch(e){}

  stopSpeech();
  isListening = false;
  isProcessing = false;
  setStatus("停止しました");
  setHeard("停止しました");
});

if ("speechSynthesis" in window) {
  window.speechSynthesis.onvoiceschanged = () => {
    loadVoices();
  };
  loadVoices();
}
</script>
</body>
</html>

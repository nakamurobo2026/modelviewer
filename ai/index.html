<script>
const qs = new URLSearchParams(location.search);

const config = {
  id: qs.get("id") || "robot01",
  name: qs.get("name") || "ナカムロボユニット01",
  endpoint: qs.get("endpoint") || "",
  voice: qs.get("voice") || "onyx",
  lang: qs.get("lang") || "ja-JP",
  rate: Number(qs.get("rate") || 1.0),
  pitch: Number(qs.get("pitch") || 1.0)
};

const robotMeta = document.getElementById("robotMeta");
const robotName = document.getElementById("robotName");
const statusText = document.getElementById("statusText");
const responseText = document.getElementById("responseText");
const heardText = document.getElementById("heardText");
const micBtn = document.getElementById("micBtn");
const stopBtn = document.getElementById("stopBtn");
const sendBtn = document.getElementById("sendBtn");
const textInput = document.getElementById("textInput");

robotMeta.textContent = `ID: ${config.id}`;
robotName.textContent = config.name;

let currentAudio = null;
let currentAudioUrl = null;
let audioUnlocked = false;

function setStatus(text) {
  statusText.textContent = text;
}

function cleanupAudio() {
  if (currentAudio) {
    currentAudio.pause();
    currentAudio.removeAttribute("src");
    currentAudio.load();
    currentAudio = null;
  }
  if (currentAudioUrl) {
    URL.revokeObjectURL(currentAudioUrl);
    currentAudioUrl = null;
  }
}

async function unlockAudio() {
  if (audioUnlocked) return true;

  try {
    const silentAudio = new Audio(
      "data:audio/wav;base64,UklGRigAAABXQVZFRm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQQAAAAAAA=="
    );
    silentAudio.volume = 0;
    await silentAudio.play();
    silentAudio.pause();
    audioUnlocked = true;
    return true;
  } catch (e) {
    console.log("audio unlock failed:", e);
    return false;
  }
}

async function safeReadError(response) {
  try {
    const data = await response.json();
    return data.detail || data.error || `HTTP ${response.status}`;
  } catch (e) {
    try {
      return await response.text();
    } catch (e2) {
      return `HTTP ${response.status}`;
    }
  }
}

async function playAudioBlob(blob) {
  cleanupAudio();

  currentAudioUrl = URL.createObjectURL(blob);
  currentAudio = new Audio(currentAudioUrl);
  currentAudio.preload = "auto";
  currentAudio.playbackRate = 0.95;

  currentAudio.onplay = () => {
    setStatus("再生中");
  };

  currentAudio.onended = () => {
    setStatus("待機中");
    cleanupAudio();
  };

  currentAudio.onerror = () => {
    setStatus("音声再生エラー");
    cleanupAudio();
  };

  try {
    await currentAudio.play();
  } catch (e) {
    if (String(e && e.message).toLowerCase().includes("user denied permission")) {
      throw new Error("音声再生が許可されていません。Safariで開いて、音声再生を許可してください");
    }
    throw e;
  }
}

async function chat(txt) {
  const message = (txt || "").trim();
  if (!message) return;

  if (!config.endpoint) {
    setStatus("endpoint未設定");
    responseText.textContent = "URLに endpoint を設定してください";
    return;
  }

  setStatus("通信中...");
  heardText.textContent = `入力: ${message}`;

  try {
    const response = await fetch(config.endpoint, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        robotId: config.id,
        robotName: config.name,
        userText: message,
        voice: config.voice
      })
    });

    const replyHeader = response.headers.get("X-Reply");
    if (replyHeader) {
      responseText.textContent = decodeURIComponent(replyHeader);
    }

    if (!response.ok) {
      const errMsg = await safeReadError(response);
      throw new Error(errMsg);
    }

    const contentType = response.headers.get("Content-Type") || "";
    if (!contentType.includes("audio/")) {
      const errMsg = await safeReadError(response);
      throw new Error(errMsg || "音声データではありません");
    }

    const audioBlob = await response.blob();
    if (!audioBlob || audioBlob.size === 0) {
      throw new Error("音声データが空です");
    }

    await playAudioBlob(audioBlob);

  } catch (e) {
    console.error(e);
    setStatus("通信・再生失敗");
    responseText.textContent = `エラー: ${e.message}`;
  }
}

const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let rec = null;

if (SR) {
  rec = new SR();
  rec.lang = config.lang;
  rec.interimResults = false;
  rec.maxAlternatives = 1;

  rec.onstart = () => {
    setStatus("聞き取り中...");
  };

  rec.onresult = async (e) => {
    const transcript = e.results[0][0].transcript;
    await chat(transcript);
  };

  rec.onerror = (e) => {
    console.error("speech recognition error:", e);

    if (e.error === "not-allowed" || e.error === "service-not-allowed") {
      setStatus("マイク許可が必要");
      responseText.textContent = "マイク使用が拒否されています。Safariのサイト設定でマイクを許可してください。";
      return;
    }

    if (e.error === "no-speech") {
      setStatus("音声なし");
      responseText.textContent = "音声を認識できませんでした。もう一度どうぞ。";
      return;
    }

    setStatus(`音声認識エラー: ${e.error}`);
    responseText.textContent = `音声認識エラー: ${e.error}`;
  };

  rec.onend = () => {
    if (statusText.textContent === "聞き取り中...") {
      setStatus("待機中");
    }
  };

  micBtn.onclick = async () => {
    await unlockAudio();

    try {
      rec.start();
    } catch (e) {
      console.error(e);

      if (String(e && e.message).toLowerCase().includes("permission")) {
        setStatus("マイク許可が必要");
        responseText.textContent = "マイクの使用が許可されていません。Safariのサイト設定を確認してください。";
        return;
      }

      setStatus("音声認識開始失敗");
      responseText.textContent = `エラー: ${e.message}`;
    }
  };
} else {
  micBtn.disabled = true;
  micBtn.textContent = "音声非対応";
}

sendBtn.onclick = async () => {
  await unlockAudio();
  const value = textInput.value;
  textInput.value = "";
  await chat(value);
};

textInput.addEventListener("keydown", async (e) => {
  if (e.key === "Enter") {
    e.preventDefault();
    await unlockAudio();
    const value = textInput.value;
    textInput.value = "";
    await chat(value);
  }
});

stopBtn.onclick = () => {
  cleanupAudio();
  setStatus("停止");
};
</script>

<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NAKAMUROBO MINIMUM</title>
  <style>
    body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 50px; }
    button { padding: 20px; font-size: 18px; background: #ffd54a; border: none; border-radius: 10px; cursor: pointer; width: 100%; }
    input { width: 100%; padding: 15px; margin-bottom: 20px; border-radius: 10px; border: 1px solid #333; background: #111; color: #fff; box-sizing: border-box; }
    #res { margin: 30px 0; font-size: 20px; min-height: 50px; }
  </style>
</head>
<body>
  <input id="input" type="text" placeholder="何か入力...">
  <button id="btn">送信して再生</button>
  <div id="res">...</div>

  <script>
    const audio = new Audio();

    async function send() {
      const txt = document.getElementById("input").value;
      if (!txt) return;

      document.getElementById("res").textContent = "通信中...";
      
      // ★iPhone対策：クリックした瞬間に音声を「有効化」する
      audio.src = "data:audio/wav;base64,UklGRigAAABXQVZFRm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQQAAAAAAA==";
      await audio.play().catch(()=>{});

      const endpoint = new URLSearchParams(location.search).get("endpoint");

      try {
        const r = await fetch(endpoint, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ userText: txt })
        });
        const d = await r.json();

        document.getElementById("res").textContent = d.reply;

        if (d.audioBase64) {
          audio.src = "data:audio/mpeg;base64," + d.audioBase64;
          await audio.play();
        }
      } catch (e) {
        document.getElementById("res").textContent = "エラー: " + e.message;
      }
    }

    document.getElementById("btn").onclick = send;
  </script>
</body>
</html>

<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>NAKAMUROBO AI</title>
<style>
/* あなたのオリジナルデザインを100%維持 */
:root{ --bg1:#f5f5f7; --bg2:#e9eaee; --card:rgba(255,255,255,0.78); --line:rgba(0,0,0,0.08); --text:#111; --sub:#6e6e73; --accent:#0a84ff; --accent-strong:#0066d6; --start:#111; --start-border:rgba(0,0,0,0.12); --start-active:#0a84ff; --start-active-text:#fff; --danger-bg:#fff1f1; --danger-border:#ffd1d1; --danger-text:#b42318; }
*{box-sizing:border-box} body{ min-height:100vh; background:radial-gradient(circle at top,#fff,var(--bg1) 40%,var(--bg2)); font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif; display:flex; justify-content:center; align-items:center; padding:20px; color:var(--text); margin:0; }
.app{ width:100%; max-width:430px; padding:20px; border-radius:28px; background:var(--card); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); box-shadow:0 30px 60px rgba(0,0,0,0.1); text-align:center; }
.core{ width:120px; height:120px; border-radius:50%; margin:0 auto; display:flex; align-items:center; justify-content:center; background:radial-gradient(circle at 35% 30%, #ffffff 0%, #f1f1f3 55%, #dddddf 100%); box-shadow: inset 0 2px 8px rgba(255,255,255,0.9), 0 10px 30px rgba(0,0,0,0.1); }
.heart-svg{ width:38px; height:34px; animation:pulse 2.2s infinite ease-in-out; filter:drop-shadow(0 0 8px rgba(255,213,74,0.28)); }
.heart-svg.talking{ animation:pulseTalk 0.72s infinite ease-in-out; }
@keyframes pulse{ 0%,100%{ transform:scale(1); } 50%{ transform:scale(1.12); } }
@keyframes pulseTalk{ 0%,100%{ transform:scale(1.02); } 50%{ transform:scale(1.2); } }
h2{ margin:16px 0 8px; font-size:24px; color:var(--text); letter-spacing:.02em; }
.response{ margin:18px 0 12px; font-size:20px; min-height:84px; color:var(--text); display:flex; align-items:center; justify-content:center; text-align:center; line-height:1.55; padding:0 4px; }
.heard-wrap{ min-height:40px; display:flex; justify-content:center; margin-bottom:12px; }
.heard{ display:inline-flex; align-items:center; gap:8px; max-width:100%; padding:8px 12px; border-radius:999px; background:rgba(255,255,255,0.78); border:1px solid rgba(0,0,0,0.06); color:#5f6470; font-size:12px; opacity:0; transform:translateY(6px); transition:opacity .2s ease, transform .2s ease; }
.heard.show{ opacity:1; transform:translateY(0); }
.heard-dot{ width:7px; height:7px; border-radius:50%; background:var(--accent); }
button{ width:100%; margin:6px 0; padding:15px 14px; border-radius:16px; border:none; font-size:15px; font-weight:600; transition:all .18s ease; cursor:pointer; }
.primary{ background:linear-gradient(180deg,var(--accent),var(--accent-strong)); color:#fff; box-shadow:0 10px 24px rgba(10,132,255,0.22); }
.secondary{ background:#fff; border:1.5px solid var(--start-border); color:var(--start); box-shadow:0 6px 16px rgba(0,0,0,0.05); }
.live{ background:linear-gradient(180deg,var(--accent),#0057b8) !important; color:#fff !important; }
.input-area{ display:flex; gap:8px; margin-top:10px; }
input{ flex:1; padding:12px; border-radius:14px; border:1px solid var(--line); outline:none; font-size:15px; background:#fff; }
.send{ background:linear-gradient(180deg,var(--accent),var(--accent-strong)); color:#fff; width:auto; min-width:84px; }
</style>
</head>
<body>
<div class="app">
  <div class="core"><svg id="heart" class="heart-svg" viewBox="0 0 24 22"><path fill="#FFD54A" d="M12 21.2 10.55 19.88C5.4 15.22 2 12.14 2 8.35 2 5.27 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09 C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.27 22 8.35 c0 3.79-3.4 6.87-8.55 11.53 L12 21.2Z"/></svg></div>
  <h2 id="robotName">ナカムロボユニット01</h2>
  <div id="response" class="response">音声を有効化してください。</div>
  <div class="heard-wrap"><div id="heard" class="heard"><span class="heard-dot"></span><span id="heardText" class="heard-text">待機中</span></div></div>
  <button id="enable" class="primary">音声を有効化</button>
  <button id="mic" class="secondary" style="display:none;">会話開始</button>
  <div id="ui-area" style="display:none;"><div class="input-area"><input id="input" placeholder="入力..." /><button id="send" class="send">送信</button></div></div>
</div>

<script>
const qs = new URLSearchParams(location.search);
const config = { id: qs.get("id") || "robot01", name: qs.get("name") || "ナカムロボユニット01", endpoint: qs.get("endpoint") || "" };
document.getElementById("robotName").textContent = config.name;

const responseEl = document.getElementById("response"), inputEl = document.getElementById("input"), micBtn = document.getElementById("mic"), enableBtn = document.getElementById("enable"), sendBtn = document.getElementById("send"), heartEl = document.getElementById("heart"), heardEl = document.getElementById("heard"), heardTextEl = document.getElementById("heardText");

let audioContext, recognition, conversation = false, isProcessing = false;

function showHeard(text, show = true) { heardTextEl.textContent = text; heardEl.classList.toggle("show", show); }

// iOSの音声ロックを解除
function unlock() {
  if (audioContext && audioContext.state === 'suspended') audioContext.resume();
  const buffer = audioContext.createBuffer(1, 1, 22050);
  const src = audioContext.createBufferSource();
  src.buffer = buffer; src.connect(audioContext.destination);
  src.start(0);
}

enableBtn.onclick = async () => {
  const AC = window.AudioContext || window.webkitAudioContext;
  audioContext = new AC(); await audioContext.resume();
  try { await navigator.mediaDevices.getUserMedia({ audio: true }); } catch(e) {}
  enableBtn.style.display = "none"; micBtn.style.display = "block"; document.getElementById("ui-area").style.display = "flex";
  responseEl.textContent = "同期完了。"; showHeard("READY");
};

async function chat(text) {
  if (!text || isProcessing) return;
  isProcessing = true;
  if (conversation && recognition) try { recognition.stop(); } catch(e){}
  responseEl.textContent = "解析中..."; showHeard(`YOU: ${text}`);

  try {
    const res = await fetch(config.endpoint, { method: "POST", headers: {'Content-Type':'application/json'}, body: JSON.stringify({ robotId: config.id, robotName: config.name, userText: text }) });
    const reply = res.headers.get("X-Reply");
    if (reply) responseEl.textContent = decodeURIComponent(reply);

    const ab = await res.arrayBuffer();
    const buf = await audioContext.decodeAudioData(ab);
    const src = audioContext.createBufferSource();
    src.buffer = buf; src.connect(audioContext.destination);

    heartEl.classList.add("talking");
    src.onended = () => {
      heartEl.classList.remove("talking"); isProcessing = false;
      if (conversation) { showHeard("LISTENING..."); try { recognition.start(); } catch(e){} }
    };
    src.start(0);
  } catch (e) { responseEl.textContent = "信号ロスト。"; isProcessing = false; }
}

const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
if (SR) {
  recognition = new SR(); recognition.lang = "ja-JP";
  recognition.onresult = e => { const t = e.results[0][0].transcript; if (t) chat(t); };
  recognition.onend = () => { if (conversation && !isProcessing) try { recognition.start(); } catch(e){} };
  micBtn.onclick = () => {
    unlock(); conversation = !conversation;
    if (conversation) { micBtn.textContent = "会話中"; micBtn.classList.add("live"); recognition.start(); showHeard("LISTENING..."); }
    else { micBtn.textContent = "会話開始"; micBtn.classList.remove("live"); recognition.stop(); showHeard("OFF"); }
  };
}
sendBtn.onclick = () => { unlock(); chat(inputEl.value); inputEl.value = ""; };
inputEl.onkeypress = e => { if(e.key==="Enter") sendBtn.click(); };
</script>
</body>
</html>

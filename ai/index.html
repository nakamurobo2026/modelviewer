<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NAKAMUROBO AI STABLE</title>

<style>
body{
  margin:0;
  background:#f5f5f7;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:20px;
}
.app{
  width:100%;
  max-width:420px;
  background:#fff;
  border-radius:20px;
  padding:20px;
  box-shadow:0 10px 30px rgba(0,0,0,.08);
  text-align:center;
}
h1{font-size:22px;margin:0 0 10px;}
#response{min-height:80px;font-size:20px;margin:16px 0;}
#heard{font-size:14px;color:#666;margin-bottom:10px;}
#status{font-size:12px;color:#888;margin-top:6px;}
input{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border-radius:10px;
  border:1px solid #ddd;
}
button{
  width:100%;
  padding:14px;
  margin-bottom:8px;
  border:none;
  border-radius:10px;
  font-size:15px;
}
#unlock{background:#111;color:#fff;}
#mic{background:#0a84ff;color:#fff;}
#send{background:#34c759;color:#fff;}
#stop{background:#ff3b30;color:#fff;}
</style>
</head>

<body>
<div class="app">
<h1>ナカムロボ</h1>

<div id="response">音声を有効化してください</div>
<div id="heard">待機中</div>

<button id="unlock">音声有効化</button>
<button id="mic">話す</button>
<button id="stop">停止</button>

<input id="input" placeholder="入力でもOK">
<button id="send">送信</button>

<div id="status">待機中</div>
</div>

<script>
const endpoint = "https://nakamurobo-ai.nakamura0407.workers.dev/";

const responseEl = document.getElementById("response");
const heardEl = document.getElementById("heard");
const statusEl = document.getElementById("status");
const inputEl = document.getElementById("input");

let audioUnlocked = false;
let recognition;
let isListening = false;

// ===== UI =====
function setStatus(t){statusEl.textContent=t;}
function setResponse(t){responseEl.textContent=t;}
function setHeard(t){heardEl.textContent=t;}

// ===== 音声出力 =====
function speak(text){
  return new Promise((res)=>{
    if(!audioUnlocked)return res();

    const uttr = new SpeechSynthesisUtterance(text);
    uttr.lang="ja-JP";
    uttr.rate=0.95;

    uttr.onend=()=>res();
    uttr.onerror=()=>res();

    speechSynthesis.cancel();
    speechSynthesis.resume();

    setTimeout(()=>speechSynthesis.speak(uttr),50);
  });
}

// ===== 音声有効化 =====
document.getElementById("unlock").onclick=()=>{
  try{
    const u=new SpeechSynthesisUtterance(" ");
    u.volume=0;
    speechSynthesis.speak(u);

    audioUnlocked=true;
    setResponse("音声OK");
    setStatus("音声有効");
  }catch(e){
    setStatus("音声失敗");
  }
};

// ===== API =====
async function chat(text){
  setStatus("通信中...");
  setResponse("...");

  const res=await fetch(endpoint,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({userText:text})
  });

  const data=await res.json();
  const reply=data.reply||"応答";

  setResponse(reply);
  await speak(reply);

  setStatus("待機中");
}

// ===== 音声認識 =====
function initRecognition(){
  const SR = window.webkitSpeechRecognition || window.SpeechRecognition;

  if(!SR){
    setStatus("未対応");
    return;
  }

  recognition = new SR();
  recognition.lang="ja-JP";
  recognition.interimResults=false;

  recognition.onstart=()=>{
    isListening=true;
    setStatus("聞き取り中");
  };

  recognition.onresult=async(e)=>{
    const text=e.results[0][0].transcript;
    setHeard(text);
    await chat(text);
  };

  recognition.onerror=(e)=>{
    console.log(e);

    // ここが超重要
    if(e.error==="service-not-allowed"){
      setResponse("この環境では音声入力がブロックされています");
      setStatus("Chrome設定 or 権限NG");
      setHeard("👉 chrome://settings/content/microphone を確認");
      return;
    }

    setStatus("エラー:"+e.error);
    setHeard(e.error);
  };

  recognition.onend=()=>{
    isListening=false;
    setStatus("待機中");
  };
}

initRecognition();

// ===== ボタン =====
document.getElementById("mic").onclick=async()=>{
  if(!audioUnlocked){
    setResponse("先に音声有効化");
    return;
  }

  try{
    await navigator.mediaDevices.getUserMedia({audio:true});
    recognition.start();
  }catch(e){
    setResponse("マイク許可して");
    setStatus("権限NG");
  }
};

document.getElementById("stop").onclick=()=>{
  if(recognition && isListening) recognition.stop();
  speechSynthesis.cancel();
  setStatus("停止");
};

document.getElementById("send").onclick=()=>{
  const text=inputEl.value.trim();
  if(text) chat(text);
};

inputEl.addEventListener("keydown",(e)=>{
  if(e.key==="Enter"){
    e.preventDefault();
    document.getElementById("send").click();
  }
});
</script>
</body>
</html>

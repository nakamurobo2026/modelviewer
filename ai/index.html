<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NAKAMUROBO AI</title>

<style>
:root{
  --bg1:#f5f5f7;
  --bg2:#e9eaee;
  --card:rgba(255,255,255,0.78);
  --line:rgba(0,0,0,0.08);
  --text:#111;
  --sub:#6e6e73;

  --accent:#0a84ff;
  --accent-strong:#0066d6;
  --start:#111;
  --start-border:rgba(0,0,0,0.12);
  --start-active:#0a84ff;
  --start-active-text:#fff;
}

*{box-sizing:border-box}
html,body{margin:0;padding:0}

body{
  min-height:100vh;
  background:radial-gradient(circle at top,#fff,var(--bg1) 40%,var(--bg2));
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
  color:var(--text);
}

.app{
  width:100%;
  max-width:430px;
  padding:20px;
  border-radius:28px;
  background:var(--card);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  box-shadow:0 30px 60px rgba(0,0,0,0.1);
  text-align:center;
}

.core{
  width:120px;
  height:120px;
  border-radius:50%;
  margin:0 auto;
  display:flex;
  align-items:center;
  justify-content:center;
  background:radial-gradient(circle at 35% 30%, #ffffff 0%, #f1f1f3 55%, #dddddf 100%);
  box-shadow:
    inset 0 2px 8px rgba(255,255,255,0.9),
    0 10px 30px rgba(0,0,0,0.1);
}

.heart-svg{
  width:38px;
  height:34px;
  display:block;
  animation:pulse 2.2s infinite ease-in-out;
  filter:drop-shadow(0 0 8px rgba(255,213,74,0.28));
}

.heart-svg.talking{
  animation:pulseTalk 0.72s infinite ease-in-out;
}

.heart-svg.listening{
  animation:pulseListen 1.05s infinite ease-in-out;
}

@keyframes pulse{
  0%,100%{ transform:scale(1); }
  50%{ transform:scale(1.12); }
}

@keyframes pulseTalk{
  0%,100%{ transform:scale(1.02); }
  50%{ transform:scale(1.22); }
}

@keyframes pulseListen{
  0%,100%{ transform:scale(1); opacity:1; }
  50%{ transform:scale(1.12); opacity:.78; }
}

h2{
  margin:16px 0 8px;
  font-size:24px;
  color:var(--text);
  letter-spacing:.02em;
}

.response{
  margin:18px 0 12px;
  font-size:20px;
  min-height:84px;
  color:var(--text);
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  line-height:1.55;
  padding:0 4px;
  word-break:break-word;
}

.heard-wrap{
  min-height:40px;
  display:flex;
  justify-content:center;
  margin-bottom:8px;
}

.heard{
  display:inline-flex;
  align-items:center;
  gap:8px;
  max-width:100%;
  padding:8px 12px;
  border-radius:999px;
  background:rgba(255,255,255,0.78);
  border:1px solid rgba(0,0,0,0.06);
  color:#5f6470;
  font-size:12px;
  line-height:1.35;
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  opacity:0;
  transform:translateY(6px);
  transition:opacity .2s ease, transform .2s ease;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  box-shadow:0 6px 18px rgba(0,0,0,0.04);
}

.heard.show{
  opacity:1;
  transform:translateY(0);
}

.heard-dot{
  width:7px;
  height:7px;
  border-radius:50%;
  background:var(--accent);
  flex:0 0 auto;
  opacity:.9;
}

.heard-text{
  overflow:hidden;
  text-overflow:ellipsis;
}

button{
  width:100%;
  margin:6px 0;
  padding:15px 14px;
  border-radius:16px;
  border:none;
  font-size:15px;
  font-weight:600;
  transition:all .18s ease;
  cursor:pointer;
}

button:active{
  transform:scale(0.985);
}

button:disabled{
  cursor:default;
  opacity:.62;
}

.primary{
  background:linear-gradient(180deg,var(--accent),var(--accent-strong));
  color:#fff;
  box-shadow:0 10px 24px rgba(10,132,255,0.22);
}

.secondary{
  background:#fff;
  border:1.5px solid var(--start-border);
  color:var(--start);
  box-shadow:0 6px 16px rgba(0,0,0,0.05);
}

.enabled{
  background:#eef6ff !important;
  color:#0a84ff !important;
  border:1.5px solid rgba(10,132,255,0.22) !important;
  box-shadow:0 8px 20px rgba(10,132,255,0.08);
  opacity:1;
}

.live{
  background:linear-gradient(180deg,var(--start-active),#0057b8) !important;
  color:var(--start-active-text) !important;
  border:1.5px solid rgba(0,0,0,0) !important;
  box-shadow:0 12px 24px rgba(10,132,255,0.26) !important;
}

.input-area{
  display:flex;
  gap:8px;
  margin-top:10px;
}

input{
  flex:1;
  padding:12px;
  border-radius:14px;
  border:1px solid var(--line);
  outline:none;
  font-size:15px;
  background:#fff;
}

input:focus{
  border-color:rgba(10,132,255,0.38);
  box-shadow:0 0 0 4px rgba(10,132,255,0.08);
}

.send{
  background:linear-gradient(180deg,var(--accent),var(--accent-strong));
  color:#fff;
  width:auto;
  min-width:84px;
  box-shadow:0 10px 24px rgba(10,132,255,0.18);
}

.guide{
  margin-top:14px;
  font-size:12px;
  color:#8e8e93;
  line-height:1.65;
  white-space:pre-line;
}

#quota{
  margin-top:4px;
  margin-bottom:6px;
  font-size:12px;
  color:#8e8e93;
  line-height:1.5;
}
</style>
</head>

<body>

<div class="app">
  <div class="core">
    <svg id="heart" class="heart-svg" viewBox="0 0 24 22" aria-hidden="true">
      <path fill="#FFD54A"
        d="M12 21.2 10.55 19.88C5.4 15.22 2 12.14 2 8.35
        2 5.27 4.42 3 7.5 3
        c1.74 0 3.41.81 4.5 2.09
        C13.09 3.81 14.76 3 16.5 3
        19.58 3 22 5.27 22 8.35
        c0 3.79-3.4 6.87-8.55 11.53
        L12 21.2Z"/>
    </svg>
  </div>

  <h2 id="robotName">ナカムロボユニット01</h2>

  <div id="response" class="response">音声を有効化してください。</div>

  <div class="heard-wrap">
    <div id="heard" class="heard" aria-live="polite">
      <span class="heard-dot"></span>
      <span id="heardText" class="heard-text">待機中</span>
    </div>
  </div>

  <div id="quota" class="guide">本日の接続残量：未接続</div>

  <button id="enable" class="primary">音声を有効化</button>
  <button id="mic" class="secondary">会話開始</button>

  <div class="input-area">
    <input id="input" placeholder="入力..." />
    <button id="send" class="send">送信</button>
  </div>

  <div id="guide" class="guide">音声を有効化後、「会話開始」を押してください。
テキストで話したい場合は、下の入力欄に入れて「送信」を押してください。</div>
</div>

<script>
const qs = new URLSearchParams(location.search);

const config = {
  id: qs.get("id") || "robot01",
  name: qs.get("name") || "ナカムロボユニット01",
  endpoint: qs.get("endpoint") || "https://nakamurobo-ai.nakamura0407.workers.dev/"
};

function getOrCreateClientId(){
  const key = "nakamurobo_client_id";
  let id = localStorage.getItem(key);

  if(!id){
    if(window.crypto && crypto.randomUUID){
      id = crypto.randomUUID();
    }else{
      id = "client_" + Date.now() + "_" + Math.random().toString(36).slice(2);
    }
    localStorage.setItem(key, id);
  }

  return id;
}

const clientId = getOrCreateClientId();

document.getElementById("robotName").textContent = config.name;

const responseEl = document.getElementById("response");
const inputEl = document.getElementById("input");
const micBtn = document.getElementById("mic");
const enableBtn = document.getElementById("enable");
const sendBtn = document.getElementById("send");
const heartEl = document.getElementById("heart");
const heardEl = document.getElementById("heard");
const heardTextEl = document.getElementById("heardText");
const guideEl = document.getElementById("guide");
const quotaEl = document.getElementById("quota");

const ua = navigator.userAgent || "";
const isLineInApp = /Line/i.test(ua);
const isSecure = location.protocol === "https:" || location.hostname === "localhost";
const hasSpeechSynthesis = "speechSynthesis" in window;
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
const hasSpeechRecognition = !!SR;

let audioEnabled = false;
let recognition = null;
let conversation = false;
let firstTurn = true;
let isPlaying = false;
let isProcessing = false;
let manuallyStopped = false;
let history = [];
let heardTimer = null;
let sttBlocked = false;

function setResponse(text){
  responseEl.textContent = text;
}

function setTalking(active){
  heartEl.classList.toggle("talking", !!active);
}

function setListening(active){
  heartEl.classList.toggle("listening", !!active);
}

function setConversationUI(active){
  if(active){
    micBtn.textContent = "停止";
    micBtn.classList.add("live");
    micBtn.classList.remove("secondary");
  }else{
    micBtn.textContent = sttBlocked ? "音声入力不可" : "会話開始";
    micBtn.classList.remove("live");
    micBtn.classList.add("secondary");
  }
}

function showHeard(text, keep = false){
  if(!text) return;
  heardTextEl.textContent = text;
  heardEl.classList.add("show");

  if(heardTimer) clearTimeout(heardTimer);
  if(!keep){
    heardTimer = setTimeout(() => {
      heardEl.classList.remove("show");
    }, 4200);
  }
}

function setGuide(text){
  guideEl.textContent = text;
}

function updateQuota(remaining, limitReached = false){
  if(!quotaEl) return;

  if(typeof remaining !== "number"){
    quotaEl.textContent = "本日の接続残量：未接続";
    return;
  }

  if(limitReached || remaining <= 0){
    quotaEl.textContent = "本日の接続残量はありません。";
    return;
  }

  quotaEl.textContent = `本日の接続残量：あと${remaining}回`;
}

function pushHistory(role, content){
  history.push({ role, content });
  if(history.length > 8){
    history = history.slice(-8);
  }
}

async function fetchWithTimeout(url, options = {}, timeout = 20000){
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeout);

  try{
    return await fetch(url, { ...options, signal: controller.signal });
  } finally {
    clearTimeout(timer);
  }
}

function getJapaneseVoice(){
  const voices = window.speechSynthesis?.getVoices?.() || [];
  const jaVoices = voices.filter(v => /ja-JP|ja_JP|Japanese|日本/.test(`${v.lang} ${v.name}`));
  return jaVoices[0] || null;
}

function stopSpeech(){
  try{
    if(hasSpeechSynthesis){
      window.speechSynthesis.cancel();
    }
  }catch(e){}
  isPlaying = false;
  setTalking(false);
}

function stopRecognition(){
  if(!recognition) return;
  try{
    recognition.stop();
  }catch(e){}
  setListening(false);
}

function disableMicAsTextOnly(message){
  sttBlocked = true;
  conversation = false;
  manuallyStopped = true;
  stopRecognition();
  setConversationUI(false);
  micBtn.disabled = true;
  micBtn.classList.remove("secondary");
  micBtn.classList.add("enabled");
  setGuide(message);
}

async function speak(text){
  if(!audioEnabled) return;
  if(!hasSpeechSynthesis) return;
  if(!text) return;

  await new Promise((resolve) => {
    try{
      stopSpeech();

      const uttr = new SpeechSynthesisUtterance(text);
      uttr.lang = "ja-JP";
      uttr.rate = 0.92;
      uttr.pitch = 0.82;
      uttr.volume = 1.0;

      const voice = getJapaneseVoice();
      if(voice) uttr.voice = voice;

      isPlaying = true;
      setTalking(true);

      uttr.onend = () => {
        isPlaying = false;
        setTalking(false);
        resolve();
      };

      uttr.onerror = () => {
        isPlaying = false;
        setTalking(false);
        resolve();
      };

      try{
        window.speechSynthesis.resume();
      }catch(e){}

      setTimeout(() => {
        try{
          window.speechSynthesis.speak(uttr);
        }catch(e){
          isPlaying = false;
          setTalking(false);
          resolve();
        }
      }, 120);
    }catch(e){
      isPlaying = false;
      setTalking(false);
      resolve();
    }
  });

  if(conversation && !manuallyStopped && !sttBlocked){
    setTimeout(() => safeRecognitionStart(), 550);
  }
}

async function unlockAudio(){
  if(!hasSpeechSynthesis){
    setResponse("この端末は音声再生に対応していません。");
    showHeard("音声再生未対応", true);
    return;
  }

  try{
    window.speechSynthesis.getVoices();

    const u = new SpeechSynthesisUtterance(" ");
    u.volume = 0;
    u.lang = "ja-JP";

    window.speechSynthesis.cancel();
    window.speechSynthesis.resume();
    window.speechSynthesis.speak(u);

    audioEnabled = true;

    setResponse("会話開始をタップしてください。テキスト入力も使えます。");
    showHeard("音声準備完了", true);
    updateQuota();

    enableBtn.textContent = "音声有効";
    enableBtn.classList.remove("primary");
    enableBtn.classList.add("enabled");
    enableBtn.disabled = true;

    if(isLineInApp){
      disableMicAsTextOnly("LINE内ブラウザでは音声入力が使えません。\n右上メニューからブラウザで開くと音声会話が使えます。\nテキストで話したい場合は、下の入力欄に入れて「送信」を押してください。");
      setResponse("LINEでは音声入力は使えません。テキスト入力を使ってください。");
      showHeard("LINE内はテキスト専用", true);
      return;
    }

    if(!isSecure){
      disableMicAsTextOnly("HTTPS で開くと音声入力が使えます。\nテキストで話したい場合は、下の入力欄に入れて「送信」を押してください。");
      setResponse("音声入力はHTTPSで開いてください。");
      showHeard("HTTPS必須", true);
      return;
    }

    if(!hasSpeechRecognition){
      disableMicAsTextOnly("このブラウザは音声入力に未対応です。\nテキストで話したい場合は、下の入力欄に入れて「送信」を押してください。");
      setResponse("このブラウザは音声入力に未対応です。");
      showHeard("音声認識未対応", true);
      return;
    }

    setGuide("音声を有効化後、「会話開始」を押してください。\nテキストで話したい場合は、下の入力欄に入れて「送信」を押してください。");
  }catch(e){
    setResponse("音声有効化に失敗しました。");
    showHeard("音声有効化失敗", true);
  }
}

async function ensureMicPermission(){
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
    throw new Error("getUserMedia未対応");
  }
  await navigator.mediaDevices.getUserMedia({ audio: true });
}

function safeRecognitionStart(){
  if(!recognition || !conversation || isProcessing || isPlaying || manuallyStopped || sttBlocked){
    return;
  }

  try{
    recognition.start();
  }catch(e){}
}

async function chat(text){
  const userText = String(text || "").trim();
  if(!userText || isProcessing) return;

  manuallyStopped = false;
  isProcessing = true;
  stopRecognition();

  showHeard(`入力: ${userText}`, true);
  pushHistory("user", userText);

  setResponse("解析中...");

  let replyText = "";

  try{
    const res = await fetchWithTimeout(config.endpoint, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        robotId: config.id,
        robotName: config.name,
        clientId,
        userText,
        isFirstTurn: firstTurn,
        history
      })
    }, 20000);

    let data = null;
    try{
      data = await res.json();
    }catch(e){
      data = null;
    }

    if(data?.reply){
      replyText = data.reply;
    }else if(data?.error){
      replyText = data.error;
    }else{
      replyText = "応答を確認しました。";
    }

    if(typeof data?.remaining === "number"){
      updateQuota(data.remaining, !!data.limitReached);
    }

    if(data?.limitReached){
      conversation = false;
      manuallyStopped = true;
      setConversationUI(false);
      stopRecognition();
    }

    setResponse(replyText);
    pushHistory("assistant", replyText);
    firstTurn = false;

    await new Promise(r => setTimeout(r, 260));
    await speak(replyText);

  }catch(e){
    console.error(e);
    const msg = e.name === "AbortError"
      ? "応答が遅延しています。もう一度話してください。"
      : "通信が不安定です。再接続してください。";
    setResponse(msg);
    pushHistory("assistant", msg);
  } finally {
    isProcessing = false;
    if(conversation && !manuallyStopped && !isPlaying && !sttBlocked){
      setTimeout(() => safeRecognitionStart(), 500);
    }
  }
}

function initRecognition(){
  if(!hasSpeechRecognition || isLineInApp) return;

  recognition = new SR();
  recognition.lang = "ja-JP";
  recognition.interimResults = true;
  recognition.continuous = false;
  recognition.maxAlternatives = 1;

  recognition.onstart = () => {
    setListening(true);
    showHeard("聞き取り中...", true);
  };

  recognition.onresult = async (e) => {
    let interim = "";
    let finalText = "";

    for(let i = e.resultIndex; i < e.results.length; i++){
      const transcript = e.results[i][0].transcript || "";
      if(e.results[i].isFinal){
        finalText += transcript;
      }else{
        interim += transcript;
      }
    }

    const preview = (finalText || interim).trim();
    if(preview){
      showHeard(`入力: ${preview}`, true);
    }

    if(finalText.trim()){
      await chat(finalText.trim());
    }
  };

  recognition.onerror = (e) => {
    console.error("recognition error", e);
    setListening(false);

    const code = e?.error || "unknown";

    if(code === "service-not-allowed"){
      disableMicAsTextOnly("この環境では音声入力サービスが使えません。\nChrome本体で開くと使える可能性があります。\nテキストで話したい場合は、下の入力欄に入れて「送信」を押してください。");
      setResponse("この環境では音声入力が使えません。テキスト入力を使ってください。");
      showHeard("音声入力サービス不可", true);
      return;
    }

    if(code === "not-allowed"){
      setResponse("マイク権限が必要です。");
      showHeard("マイク権限が必要です", true);
      return;
    }

    if(code === "no-speech"){
      showHeard("音声を確認できませんでした", false);
      if(conversation && !isProcessing && !isPlaying && !manuallyStopped && !sttBlocked){
        setTimeout(() => safeRecognitionStart(), 500);
      }
      return;
    }

    const map = {
      "network": "音声認識の通信エラーです",
      "audio-capture": "マイク入力を取得できません",
      "aborted": "音声認識が中断されました",
      "language-not-supported": "この言語は未対応です",
      "bad-grammar": "音声認識設定エラーです"
    };

    const msg = map[code] || `音声認識エラー: ${code}`;
    setResponse(msg);
    showHeard(msg, true);
  };

  recognition.onend = () => {
    setListening(false);
    if(conversation && !isProcessing && !isPlaying && !manuallyStopped && !sttBlocked){
      setTimeout(() => safeRecognitionStart(), 600);
    }
  };
}

enableBtn.onclick = unlockAudio;

micBtn.onclick = async () => {
  if(!audioEnabled){
    setResponse("音声を有効化してください。");
    showHeard("先に音声を有効化してください", true);
    return;
  }

  if(sttBlocked){
    setResponse("この環境では音声入力は使えません。テキスト入力を使ってください。");
    showHeard("テキスト入力をご利用ください", true);
    return;
  }

  if(!recognition){
    setResponse("このブラウザは音声認識に対応していません。");
    showHeard("音声認識未対応", true);
    return;
  }

  if(conversation){
    conversation = false;
    manuallyStopped = true;
    setConversationUI(false);
    stopRecognition();
    stopSpeech();
    isProcessing = false;
    showHeard("停止しました", false);
    setResponse("会話を停止しました。再開するには会話開始をタップしてください。");
    return;
  }

  conversation = true;
  manuallyStopped = false;
  setConversationUI(true);

  try{
    await ensureMicPermission();
    setResponse(firstTurn ? "話してください。" : "聞き取りを開始します。");
    showHeard("会話モード開始", false);
    safeRecognitionStart();
  }catch(e){
    console.error(e);
    conversation = false;
    manuallyStopped = true;
    setConversationUI(false);
    setResponse("マイクの使用が許可されていません。");
    showHeard("ブラウザでマイクを許可してください", true);
  }
};

sendBtn.onclick = async () => {
  const text = inputEl.value.trim();
  if(!text) return;
  inputEl.value = "";

  conversation = false;
  manuallyStopped = true;
  setConversationUI(false);
  stopRecognition();
  stopSpeech();

  await chat(text);
};

inputEl.addEventListener("keydown", async (e) => {
  if(e.key === "Enter"){
    e.preventDefault();
    sendBtn.click();
  }
});

if(hasSpeechSynthesis){
  window.speechSynthesis.onvoiceschanged = () => {
    try{
      window.speechSynthesis.getVoices();
    }catch(e){}
  };
}

initRecognition();

if(isLineInApp){

<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>投稿前チェック｜Reel Strategy OS</title>
<style>
:root{--bg:#0b1016;--panel:#121922;--line:#263445;--text:#eef4ff;--muted:#94a7bc;--accent:#57e0aa;--warn:#ffd166;--radius:18px}*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#081018,#0b1016);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;line-height:1.55}header{padding:20px 22px;border-bottom:1px solid var(--line);background:#0f151d;position:sticky;top:0;z-index:20}.wrap{max-width:900px;margin:0 auto;padding:22px}h1{margin:0;font-size:28px}.sub{color:var(--muted);font-size:13px;margin-top:4px}.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:18px;margin-bottom:18px}input,textarea,select{width:100%;background:#0b1118;border:1px solid var(--line);color:var(--text);padding:10px 12px;border-radius:12px;font-size:14px}textarea{min-height:120px;resize:vertical}label{display:block;font-size:12px;color:var(--muted);margin:12px 0 6px}button{border:0;background:var(--accent);padding:10px 14px;border-radius:999px;font-weight:800;cursor:pointer;color:#06130f;font-size:13px}button.secondary{background:#1b2734;color:var(--text);border:1px solid var(--line)}.btns{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}@media(max-width:700px){.grid2{grid-template-columns:1fr}}.preview{padding:12px;border-radius:12px;border:1px dashed var(--line);margin-top:12px;color:var(--muted);background:#0b1118}.output{white-space:pre-wrap;background:#0b1118;border:1px solid var(--line);border-radius:14px;padding:16px;font-size:13px;line-height:1.7;max-height:560px;overflow:auto}.note{background:#101721;border:1px solid var(--line);padding:12px;border-radius:14px;color:var(--muted);font-size:13px}.small{font-size:12px;color:var(--muted)}
</style>
</head>
<body>
<header><div class="wrap" style="padding:0"><h1>投稿前チェック</h1><div class="sub">動画・キャプション・投稿目的を入れるだけ。裏側の参考DBやノウハウは表示されません。</div></div></header>
<main class="wrap">
<div class="card"><h2>次回投稿をブラッシュアップ</h2><div class="grid2"><div><label>投稿タイトル / 仮テーマ</label><input id="nextTitle" placeholder="例：4mCNC、本当に入るのか"></div><div><label>投稿目的</label><select id="goal"><option>再生数</option><option>フォロー増</option><option>仕事依頼</option><option>世界観/IP育成</option><option>保存/シェア</option></select></div></div><label>キャプション案</label><textarea id="nextCaption" placeholder="投稿予定のキャプションを入れる"></textarea><label>サムネ文字 / 冒頭テロップ案</label><input id="hookText" placeholder="例：この道、CNC入らんかも"><label>動画ファイル</label><input type="file" accept="video/*" onchange="previewVideo(event)"><div id="videoPreview" class="preview">動画をアップしてください</div><label>インサイトスクショ / 参考スクショ</label><input type="file" accept="image/*" multiple onchange="previewScreens(event)"><div id="screenPreview" class="preview">スクショをアップしてください</div><div class="btns"><button onclick="buildCheckPrompt()">診断プロンプト生成</button><button class="secondary" onclick="copyPrompt()">コピー</button></div></div>
<div class="card"><h2>ChatGPTへ渡す内容</h2><div class="note">動画とスクショをChatGPTに添付して、このプロンプトを貼ってください。裏側のDB情報はプロンプト内にだけ含まれます。</div><div id="promptOutput" class="output" style="margin-top:14px">ここに生成されます。</div></div>
<div class="card"><h2>分析結果メモ</h2><textarea id="analysisMemo" placeholder="ChatGPTの分析結果を貼って保存"></textarea><div class="btns"><button onclick="saveMemo()">メモ保存</button></div><div id="memoStatus" class="small"></div></div>
</main>
<script>
const POST_KEY='rso_posts_v1', REF_KEY='rso_refs_v1', MEMO_KEY='rso_front_memo_v1';
let posts=JSON.parse(localStorage.getItem(POST_KEY)||'[]');let refs=JSON.parse(localStorage.getItem(REF_KEY)||'[]');
function previewVideo(e){const file=e.target.files[0];if(!file)return;const url=URL.createObjectURL(file);document.getElementById('videoPreview').innerHTML=`<video src="${url}" controls style="width:100%;border-radius:12px"></video><div class="small">${esc(file.name)}</div>`}
function previewScreens(e){const files=[...e.target.files];document.getElementById('screenPreview').innerHTML=files.length?files.map(f=>`<div>${esc(f.name)}</div>`).join(''):'スクショなし'}
function buildCheckPrompt(){const title=v('nextTitle'),goal=v('goal'),caption=v('nextCaption'),hook=v('hookText');const topPosts=[...posts].sort((a,b)=>Number(b.views||0)-Number(a.views||0)).slice(0,8).map(p=>`・${p.title}｜再生:${p.views}｜保存:${p.saves}｜コメント:${p.comments}`).join('\n');const refDigest=refs.slice(0,12).map(r=>`【${r.template||r.title}】\n構造:${r.structure}\n翻訳:${r.translate}\nチェック:${r.checklist}`).join('\n\n');const prompt=`この投稿予定動画を、実際に動画を見たうえで投稿前診断してください。\n動画ファイルとスクショも添付しています。\n\nあなたはSNS投稿の改善AIです。\nただし一般論ではなく、以下の過去投稿DBと参考構造DBを前提に、中村さんの投稿に合う形へブラッシュアップしてください。\n\n【投稿目的】\n${goal}\n\n【投稿タイトル/仮テーマ】\n${title}\n\n【サムネ文字/冒頭テロップ案】\n${hook}\n\n【キャプション案】\n${caption}\n\n【過去投稿DB：上位傾向】\n${topPosts||'まだDBなし'}\n\n【参考構造DB：内部ノウハウ】\n${refDigest||'まだ参考構造なし'}\n\n重要：\n- 参考構造DBの内容をそのまま見せたり、他者の表現をコピーしないでください。\n- あくまで構造として使い、この投稿のジャンルへ翻訳してください。\n- バズだけでなく、仕事依頼・地域性・世界観/IP育成も考慮してください。\n- 動画の冒頭0〜2秒、テンポ、テロップ、無音視聴で伝わるかを必ず見てください。\n\n出力：\n1. 投稿前の一言診断\n2. 冒頭0〜2秒の弱点\n3. このまま投稿した場合のリスク\n4. 強み\n5. キャプション修正案\n6. サムネ文字案10個\n7. 冒頭フック案10個\n8. 15秒以内のカット構成\n9. コメントを増やす余白の作り方\n10. フォロー/仕事依頼につなげる締め方\n11. 最終投稿前チェックリスト`;document.getElementById('promptOutput').textContent=prompt}
async function copyPrompt(){await navigator.clipboard.writeText(document.getElementById('promptOutput').textContent);alert('コピーしました')}
function saveMemo(){localStorage.setItem(MEMO_KEY,document.getElementById('analysisMemo').value);document.getElementById('memoStatus').textContent='保存しました'}
function v(id){return document.getElementById(id).value||''}function esc(s=''){return String(s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}document.getElementById('analysisMemo').value=localStorage.getItem(MEMO_KEY)||'';
</script></body></html>

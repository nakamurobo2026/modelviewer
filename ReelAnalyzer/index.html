<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>投稿前チェック｜Reel Strategy OS</title>
<style>
:root{--bg:#0b1016;--panel:#121922;--panel2:#0f151d;--line:#263445;--text:#eef4ff;--muted:#94a7bc;--accent:#57e0aa;--warn:#ffd166;--bad:#ff6b6b;--radius:18px}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;line-height:1.55}
header{padding:20px 22px;border-bottom:1px solid var(--line);background:#0f151d;position:sticky;top:0;z-index:20}
h1{margin:0;font-size:24px} h2{margin:0 0 14px;font-size:17px}
.sub{color:var(--muted);font-size:13px;margin-top:4px}
.wrap{max-width:1180px;margin:0 auto;padding:22px}
.layout{display:grid;grid-template-columns:340px 1fr;gap:18px}
@media(max-width:900px){.layout{grid-template-columns:1fr}}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:18px;margin-bottom:18px}
.sidebar{background:var(--panel2);border:1px solid var(--line);border-radius:var(--radius);padding:14px}
input,textarea,select{width:100%;background:#0b1118;border:1px solid var(--line);color:var(--text);padding:10px 12px;border-radius:12px;font-size:14px}
textarea{min-height:120px;resize:vertical}
label{display:block;font-size:12px;color:var(--muted);margin:12px 0 6px}
button,.btn{border:0;background:var(--accent);padding:10px 14px;border-radius:999px;font-weight:800;cursor:pointer;color:#06130f;text-decoration:none;display:inline-flex;align-items:center;gap:6px;font-size:13px}
button.secondary,.btn.secondary{background:#1b2734;color:var(--text);border:1px solid var(--line)}
button.warn{background:var(--warn);color:#221700}
button.danger{background:#40242a;color:#ffd4d4;border:1px solid #67323b}
.btns{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:700px){.grid2{grid-template-columns:1fr}}
.item{padding:12px;border:1px solid var(--line);border-radius:14px;background:#101721;cursor:pointer;margin-bottom:8px}
.small{font-size:12px;color:var(--muted)}
.status{margin-top:10px;padding:10px 12px;border-radius:12px;background:#0d131a;border:1px solid var(--line);font-size:12px;color:var(--muted)}
.preview{padding:12px;border-radius:12px;border:1px dashed var(--line);margin-top:12px;color:var(--muted);background:#0b1118}
.output{white-space:pre-wrap;background:#0b1118;border:1px solid var(--line);border-radius:14px;padding:16px;font-size:13px;line-height:1.7;max-height:560px;overflow:auto}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:12px}
@media(max-width:700px){.kpis{grid-template-columns:1fr 1fr}}
.kpi{background:#0b1118;border:1px solid var(--line);border-radius:14px;padding:12px}.kpi span{display:block;color:var(--muted);font-size:11px}.kpi b{font-size:19px}
.hidden{display:none}.note{background:#101721;border:1px solid var(--line);padding:12px;border-radius:14px;color:var(--muted);font-size:13px}
body{background:linear-gradient(180deg,#081018,#0b1016)}.hero,.clean{max-width:860px;margin:0 auto}.big{font-size:28px;margin:0 0 8px}</style>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
</head>
<body>
<header><div class="hero"><h1 class="big">投稿前チェック</h1><div class="sub">動画は別添付。ZIPにはプロンプト・DB要約・スクショ・メモをまとめます。</div></div></header>
<main class="wrap clean">
<div class="card">
<h2>次回投稿をブラッシュアップ</h2>
<div class="grid2"><div><label>投稿タイトル / 仮テーマ</label><input id="nextTitle" placeholder="例：4mCNC、本当に入るのか"></div><div><label>投稿目的</label><select id="goal"><option>再生数</option><option>フォロー増</option><option>仕事依頼</option><option>世界観/IP育成</option><option>保存/シェア</option></select></div></div>
<label>キャプション案</label><textarea id="nextCaption" placeholder="投稿予定のキャプションを入れる"></textarea>
<label>サムネ文字 / 冒頭テロップ案</label><input id="hookText" placeholder="例：この道、CNC入らんかも">
<label>動画ファイル（ZIPには入れません。ChatGPTへ別添付）</label><input id="videoInput" type="file" accept="video/*" onchange="previewVideo(event)"><div id="videoPreview" class="preview">動画をアップしてください</div>
<label>インサイトスクショ / 参考スクショ（ZIPに入ります）</label><input id="screenInput" type="file" accept="image/*" multiple onchange="previewScreens(event)"><div id="screenPreview" class="preview">スクショをアップしてください</div>
<label>補足メモ</label><textarea id="extraMemo" placeholder="気になる点、狙い、直したいところ、前回の反省など"></textarea>
<div class="btns"><button onclick="buildCheckPrompt()">診断プロンプト生成</button><button class="secondary" onclick="copyPrompt()">コピー</button><button class="warn" onclick="downloadAnalysisPack()">解析パックZIP生成</button></div>
</div>
<div class="card"><h2>ChatGPTへ渡す内容</h2><div class="note">使い方：ChatGPTに「動画ファイル」と「analysis_pack.zip」を同時に添付し、このプロンプトで解析します。</div><div id="promptOutput" class="output" style="margin-top:14px">ここに生成されます。</div></div>
<div class="card"><h2>分析結果メモ</h2><textarea id="analysisMemo" placeholder="ChatGPTの分析結果を貼って保存"></textarea><div class="btns"><button onclick="saveMemo()">メモ保存</button></div><div id="memoStatus" class="small"></div></div>
</main>
<script>
const POST_KEY='rso_posts_v1';const REF_KEY='rso_refs_v1';const MEMO_KEY='rso_front_memo_v1';
let posts=JSON.parse(localStorage.getItem(POST_KEY)||'[]');let refs=JSON.parse(localStorage.getItem(REF_KEY)||'[]');
let selectedScreens=[];
let selectedVideoName='';

function previewVideo(e){const file=e.target.files[0];if(!file)return;selectedVideoName=file.name;const url=URL.createObjectURL(file);document.getElementById('videoPreview').innerHTML=`<video src="${url}" controls style="width:100%;border-radius:12px"></video><div class="small">${esc(file.name)}｜動画はZIPに入れずChatGPTへ別添付</div>`;}
function previewScreens(e){selectedScreens=[...e.target.files];document.getElementById('screenPreview').innerHTML=selectedScreens.length?selectedScreens.map(f=>`<div>${esc(f.name)}</div>`).join(''):'スクショなし';}
function buildCheckPrompt(){const title=v('nextTitle'),goal=v('goal'),caption=v('nextCaption'),hook=v('hookText'),memo=v('extraMemo');const topPosts=[...posts].sort((a,b)=>Number(b.views||0)-Number(a.views||0)).slice(0,8).map(p=>`・${p.title}｜再生:${p.views}｜保存:${p.saves}｜コメント:${p.comments}`).join('\n');const refDigest=refs.slice(0,12).map(r=>`【${r.template||r.title}】\n構造:${r.structure}\n翻訳:${r.translate}\nチェック:${r.checklist}`).join('\n\n');const prompt=`この投稿予定動画を、実際に動画を見たうえで投稿前診断してください。
動画ファイルと analysis_pack.zip を添付しています。
ZIP内には、過去投稿DB要約・参考構造DB・スクショ・メモが入っています。

あなたはSNS投稿の改善AIです。
ただし一般論ではなく、以下の過去投稿DBと参考構造DBを前提に、中村さんの投稿に合う形へブラッシュアップしてください。

【投稿目的】
${goal}

【投稿タイトル/仮テーマ】
${title}

【サムネ文字/冒頭テロップ案】
${hook}

【キャプション案】
${caption}

【補足メモ】
${memo}

【動画ファイル名】
${selectedVideoName || '別添付動画を参照'}

【過去投稿DB：上位傾向】
${topPosts || 'まだDBなし'}

【参考構造DB：内部ノウハウ】
${refDigest || 'まだ参考構造なし'}

重要：
- 参考構造DBの内容をそのまま見せたり、他者の表現をコピーしないでください。
- あくまで構造として使い、この投稿のジャンルへ翻訳してください。
- バズだけでなく、仕事依頼・地域性・世界観/IP育成も考慮してください。
- 動画の冒頭0〜2秒、テンポ、テロップ、無音視聴で伝わるかを必ず見てください。
- ZIP内のスクショも確認し、視聴維持率やコメント傾向が分かれば反映してください。

出力：
1. 投稿前の一言診断
2. 冒頭0〜2秒の弱点
3. このまま投稿した場合のリスク
4. 強み
5. キャプション修正案
6. サムネ文字案10個
7. 冒頭フック案10個
8. 15秒以内のカット構成
9. コメントを増やす余白の作り方
10. フォロー/仕事依頼につなげる締め方
11. 最終投稿前チェックリスト`;document.getElementById('promptOutput').textContent=prompt;return prompt;}
async function copyPrompt(){await navigator.clipboard.writeText(document.getElementById('promptOutput').textContent);alert('コピーしました');}

async function downloadAnalysisPack(){
  if(typeof JSZip==='undefined'){alert('ZIP生成ライブラリの読み込みに失敗しました。ネット接続を確認してください。');return;}
  const zip=new JSZip();
  const prompt=buildCheckPrompt();
  const title=v('nextTitle')||'untitled';
  const goal=v('goal');
  const caption=v('nextCaption');
  const hook=v('hookText');
  const memo=v('extraMemo');

  const sorted=[...posts].sort((a,b)=>Number(b.views||0)-Number(a.views||0));
  const dbSummary={
    generatedAt:new Date().toISOString(),
    nextPost:{title,goal,caption,hook,memo,videoFile:selectedVideoName},
    stats:{
      postCount:posts.length,
      totalViews:posts.reduce((a,p)=>a+Number(p.views||0),0),
      topPosts:sorted.slice(0,10)
    }
  };

  const referenceDigest=refs.map(r=>({
    title:r.title, creator:r.creator, type:r.type, template:r.template,
    structure:r.structure, translate:r.translate, checklist:r.checklist
  }));

  const instructions=`ChatGPTへの渡し方：
1. この analysis_pack.zip を添付
2. 投稿予定動画ファイルを別添付
3. prompt.txt の内容に従って解析

注意：
- 動画はZIP内に入れていません。
- ZIP内のスクショ、DB要約、参考構造を読み、動画解析と合わせて診断してください。
`;

  zip.file('prompt.txt',prompt);
  zip.file('readme.txt',instructions);
  zip.file('next_post.json',JSON.stringify(dbSummary.nextPost,null,2));
  zip.file('db_summary.json',JSON.stringify(dbSummary,null,2));
  zip.file('reference_digest.json',JSON.stringify(referenceDigest,null,2));
  zip.file('caption.txt',caption||'');
  zip.file('memo.txt',memo||'');

  if(selectedScreens.length){
    const folder=zip.folder('screenshots');
    for(const file of selectedScreens){
      folder.file(file.name,file);
    }
  }

  const blob=await zip.generateAsync({type:'blob'});
  const safeTitle=title.replace(/[\\/:*?"<>|\s]+/g,'_').slice(0,40)||'analysis_pack';
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`analysis_pack_${safeTitle}.zip`;
  a.click();
  URL.revokeObjectURL(a.href);
}

function saveMemo(){localStorage.setItem(MEMO_KEY,document.getElementById('analysisMemo').value);document.getElementById('memoStatus').textContent='保存しました';}
function v(id){return document.getElementById(id).value||''}
function esc(s=''){return String(s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
document.getElementById('analysisMemo').value=localStorage.getItem(MEMO_KEY)||'';
</script>
</body></html>

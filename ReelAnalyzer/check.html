<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>投稿前チェック</title>
<style>
:root{--bg:#0b1016;--panel:#121922;--line:#263445;--text:#eef4ff;--muted:#94a7bc;--accent:#57e0aa;--warn:#ffd166;--bad:#ff6b6b;--r:18px}
*{box-sizing:border-box}body{margin:0;background:#0b1016;color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;line-height:1.55}
header{padding:20px 22px;border-bottom:1px solid var(--line);background:#0f151d;position:sticky;top:0;z-index:10}
h1{margin:0;font-size:24px}.sub{color:var(--muted);font-size:13px;margin-top:4px}
nav{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}nav a{color:var(--text);text-decoration:none;background:#1b2734;border:1px solid var(--line);border-radius:999px;padding:8px 12px;font-size:13px;font-weight:800}nav a.active{background:var(--accent);color:#06130f}
.wrap{max-width:1180px;margin:0 auto;padding:22px}.clean{max-width:920px}
.layout{display:grid;grid-template-columns:340px 1fr;gap:18px}@media(max-width:900px){.layout{grid-template-columns:1fr}}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:18px;margin-bottom:18px}
.homegrid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}@media(max-width:900px){.homegrid{grid-template-columns:1fr}}
.homecard{background:var(--panel);border:1px solid var(--line);border-radius:22px;padding:22px;text-decoration:none;color:var(--text);display:block;min-height:190px}
.homecard:hover{border-color:var(--accent)}.homecard b{font-size:20px}.homecard p{color:var(--muted);font-size:14px}.tag{display:inline-block;background:#0b1118;border:1px solid var(--line);color:var(--muted);border-radius:999px;padding:4px 9px;font-size:12px;margin-top:10px}
input,textarea,select{width:100%;background:#0b1118;border:1px solid var(--line);color:var(--text);padding:10px 12px;border-radius:12px;font-size:14px}
textarea{min-height:120px;resize:vertical}label{display:block;font-size:12px;color:var(--muted);margin:12px 0 6px}
button,.btn{border:0;background:var(--accent);padding:10px 14px;border-radius:999px;font-weight:800;cursor:pointer;color:#06130f;text-decoration:none;display:inline-flex;font-size:13px}
button.secondary,.btn.secondary{background:#1b2734;color:var(--text);border:1px solid var(--line)}button.warn{background:var(--warn);color:#221700}button.danger{background:#40242a;color:#ffd4d4;border:1px solid #67323b}
.btns{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}@media(max-width:700px){.grid2{grid-template-columns:1fr}}
.item{padding:12px;border:1px solid var(--line);border-radius:14px;background:#101721;cursor:pointer;margin-bottom:8px}.item.active{border-color:var(--accent)}
.small{font-size:12px;color:var(--muted)}.status,.note,.preview{padding:12px;border-radius:12px;background:#0b1118;border:1px solid var(--line);color:var(--muted);font-size:13px;margin-top:10px}
.output{white-space:pre-wrap;background:#0b1118;border:1px solid var(--line);border-radius:14px;padding:16px;font-size:13px;line-height:1.7;max-height:760px;overflow:auto}
.hidden{display:none}
</style>
</head>
<body>
<header><h1>投稿前チェック</h1><div class="sub">未来を見る。動画・キャプション・目的を入れて、根拠付きで投稿前にブラッシュアップ。</div><nav><a class="" href="./index.html">TOP</a><a class="active" href="./check.html">投稿前チェック</a><a class="" href="./compare.html">過去投稿比較</a><a class="" href="./admin.html">Admin</a></nav></header>
<main class="wrap clean">
<div class="card"><h2>次回投稿をブラッシュアップ</h2>
<div class="grid2"><div><label>投稿タイトル / 仮テーマ</label><input id="nextTitle"></div><div><label>投稿目的</label><select id="goal"><option>再生数</option><option>フォロー増</option><option>仕事依頼</option><option>世界観/IP育成</option><option>保存/シェア</option></select></div></div>
<label>キャプション案</label><textarea id="nextCaption"></textarea>
<label>サムネ文字 / 冒頭テロップ案</label><input id="hookText">
<label>動画ファイル（ChatGPTへ別添付）</label><input id="videoInput" type="file" accept="video/*" onchange="previewVideo(event)"><div id="videoPreview" class="preview">動画をアップしてください</div>
<label>補足メモ</label><textarea id="extraMemo"></textarea>
<div class="btns"><button onclick="buildPrompt()">診断プロンプト生成</button><button class="secondary" onclick="copyPrompt()">コピー</button></div></div>
<div class="card"><h2>ChatGPTへ渡す内容</h2><div class="note">動画ファイルと、このプロンプトをChatGPTへ渡してください。過去投稿DB・参考構造DB・投稿カルテDBをすべて反映します。</div><div id="promptOutput" class="output">ここに生成されます。</div></div>
</main>
<script>
const POST_KEY='rso_posts_v1',REF_KEY='rso_refs_v1',CARD_KEY='rso_post_cards_v1';
function safeParse(raw,fallback){try{return raw?JSON.parse(raw):fallback}catch(e){return fallback}}
function getAny(keys,fallback){
  for(const k of keys){
    const v=safeParse(localStorage.getItem(k),null);
    if(v && ((Array.isArray(v)&&v.length) || (!Array.isArray(v)&&Object.keys(v).length))) return v;
  }
  return fallback;
}
let posts=getAny([POST_KEY,'posts','ig_posts','rso_posts','instagram_posts'],[]);
let refs=getAny([REF_KEY,'refs','rso_refs','reference_db'],[]);
let postCards=getAny([CARD_KEY,'postCards','rso_cards'],{});
let videoName='';

function v(id){return document.getElementById(id).value||''}
function esc(s=''){return String(s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}

function previewVideo(e){
  const f=e.target.files[0];
  if(!f)return;
  videoName=f.name;
  const u=URL.createObjectURL(f);
  document.getElementById('videoPreview').innerHTML=`<video src="${u}" controls style="width:100%;border-radius:12px"></video><div class="small">${esc(f.name)}｜動画は別添付</div>`;
}

function buildPrompt(){
  const allPosts=[...posts].sort((a,b)=>Number(b.views||0)-Number(a.views||0)).map(p=>`
【過去投稿DB】
タイトル:
${p.title||''}

URL:
${p.url||''}

日付:
${p.date||''}

再生:
${p.views||0}

リーチ:
${p.reach||0}

保存:
${p.saves||0}

シェア:
${p.shares||0}

いいね:
${p.likes||0}

コメント:
${p.comments||0}

キャプション:
${p.caption||''}
`).join('

');

  const allRefs=refs.map(r=>`
【参考構造DB / 商材 / ノウハウ】

タイトル:
${r.title||''}

テンプレ:
${r.template||''}

出典:
${r.creator||''}

種別:
${r.type||''}

参考URL:
${r.url||''}

なぜ気になったか:
${r.why||''}

抽象化した構造:
${r.structure||''}

自分ジャンルへの翻訳:
${r.translate||''}

チェックリスト:
${r.checklist||''}

商材本文 / メモ / 参考資料:
${r.material||''}
`).join('

');

  const allCards=Object.entries(postCards).map(([postId,card])=>{
    const p=posts.find(x=>String(x.id)===String(postId))||{};
    return `
【投稿カルテDB】

紐づく投稿:
${p.title||postId}

投稿URL:
${p.url||''}

勝ち筋タグ:
${card.tags||''}

投稿タイプ:
${card.type||''}

ChatGPT解析結果:
${card.analysis||''}

投稿メモ:
${card.memo||''}

動画ファイル名:
${card.videoName||''}

保存日時:
${card.savedAt||''}

インサイトスクショ名:
${(card.screens||[]).map(s=>s.name).join(', ')}
`;
  }).join('

');

  const p=`
この投稿予定動画を、実際に動画を見たうえで投稿前診断してください。
動画ファイルを添付しています。

あなたは単なるSNS運用アドバイザーではありません。
Instagram Reels / TikTokの視聴維持・未完成性・リアル感・地域性・コメント誘発・シリーズ導線・感情設計を分析する「SNS構造分析AI」です。

この診断では、単に「もっと短く」「もっとテンポよく」などの一般論ではなく、
なぜその改善が必要なのかを、すべての参考データ・過去投稿・投稿カルテ・視聴心理と照合して説明してください。

特に以下を重視してください。
- 冒頭0〜2秒で続きを見たくなるか
- 無音視聴でも意味が伝わるか
- 完成品ではなく「途中感・問題感」があるか
- コメントしたくなる余白があるか
- 地域性・リアル感があるか
- 次も見たいと思う導線があるか
- ナカムロボ / 工場化 / 職人 / AI制作 という世界観に繋がるか

ここから下の参考データは、整理前の生データを含みます。
ChatGPT側で重要部分と不要部分を選別してください。
他者の文章や商材内容をそのままコピーせず、「なぜ伸びるのか」という構造・空気感・感情設計として抽象化してください。

---

【投稿目的】
${v('goal')}

【投稿タイトル / 仮テーマ】
${v('nextTitle')}

【サムネ文字 / 冒頭テロップ案】
${v('hookText')}

【キャプション案】
${v('nextCaption')}

【補足メモ】
${v('extraMemo')}

【動画ファイル名】
${videoName||'別添付動画を参照'}

---

【すべての過去投稿DB】
${allPosts||'まだ過去投稿DBなし'}

---

【すべての参考構造DB / 商材 / ノウハウ】
${allRefs||'まだ参考構造DBなし'}

---

【すべての投稿カルテDB】
${allCards||'まだ投稿カルテDBなし'}

---

出力形式：

1. 一言診断
→ この投稿が今どう見えるかを一言で。

2. 参考データの整理
→ 今回の診断に使った参考データを整理。
→ 使うべきデータ / 今回は無視してよいデータを分ける。

3. 視聴維持の分析
→ 0〜2秒 / 3〜7秒 / 8秒以降で離脱ポイントを予測。

4. 参考DB・過去投稿・投稿カルテとの照合分析
→ どの参考データのどの構造に近いか。
→ なぜその構造が有効なのか。
→ 足りない要素は何か。

5. 強み
→ この投稿ならではの武器。

6. 弱点
→ 伸びを止めている要因。

7. 改善理由付きの提案
→ なぜそれが必要かを必ず説明。
→ 単なる感想で終わらせない。

8. 冒頭フック改善案
→ 10案。
→ それぞれ狙っている感情も説明。

9. サムネ文字改善案
→ 10案。
→ 強い順に。

10. 15秒構成案
→ カットごとの役割も説明。

11. コメント誘発ポイント
→ コメントしたくなる余白を設計。

12. CTA改善案
→ フォロー / 保存 / 続き視聴への導線。

13. バズ構成分析
→ この動画がどのタイプの伸び方を狙っているのか。
→ 共感型 / 問題提起型 / 未完成型 / 地域リアル型 / ストーリー型 など。

14. 投稿前チェックリスト
→ 投稿前に確認するべき項目。

15. 次に試すべき派生案
→ この動画から派生できる次回投稿案を5つ。
`;

  document.getElementById('promptOutput').textContent=p;
  return p;
}

async function copyPrompt(){await navigator.clipboard.writeText(document.getElementById('promptOutput').textContent);alert('コピーしました')}
</script>
</body></html>

<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>投稿前チェック</title>

<style>
:root{
--bg:#0b1016;
--panel:#121922;
--line:#263445;
--text:#eef4ff;
--muted:#94a7bc;
--accent:#57e0aa;
--r:18px
}

*{box-sizing:border-box}

body{
margin:0;
background:var(--bg);
color:var(--text);
font-family:system-ui,sans-serif;
line-height:1.6
}

header{
padding:20px;
border-bottom:1px solid var(--line);
background:#0f151d;
position:sticky;
top:0;
z-index:10
}

nav{
display:flex;
gap:8px;
flex-wrap:wrap;
margin-top:12px
}

nav a{
color:var(--text);
text-decoration:none;
background:#1b2734;
border:1px solid var(--line);
border-radius:999px;
padding:8px 12px;
font-size:13px;
font-weight:800
}

nav a.active{
background:var(--accent);
color:#06130f
}

h1{
margin:0;
font-size:28px
}

.sub{
color:var(--muted);
font-size:13px;
margin-top:6px
}

.wrap{
max-width:980px;
margin:0 auto;
padding:22px
}

.card{
background:var(--panel);
border:1px solid var(--line);
border-radius:var(--r);
padding:18px;
margin-bottom:18px
}

.grid2{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px
}

label{
display:block;
font-size:12px;
color:var(--muted);
margin:12px 0 6px
}

input,textarea,select{
width:100%;
background:#0b1118;
border:1px solid var(--line);
color:var(--text);
padding:12px;
border-radius:12px;
font-size:14px
}

textarea{
min-height:120px;
resize:vertical
}

button{
border:0;
background:var(--accent);
padding:10px 14px;
border-radius:999px;
font-weight:700;
cursor:pointer;
color:#06130f
}

button.secondary{
background:#1b2734;
color:#fff;
border:1px solid var(--line)
}

.btns{
display:flex;
gap:8px;
flex-wrap:wrap;
margin-top:14px
}

.output{
white-space:pre-wrap;
background:#0b1118;
border:1px solid var(--line);
border-radius:14px;
padding:16px;
font-size:13px;
line-height:1.7;
max-height:700px;
overflow:auto
}

.preview{
padding:12px;
border-radius:12px;
background:#0b1118;
border:1px solid var(--line);
color:var(--muted);
font-size:13px;
margin-top:10px
}
</style>
</head>

<body>

<header>
<h1>投稿前チェック</h1>

<div class="sub">
動画・フック・キャプションを入れて、ChatGPT用の診断プロンプトを生成。
</div>

<nav>
<a href="./index.html">TOP</a>
<a class="active" href="./check.html">投稿前チェック</a>
<a href="./compare.html">過去投稿比較</a>
<a href="./admin.html">Admin</a>
</nav>

</header>

<main class="wrap">

<div class="card">

<h2>次回投稿をブラッシュアップ</h2>

<div class="grid2">

<div>
<label>投稿タイトル / 仮テーマ</label>
<input id="nextTitle">
</div>

<div>
<label>投稿目的</label>
<select id="goal">
<option>再生数</option>
<option>フォロー増</option>
<option>仕事依頼</option>
<option>世界観/IP育成</option>
<option>保存/シェア</option>
</select>
</div>

</div>

<label>キャプション案</label>
<textarea id="nextCaption"></textarea>

<label>サムネ文字 / 冒頭テロップ案</label>
<input id="hookText">

<label>動画ファイル</label>
<input id="videoInput" type="file" accept="video/*" onchange="previewVideo(event)">

<div id="videoPreview" class="preview">
動画をアップしてください
</div>

<label>補足メモ</label>
<textarea id="extraMemo"></textarea>

<div class="btns">
<button onclick="buildPrompt()">診断プロンプト生成</button>
<button class="secondary" onclick="copyPrompt()">コピー</button>
</div>

</div>

<div class="card">

<h2>ChatGPTへ渡す内容</h2>

<div id="promptOutput" class="output">
ここに生成されます。
</div>

</div>

</main>

<script>

const POST_KEY='rso_posts_v1';
const REF_KEY='rso_refs_v1';

let posts=JSON.parse(localStorage.getItem(POST_KEY)||'[]');
let refs=JSON.parse(localStorage.getItem(REF_KEY)||'[]');

let videoName='';

function v(id){
return document.getElementById(id).value||''
}

function previewVideo(e){

const f=e.target.files[0];

if(!f)return;

videoName=f.name;

const u=URL.createObjectURL(f);

document.getElementById('videoPreview').innerHTML=
`
<video src="${u}" controls style="width:100%;border-radius:12px"></video>
<div style="margin-top:8px">${f.name}</div>
`;

}

function buildPrompt(){

const top=[...posts]
.sort((a,b)=>Number(b.views||0)-Number(a.views||0))
.slice(0,8)
.map(p=>`・${p.title}｜再生:${p.views}｜保存:${p.saves}｜コメント:${p.comments}`)
.join('\\n');

const ref=refs.map(r=>`
【参考DB】

タイトル:
${r.title||''}

テンプレ:
${r.template||''}

出典:
${r.creator||''}

商材本文:
${r.material||''}
`).join('\\n\\n');

const p=`
この投稿予定動画を、実際に動画を見たうえで投稿前診断してください。

【投稿目的】
${v('goal')}

【投稿タイトル】
${v('nextTitle')}

【冒頭テロップ】
${v('hookText')}

【キャプション】
${v('nextCaption')}

【補足メモ】
${v('extraMemo')}

【過去投稿DB】
${top||'なし'}

【参考DB全文】
${ref||'なし'}

重要:
参考DBは整理前の生データです。
不要部分は無視し、SNS改善に必要な部分だけ抽出してください。

出力:
- 一言診断
- 冒頭改善
- フック改善
- 15秒構成
- CTA改善
- バズ構成案
`;

document.getElementById('promptOutput').textContent=p;

return p;

}

async function copyPrompt(){

await navigator.clipboard.writeText(
document.getElementById('promptOutput').textContent
);

alert('コピーしました');

}

</script>

</body>
</html>

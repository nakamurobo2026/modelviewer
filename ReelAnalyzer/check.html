<!doctype html><html lang="ja"><head><meta charset="utf-8"><title>投稿前チェック</title><style>
:root{--bg:#0b1016;--panel:#121922;--line:#263445;--text:#eef4ff;--accent:#57e0aa;--r:18px}
*{box-sizing:border-box}body{margin:0;background:#0b1016;color:var(--text);font-family:system-ui,-apple-system,sans-serif}
header{padding:20px 22px;border-bottom:1px solid var(--line);background:#0f151d;position:sticky;top:0;z-index:10}
nav{display:flex;gap:8px;margin-top:12px}nav a{color:var(--text);text-decoration:none;background:#1b2734;border-radius:999px;padding:8px 12px;font-size:13px}
nav a.active{background:var(--accent);color:#06130f}
.wrap{max-width:920px;margin:0 auto;padding:22px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:18px;margin-bottom:18px}
input,textarea{width:100%;background:#0b1118;border:1px solid var(--line);color:var(--text);padding:10px 12px;border-radius:12px;margin-bottom:10px}
button{border:0;background:var(--accent);padding:10px 14px;border-radius:999px;font-weight:800;cursor:pointer;color:#06130f}
.output{white-space:pre-wrap;background:#0b1118;border:1px solid var(--line);border-radius:14px;padding:16px;font-size:13px}
</style></head><body>
<header><h1>投稿前チェック</h1><nav><a href="./index.html">TOP</a><a class="active" href="./check.html">投稿前チェック</a><a href="./compare.html">過去投稿比較</a><a href="./admin.html">Admin</a></nav></header>
<main class="wrap"><div class="card"><h2>次回投稿案</h2>
<label>タイトル</label><input id="nextTitle">
<label>キャプション案</label><textarea id="nextCaption"></textarea>
<label>動画の補足内容</label><textarea id="extraMemo"></textarea>
<button onclick="buildCheckPrompt()">診断プロンプト生成</button></div>
<div class="card"><h2>Geminiへの依頼文</h2><div id="prompt" class="output"></div></div></main>
<script>
function buildCheckPrompt(){
  const refs=JSON.parse(localStorage.getItem('rso_refs_v1')||'[]').slice(0,5).map(r=>`・${r.template}`).join('\n');
  const pr=`この投稿案を診断してください。
【タイトル】:${document.getElementById('nextTitle').value}
【キャプション】:${document.getElementById('nextCaption').value}
【内容メモ】:${document.getElementById('extraMemo').value}
【採用したい勝ち筋】:\n${refs}

動画の冒頭2秒の引き、コメントのしやすさを中心にフィードバックしてください。`;
  document.getElementById('prompt').textContent=pr;
}
</script></body></html>

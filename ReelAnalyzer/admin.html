<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Admin</title><style>
:root{--bg:#0b1016;--panel:#121922;--line:#263445;--text:#eef4ff;--muted:#94a7bc;--accent:#57e0aa;--warn:#ffd166;--bad:#ff6b6b;--r:18px}
*{box-sizing:border-box}body{margin:0;background:#0b1016;color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;line-height:1.55}
header{padding:20px 22px;border-bottom:1px solid var(--line);background:#0f151d;position:sticky;top:0;z-index:10}
h1{margin:0;font-size:24px}.sub{color:var(--muted);font-size:13px;margin-top:4px}
nav{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}nav a{color:var(--text);text-decoration:none;background:#1b2734;border:1px solid var(--line);border-radius:999px;padding:8px 12px;font-size:13px;font-weight:800}nav a.active{background:var(--accent);color:#06130f}
.wrap{max-width:1180px;margin:0 auto;padding:22px}.layout{display:grid;grid-template-columns:340px 1fr;gap:18px}@media(max-width:900px){.layout{grid-template-columns:1fr}}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:18px;margin-bottom:18px}
input,textarea,select{width:100%;background:#0b1118;border:1px solid var(--line);color:var(--text);padding:10px 12px;border-radius:12px;font-size:14px}
textarea{min-height:120px;resize:vertical}label{display:block;font-size:12px;color:var(--muted);margin:12px 0 6px}
button,.btn{border:0;background:var(--accent);padding:10px 14px;border-radius:999px;font-weight:800;cursor:pointer;color:#06130f;text-decoration:none;display:inline-flex;font-size:13px}
button.secondary,.btn.secondary{background:#1b2734;color:var(--text);border:1px solid var(--line)}button.danger{background:#40242a;color:#ffd4d4;border:1px solid #67323b}
.btns{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.item{padding:12px;border:1px solid var(--line);border-radius:14px;background:#101721;margin-bottom:8px}
.output{white-space:pre-wrap;background:#0b1118;border:1px solid var(--line);border-radius:14px;padding:16px;font-size:13px;max-height:500px;overflow:auto}
.hidden{display:none}
</style></head><body>
<header><h1>Reel Strategy OS｜Admin</h1><nav><a href="./index.html">TOP</a><a href="./check.html">投稿前チェック</a><a href="./compare.html">過去投稿比較</a><a class="active" href="./admin.html">Admin</a></nav></header>
<main class="wrap layout"><aside><div class="card"><h2>Instagram API</h2><div class="btns"><button class="warn" onclick="fetchInstagramPosts()">投稿取得</button></div><div id="status" class="status small">待機中</div></div><div class="card"><h2>保存・移行</h2><div class="btns"><button class="secondary" onclick="exportAll()">全DB書出</button><label class="btn secondary" for="importFile">全DB読込</label><input id="importFile" class="hidden" type="file" accept="application/json" onchange="importAll(event)"></div></div><div class="card"><h2>登録済み参考構造</h2><div id="referenceList"></div></div></aside>
<section><div class="card"><h2>参考構造DB登録</h2><div class="grid2"><div><label>参考タイトル</label><input id="refTitle"></div><div><label>勝ち筋テンプレ名</label><input id="refTemplate"></div></div><div class="grid2"><div><label>種別</label><select id="refType"><option>商材/教材テキスト</option><option>Instagram投稿</option><option>YouTube/TikTok</option></select></div><div><label>出典</label><input id="refCreator"></div></div><label>解析資料（全文コピペ可）</label><textarea id="refMaterial"></textarea><label>抽象化した構造</label><textarea id="refStructure" placeholder="問題発生→葛藤→解決の兆し、など"></textarea><label>自分ジャンルへの翻訳</label><textarea id="refTranslate" placeholder="ホテルの壁紙→3Dプリントの積層痕、など"></textarea><label>チェックリスト</label><textarea id="refChecklist"></textarea><div class="btns"><button onclick="saveRef()">参考構造DBへ保存</button></div></div>
<div class="card"><h2>投稿カルテDB</h2><label>投稿選択</label><select id="cardPostSelect" onchange="loadPostCard()"></select><div class="grid2"><div><label>勝ち筋タグ</label><input id="cardTags" placeholder="未完成性, 工場化"></div><div><label>タイプ</label><select id="cardType"><option>工場系</option><option>ナカムロボ</option><option>制作過程</option></select></div></div><label>ChatGPT/Gemini解析結果</label><textarea id="cardAnalysis"></textarea><label>投稿メモ（内情・失敗談など）</label><textarea id="cardMemo"></textarea><div class="btns"><button onclick="savePostCard()">投稿カルテ保存</button></div></div></section></main>
<script>
const POST_KEY='rso_posts_v1',REF_KEY='rso_refs_v1',CARD_KEY='rso_post_cards_v1';let posts=JSON.parse(localStorage.getItem(POST_KEY)||'[]'),refs=JSON.parse(localStorage.getItem(REF_KEY)||'[]'),postCards=JSON.parse(localStorage.getItem(CARD_KEY)||'{}'),editId=null;
function v(id){return document.getElementById(id).value||''}function esc(s=''){return String(s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
async function fetchInstagramPosts(){const base='https://reelanalyzer.nakamura0407.workers.dev';try{const r=await fetch(base+'/reels');const j=await r.json();posts=(j.data||[]).map(p=>({id:p.id,title:p.caption?p.caption.split('\n')[0]:'無題',caption:p.caption||'',views:p.views||0,reach:p.reach||0,saves:p.saved||0,shares:p.shares||0,likes:p.like_count||0,comments:p.comments_count||0,url:p.permalink||'',date:p.timestamp||''}));localStorage.setItem(POST_KEY,JSON.stringify(posts));renderPosts();refreshPostCardSelect();alert('取得成功')}catch(e){alert('失敗: '+e.message)}}
function saveRef(){const d={id:editId||Date.now(),title:v('refTitle'),creator:v('refCreator'),type:v('refType'),material:v('refMaterial'),structure:v('refStructure'),translate:v('refTranslate'),template:v('refTemplate'),checklist:v('refChecklist')};if(editId)refs=refs.map(r=>r.id===editId?d:r);else refs.unshift(d);localStorage.setItem(REF_KEY,JSON.stringify(refs));renderRefs();alert('保存済')}
function renderRefs(){document.getElementById('referenceList').innerHTML=refs.map(r=>`<div class="item"><b>${esc(r.title)}</b><div class="btns"><button class="secondary" onclick="loadRef(${r.id})">編集</button></div></div>`).join('')}
function loadRef(id){const r=refs.find(x=>x.id===id);editId=id;['refTitle','refCreator','refType','refMaterial','refStructure','refTranslate','refTemplate','refChecklist'].forEach(k=>document.getElementById(k).value=r[k.replace('ref','').toLowerCase()]||'')}
function refreshPostCardSelect(){const sel=document.getElementById('cardPostSelect');sel.innerHTML='<option value="">投稿選択</option>'+posts.map(p=>`<option value="${p.id}">${esc(p.title)}</option>`).join('')}
function loadPostCard(){const id=v('cardPostSelect'),c=postCards[id]||{};['cardTags','cardType','cardAnalysis','cardMemo'].forEach(k=>document.getElementById(k).value=c[k.replace('card','').toLowerCase()]||'')}
function savePostCard(){const id=v('cardPostSelect');if(!id)return;postCards[id]={tags:v('cardTags'),type:v('cardType'),analysis:v('cardAnalysis'),memo:v('cardMemo')};localStorage.setItem(CARD_KEY,JSON.stringify(postCards));alert('カルテ保存済')}
function exportAll(){const b=new Blob([JSON.stringify({posts,refs,postCards},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='rso_full_backup.json';a.click()}
renderRefs();refreshPostCardSelect();
</script></body></html>

<!doctype html><html lang="ja"><head><meta charset="utf-8"><title>йҒҺеҺ»жҠ•зЁҝГ—еҸӮиҖғDBжӨңиЁј</title><style>
:root{--bg:#0b1016;--panel:#121922;--line:#263445;--text:#eef4ff;--muted:#94a7bc;--accent:#57e0aa;--r:18px}
*{box-sizing:border-box}body{margin:0;background:#0b1016;color:var(--text);font-family:system-ui,-apple-system,sans-serif;line-height:1.55}
header{padding:20px 22px;border-bottom:1px solid var(--line);background:#0f151d;position:sticky;top:0;z-index:10}
nav{display:flex;gap:8px;margin-top:12px}nav a{color:var(--text);text-decoration:none;background:#1b2734;border-radius:999px;padding:8px 12px;font-size:13px}
nav a.active{background:var(--accent);color:#06130f}
.wrap{max-width:1180px;margin:0 auto;padding:22px;display:grid;grid-template-columns:340px 1fr;gap:18px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:18px;margin-bottom:18px}
.item{padding:12px;border:1px solid var(--line);border-radius:14px;background:#101721;cursor:pointer;margin-bottom:8px}
.item.active{border-color:var(--accent)}.small{font-size:12px;color:var(--muted)}
.output{white-space:pre-wrap;background:#0b1118;border:1px solid var(--line);border-radius:14px;padding:16px;font-size:13px;max-height:600px;overflow:auto}
button{border:0;background:var(--accent);padding:10px 14px;border-radius:999px;font-weight:800;cursor:pointer;color:#06130f}
</style></head><body>
<header><h1>йҒҺеҺ»жҠ•зЁҝГ—еҸӮиҖғDBжӨңиЁј</h1><nav><a href="./index.html">TOP</a><a href="./check.html">жҠ•зЁҝеүҚгғҒгӮ§гғғгӮҜ</a><a class="active" href="./compare.html">йҒҺеҺ»жҠ•зЁҝжҜ”ијғ</a><a href="./admin.html">Admin</a></nav></header>
<main class="wrap"><aside><div class="card"><h2>жӨңиЁјгҒҷгӮӢйҒҺеҺ»жҠ•зЁҝ</h2><div id="postList"></div></div><div class="card"><h2>з…§еҗҲгҒҷгӮӢеҸӮиҖғDB</h2><div id="refList"></div></div></aside>
<section><div class="card"><h2>Gemini/ChatGPTгҒёжёЎгҒҷгғ—гғӯгғігғ—гғҲ</h2><div class="btns" style="margin-bottom:10px"><button onclick="copyPrompt()">гғ—гғӯгғігғ—гғҲгӮ’гӮігғ”гғј</button></div><div id="prompt" class="output">жҠ•зЁҝгҒЁDBгӮ’йҒёжҠһгҒ—гҒҰгҒҸгҒ гҒ•гҒ„гҖӮ</div></div></section></main>
<script>
const POST_KEY='rso_posts_v1',REF_KEY='rso_refs_v1',CARD_KEY='rso_post_cards_v1';
let posts=JSON.parse(localStorage.getItem(POST_KEY)||'[]'),refs=JSON.parse(localStorage.getItem(REF_KEY)||'[]'),cards=JSON.parse(localStorage.getItem(CARD_KEY)||'{}'),selectedPostId=null,selectedRefs=new Set();
function renderPosts(){document.getElementById('postList').innerHTML=posts.sort((a,b)=>b.views-a.views).map(p=>`<div class="item ${selectedPostId===p.id?'active':''}" onclick="selectPost('${p.id}')"><b>${p.title}</b><div class="small">еҶҚз”ҹ:${p.views.toLocaleString()}</div></div>`).join('')}
function renderRefs(){document.getElementById('refList').innerHTML=refs.map(r=>`<div class="item ${selectedRefs.has(String(r.id))?'active':''}" onclick="toggleRef('${r.id}')"><b>${r.template||r.title}</b></div>`).join('')}
function selectPost(id){selectedPostId=id;renderPosts();buildPrompt()}
function toggleRef(id){selectedRefs.has(id)?selectedRefs.delete(id):selectedRefs.add(id);renderRefs();buildPrompt()}
function buildPrompt(){
  const p=posts.find(x=>x.id===selectedPostId),rs=refs.filter(r=>selectedRefs.has(String(r.id))),c=cards[selectedPostId]||{};
  if(!p)return;
  const postText=`гҖҗдёӯжқ‘гҒ•гӮ“гҒ®йҒҺеҺ»жҠ•зЁҝDBгҖ‘\nгӮҝгӮӨгғҲгғ«:${p.title}\nж•°еҖӨ:еҶҚз”ҹ${p.views}/дҝқеӯҳ${p.saves}/гӮігғЎ${p.comments}\nгӮӯгғЈгғ—гӮ·гғ§гғі:${p.caption}\nгӮ«гғ«гғҶгғЎгғў:${c.memo||'гҒӘгҒ—'}`;
  const refText=rs.map(r=>`гҖҗеҸӮз…§DB:${r.template}гҖ‘\nж§ӢйҖ :${r.structure}\nзҝ»иЁіжЎҲ:${r.translate}\nиіҮж–ҷе…Ёж–Ү:${r.material}`).join('\n\n');
  const pr=`гҒӮгҒӘгҒҹгҒҜSNSжҲҰз•ҘгҒ®гғ—гғӯгҒ§гҒҷгҖӮд»ҘдёӢгҒ®DBжғ…е ұгӮ’иӘӯгҒҝи§ЈгҒҚгҖҒдёӯжқ‘гҒ•гӮ“гҒ®гӮЁгғігӮёгғӢгӮўгғӘгғігӮ°жҙ»еӢ•гӮ’гҖҢзҙ дәәгғӣгғҶгғ«гҖҚзҡ„гҒӘзҶұзӢӮгӮ’з”ҹгӮҖзү©иӘһгҒёжҳҮиҸҜгҒ•гҒӣгҒҰгҒҸгҒ гҒ•гҒ„гҖӮ
### 1. и§ЈжһҗеҜҫиұЎ
${postText}
### 2. еӢқгҒЎзӯӢгҒ®жҢҮйҮқ
${refText}
### 3. гғҹгғғгӮ·гғ§гғі
жғ…е ұгҒ®еҸ–жҚЁйҒёжҠһгҒҜGeminiгҒҢиЎҢгҒ„гҖҒж—ўеӯҳзҙ жқҗгҒ®гҒҝгҒ§гҖҢиҰ–иҒҙиҖ…гҒҢеҝңжҸҙгҒ—гҒҹгҒҸгҒӘгӮӢж§ӢжҲҗгҖҚгҒёзө„гҒҝжӣҝгҒҲгҒҰгҒҸгҒ гҒ•гҒ„гҖӮ
- иЁәж–ӯ:гҒӘгҒңгҒ“гҒ®жҠ•зЁҝгҒҜеӢқгҒЎзӯӢгҒӢгӮүгӮәгғ¬гҒҹгҒӢ
- гӮ·гғігғ»ж§ӢжҲҗжЎҲ:зҙ жқҗгӮ’гҒ©гҒҶеҲҮгӮҠиІјгӮҠгҒҷгӮӢгҒӢ
- гӮігғЎгғігғҲиӘҳе°Һ:еҝңжҸҙгӮ’еҠ йҖҹгҒ•гҒӣгӮӢдёҖиЎҢ`;
  document.getElementById('prompt').textContent=pr;
}
async function copyPrompt(){await navigator.clipboard.writeText(document.getElementById('prompt').textContent);alert('гӮігғ”гғјжёҲ')}
renderPosts();renderRefs();
</script></body></html>

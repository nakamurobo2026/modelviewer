<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>過去投稿×参考DB検証</title>
<style>
:root{--bg:#0b1016;--panel:#121922;--line:#263445;--text:#eef4ff;--muted:#94a7bc;--accent:#57e0aa;--warn:#ffd166;--bad:#ff6b6b;--r:18px}
*{box-sizing:border-box}body{margin:0;background:#0b1016;color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;line-height:1.55}
header{padding:20px 22px;border-bottom:1px solid var(--line);background:#0f151d;position:sticky;top:0;z-index:10}
h1{margin:0;font-size:24px}.sub{color:var(--muted);font-size:13px;margin-top:4px}
nav{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}nav a{color:var(--text);text-decoration:none;background:#1b2734;border:1px solid var(--line);border-radius:999px;padding:8px 12px;font-size:13px;font-weight:800}nav a.active{background:var(--accent);color:#06130f}
.wrap{max-width:1180px;margin:0 auto;padding:22px}.clean{max-width:920px}
.layout{display:grid;grid-template-columns:340px 1fr;gap:18px}@media(max-width:900px){.layout{grid-template-columns:1fr}}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:18px;margin-bottom:18px}
input,textarea,select{width:100%;background:#0b1118;border:1px solid var(--line);color:var(--text);padding:10px 12px;border-radius:12px;font-size:14px}
textarea{min-height:120px;resize:vertical}label{display:block;font-size:12px;color:var(--muted);margin:12px 0 6px}
button,.btn{border:0;background:var(--accent);padding:10px 14px;border-radius:999px;font-weight:800;cursor:pointer;color:#06130f;text-decoration:none;display:inline-flex;font-size:13px}
button.secondary,.btn.secondary{background:#1b2734;color:var(--text);border:1px solid var(--line)}button.warn{background:var(--warn);color:#221700}button.danger{background:#40242a;color:#ffd4d4;border:1px solid #67323b}
.btns{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}@media(max-width:700px){.grid2{grid-template-columns:1fr}}
.item{padding:12px;border:1px solid var(--line);border-radius:14px;background:#101721;cursor:pointer;margin-bottom:8px}.item.active{border-color:var(--accent)}
.small{font-size:12px;color:var(--muted)}.status,.note,.preview{padding:12px;border-radius:12px;background:#0b1118;border:1px solid var(--line);color:var(--muted);font-size:13px;margin-top:10px}
.output{white-space:pre-wrap;background:#0b1118;border:1px solid var(--line);border-radius:14px;padding:16px;font-size:13px;line-height:1.7;max-height:760px;overflow:auto}
.hidden{display:none}
</style>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
</head>

<body>
<header>
  <h1>過去投稿×参考DB検証</h1>
  <div class="sub">選んだ投稿を、蓄積したDB・商材・勝ち筋・過去成功例と照合してAIが改善案を生成します。</div>
  <nav>
    <a href="./index.html">TOP</a>
    <a href="./check.html">投稿前チェック</a>
    <a class="active" href="./compare.html">過去投稿比較</a>
    <a href="./admin.html">Admin</a>
  </nav>
</header>

<main class="wrap layout">
  <aside>
    <div class="card">
      <h2>検証する過去投稿</h2>
      <div class="note">ここでは投稿同士を比較しません。1投稿を選び、参考DBと照合します。</div>
      <div class="btns">
        <button class="secondary" onclick="reloadDB()">DB再読込</button>
        <button class="secondary" onclick="selectTop()">上位投稿を選択</button>
        <button class="secondary" onclick="selectBottom()">下位投稿を選択</button>
        <button class="secondary" onclick="clearPost()">選択解除</button>
      </div>

      <label>投稿検索</label>
      <input id="postSearch" placeholder="タイトル・キャプション検索" oninput="renderPosts()">

      <div id="postStatus" class="status">読み込み中</div>
      <div id="postList" style="margin-top:14px"></div>
    </div>

    <div class="card">
      <h2>照合する参考DB</h2>
      <div class="note">保存済みの構造・商材本文・翻訳・チェックリストをプロンプトに入れます。</div>
      <div class="btns">
        <button class="secondary" onclick="selectAllRefs()">全選択</button>
        <button class="secondary" onclick="clearRefs()">選択解除</button>
      </div>
      <div id="refStatus" class="status">読み込み中</div>
      <div id="refList" style="margin-top:14px"></div>
    </div>
  </aside>

  <section>
    <div class="card">
      <h2>選択中</h2>
      <div id="selectedSummary" class="output">未選択</div>
    </div>

    <div class="card">
      <h2>ChatGPTへ渡す照合プロンプト</h2>
      <div class="btns">
        <button onclick="buildPrompt()">プロンプト生成</button>
        <button class="secondary" onclick="copyPrompt()">コピー</button>
        <button class="warn" onclick="downloadPack()">解析データZIP生成</button>
      </div>
      <div id="prompt" class="output" style="margin-top:14px">ここに生成されます。</div>
    </div>
  </section>
</main>

<script>
const POST_KEY='rso_posts_v1';
const REF_KEY='rso_refs_v1';
const CARD_KEY='rso_post_cards_v1';

let posts=[];
let refs=[];
let postCards={};
let selectedPostId=null;
let selectedRefs=new Set();

function esc(s=''){
  return String(s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
}
function num(n){return Number(n||0).toLocaleString()}
function safeParse(raw,fallback){
  try{
    if(!raw)return fallback;
    return JSON.parse(raw);
  }catch(e){
    console.warn('JSON parse error',e);
    return fallback;
  }
}
function getAny(keys,fallback){
  for(const k of keys){
    const raw=localStorage.getItem(k);
    const parsed=safeParse(raw,null);
    if(parsed && ((Array.isArray(parsed)&&parsed.length) || (!Array.isArray(parsed)&&Object.keys(parsed).length))){
      return parsed;
    }
  }
  return fallback;
}
function normalizePosts(data){
  if(!Array.isArray(data))return [];
  return data.map(p=>({
    id:String(p.id||p.media_id||p.shortcode||p.url||Date.now()+Math.random()),
    title:p.title||firstLine(p.caption)||'無題',
    caption:p.caption||'',
    views:p.views||p.plays||p.video_views||p.reach||0,
    reach:p.reach||0,
    saves:p.saves||p.saved||0,
    shares:p.shares||0,
    likes:p.likes||p.like_count||0,
    comments:p.comments||p.comments_count||0,
    url:p.url||p.permalink||'',
    date:p.date||p.timestamp||''
  }));
}
function firstLine(c=''){
  return (String(c).split('\n').map(x=>x.trim()).find(Boolean)||'無題').slice(0,60);
}
function reloadDB(){
  posts=normalizePosts(getAny([POST_KEY,'posts','ig_posts','rso_posts','instagram_posts'],[]));
  refs=getAny([REF_KEY,'refs','rso_refs','reference_db'],[]);
  if(!Array.isArray(refs))refs=[];
  postCards=getAny([CARD_KEY,'postCards','rso_cards'],{});
  if(!postCards || Array.isArray(postCards))postCards={};

  // 正規KEYへ戻しておく
  localStorage.setItem(POST_KEY,JSON.stringify(posts));
  localStorage.setItem(REF_KEY,JSON.stringify(refs));
  localStorage.setItem(CARD_KEY,JSON.stringify(postCards));

  console.log('POSTS',posts);
  console.log('REFS',refs);
  console.log('POST CARDS',postCards);

  // 参考DBは基本すべて照合対象にしておく
  if(refs.length && selectedRefs.size===0){
    selectedRefs=new Set(refs.map(r=>String(r.id)));
  }

  renderPosts();
  renderRefs();
  renderSummary();
}

function renderPosts(){
  const el=document.getElementById('postList');
  const status=document.getElementById('postStatus');
  const q=(document.getElementById('postSearch')?.value||'').toLowerCase();

  if(!posts.length){
    status.innerHTML='投稿DBがありません。AdminでInstagram投稿を取得してください。';
    el.innerHTML='';
    renderSummary();
    return;
  }

  const sorted=[...posts]
    .filter(p=>(p.title+' '+p.caption).toLowerCase().includes(q))
    .sort((a,b)=>Number(b.views||0)-Number(a.views||0));

  status.innerHTML=`読み込み完了：${posts.length}件 / 表示：${sorted.length}件`;

  el.innerHTML=sorted.map(p=>`
    <div class="item ${selectedPostId===String(p.id)?'active':''}" onclick="selectPost('${String(p.id).replace(/'/g,"\\'")}')">
      <b>${esc(p.title)}</b>
      <div class="small">再生:${num(p.views)} / 保存:${num(p.saves)} / コメント:${num(p.comments)}</div>
    </div>
  `).join('');

  renderSummary();
}

function renderRefs(){
  const el=document.getElementById('refList');
  const status=document.getElementById('refStatus');

  if(!refs.length){
    status.innerHTML='参考DBがありません。Adminで参考構造DBを保存してください。';
    el.innerHTML='';
    renderSummary();
    return;
  }

  status.innerHTML=`読み込み完了：${refs.length}件`;

  el.innerHTML=refs.map(r=>`
    <div class="item ${selectedRefs.has(String(r.id))?'active':''}" onclick="toggleRef('${String(r.id).replace(/'/g,"\\'")}')">
      <b>${esc(r.template||r.title||'無題')}</b>
      <div class="small">${esc(r.creator||r.type||'参考DB')}</div>
    </div>
  `).join('');

  renderSummary();
}

function selectPost(id){
  selectedPostId=String(id);
  renderPosts();
}
function clearPost(){
  selectedPostId=null;
  renderPosts();
}
function selectedPostData(){
  return posts.find(p=>String(p.id)===String(selectedPostId))||null;
}
function toggleRef(id){
  id=String(id);
  selectedRefs.has(id)?selectedRefs.delete(id):selectedRefs.add(id);
  renderRefs();
}
function selectedRefData(){
  return refs.filter(r=>selectedRefs.has(String(r.id)));
}
function selectAllRefs(){
  selectedRefs=new Set(refs.map(r=>String(r.id)));
  renderRefs();
}
function clearRefs(){
  selectedRefs.clear();
  renderRefs();
}
function selectTop(){
  const sorted=[...posts].sort((a,b)=>Number(b.views||0)-Number(a.views||0));
  selectedPostId=sorted[0]?.id||null;
  renderPosts();
}
function selectBottom(){
  const sorted=[...posts].sort((a,b)=>Number(a.views||0)-Number(b.views||0));
  selectedPostId=sorted[0]?.id||null;
  renderPosts();
}

function renderSummary(){
  const p=selectedPostData();
  const rs=selectedRefData();
  const card=p ? postCards[String(p.id)] : null;

  document.getElementById('selectedSummary').textContent =
`【検証する過去投稿】
${p ? `・${p.title}｜再生:${p.views}｜保存:${p.saves}｜コメント:${p.comments}` : '未選択'}

【投稿カルテ】
${card ? `タグ:${card.tags||''}\nタイプ:${card.type||''}\n解析:${(card.analysis||'').slice(0,180)}...` : '未登録'}

【照合する参考DB】
${rs.length ? rs.map(r=>`・${r.template||r.title}｜${r.creator||r.type||''}`).join('\n') : '未選択'}`;
}

function buildPrompt(){
  const p=selectedPostData();
  const rs=selectedRefData();
  const card=p ? postCards[String(p.id)] : null;

  const postText=p ? `【中村さんの過去投稿】
タイトル:${p.title}
URL:${p.url||''}
日付:${p.date||''}
再生:${p.views||0}
リーチ:${p.reach||0}
保存:${p.saves||0}
シェア:${p.shares||0}
いいね:${p.likes||0}
コメント:${p.comments||0}
キャプション:
${p.caption||''}` : '未選択';

  const cardText=card ? `【投稿カルテ】
勝ち筋タグ:${card.tags||''}
投稿タイプ:${card.type||''}
ChatGPT解析結果:
${card.analysis||''}

投稿メモ:
${card.memo||''}

動画ファイル名:${card.videoName||''}
インサイトスクショ名:${(card.screens||[]).map(s=>s.name).join(', ')}
保存日時:${card.savedAt||''}` : '投稿カルテ未登録';

  const refText=rs.map(r=>`【参考DB / 勝ち構造】
タイトル:${r.title||''}
テンプレ名:${r.template||''}
出典:${r.creator||''}
種別:${r.type||''}
参考URL:${r.url||''}

なぜ気になったか:
${r.why||''}

抽象化した構造:
${r.structure||''}

自分ジャンルへの翻訳:
${r.translate||''}

チェックリスト:
${r.checklist||''}

元資料 / 商材本文 / 参考メモ:
${r.material||''}`).join('\n\n');

  const prompt=`あなたはSNS投稿の照合検証AIです。

これは「過去投稿同士の比較」ではありません。
1つの【中村さんの過去投稿】を、【参考DB / ノウハウDB / 商材本文 / 投稿カルテ】に照らして検証してください。

目的は、過去投稿を採点することではなく、
「なぜ伸びたのか / なぜ伸びなかったのか / 次にどう再利用するのか」を根拠付きで抽出することです。

重要:
- 投稿同士を比較しないでください。
- 選択した過去投稿が、参考DBの勝ち構造にどれだけ近いかを評価してください。
- 参考DBの元資料や商材本文も読み込んだうえで、重要部分と不要部分をChatGPT側で選別してください。
- 他者の文章や商材内容をそのままコピーせず、構造・考え方・判断基準として抽象化してください。
- 数字だけでなく、文脈・問題提起・未完成感・リアル感・コメント余白・続き感・地域性を見てください。
- なんとなく良いではなく、どの要素が視聴維持・保存・コメント・フォローに効いた可能性があるか説明してください。

【検証する中村さんの過去投稿】
${postText}

【投稿カルテ】
${cardText}

【照合する参考DB / ノウハウDB / 商材本文】
${refText || '未選択'}

出力形式:

1. 照合結果の一言結論
→ この投稿はどの勝ち構造に近いか。

2. 数字の読み取り
→ 再生 / 保存 / コメント / シェアから見える傾向。

3. 参考DBに近い点
→ どの参考DBのどの構造と一致しているか。

4. 参考DBとズレている点
→ 何が足りないか。なぜ伸び切らない可能性があるか。

5. 伸びた / 伸びなかった理由
→ 視聴心理・文脈・冒頭・コメント余白・地域性から説明。

6. この投稿の強み
→ 再利用すべき武器。

7. この投稿の弱点
→ 次回改善すべき点。

8. 中村さんジャンルへの翻訳
→ 工場化 / 職人 / 地域 / AI制作 / ナカムロボ物語でどう使うか。

9. 次回投稿で使うべき改善点
→ 理由付きで具体化。

10. バズるための15秒構成案
→ カットごとの役割つき。

11. 保存用の勝ち筋テンプレ名
→ 短く命名。

12. 投稿前チェック用チェックリスト
→ 次回の撮影・編集前に確認する項目。

13. 次に試す投稿案5つ
→ この投稿から派生できる案。`;

  document.getElementById('prompt').textContent=prompt;
  return prompt;
}

async function copyPrompt(){
  const text=document.getElementById('prompt').textContent;
  await navigator.clipboard.writeText(text);
  alert('コピーしました');
}

async function downloadPack(){
  if(typeof JSZip==='undefined'){
    alert('ZIP生成ライブラリが読み込めません。ネット接続またはCDNを確認してください。');
    return;
  }

  const prompt=buildPrompt();
  const selectedPost=selectedPostData();
  const selectedReferences=selectedRefData();
  const selectedCard=selectedPost ? postCards[String(selectedPost.id)] || null : null;

  const safeTitle=(selectedPost?.title||'reference_alignment')
    .replace(/[\\/:*?"<>|\s]+/g,'_')
    .slice(0,40);

  const z=new JSZip();

  z.file('prompt.txt',prompt);

  z.file('selected_post.json',JSON.stringify(selectedPost,null,2));
  z.file('selected_post_card.json',JSON.stringify(selectedCard,null,2));
  z.file('selected_references.json',JSON.stringify(selectedReferences,null,2));

  z.file('all_posts_db.json',JSON.stringify(posts,null,2));
  z.file('all_reference_db.json',JSON.stringify(refs,null,2));
  z.file('all_post_cards_db.json',JSON.stringify(postCards,null,2));

  z.file('analysis_context.json',JSON.stringify({
    generatedAt:new Date().toISOString(),
    selectedPostId:selectedPostId,
    selectedReferenceIds:[...selectedRefs],
    selectedPost:selectedPost,
    selectedCard:selectedCard,
    selectedReferences:selectedReferences
  },null,2));

  z.file('readme.txt',
`このZIPはChatGPTへ渡す過去投稿×参考DB検証用の解析データです。

使い方:
1. 必要なら過去動画やインサイト画像をChatGPTへ別添付
2. このZIPを添付
3. prompt.txt の内容で検証

注意:
動画本体はZIPに入っていません。
選択投稿・選択参考DB・投稿カルテ・全DBをJSONとして入れています。`
  );

  const blob=await z.generateAsync({type:'blob'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='reference_alignment_pack_'+safeTitle+'.zip';
  a.click();
  URL.revokeObjectURL(a.href);
}


reloadDB();
</script>
</body>
</html>

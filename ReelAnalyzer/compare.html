<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>過去投稿×参考DB検証</title><style>
:root{--bg:#0b1016;--panel:#121922;--line:#263445;--text:#eef4ff;--muted:#94a7bc;--accent:#57e0aa;--warn:#ffd166;--bad:#ff6b6b;--r:18px}
*{box-sizing:border-box}body{margin:0;background:#0b1016;color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;line-height:1.55}
header{padding:20px 22px;border-bottom:1px solid var(--line);background:#0f151d;position:sticky;top:0;z-index:10}
h1{margin:0;font-size:24px}.sub{color:var(--muted);font-size:13px;margin-top:4px}
nav{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}nav a{color:var(--text);text-decoration:none;background:#1b2734;border:1px solid var(--line);border-radius:999px;padding:8px 12px;font-size:13px;font-weight:800}nav a.active{background:var(--accent);color:#06130f}
.wrap{max-width:1180px;margin:0 auto;padding:22px}.clean{max-width:920px}.layout{display:grid;grid-template-columns:360px 1fr;gap:18px}@media(max-width:900px){.layout{grid-template-columns:1fr}}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:18px;margin-bottom:18px}.homegrid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}@media(max-width:900px){.homegrid{grid-template-columns:1fr}}
.homecard{background:var(--panel);border:1px solid var(--line);border-radius:22px;padding:22px;text-decoration:none;color:var(--text);display:block;min-height:190px}.homecard:hover{border-color:var(--accent)}.homecard b{font-size:20px}.homecard p{color:var(--muted);font-size:14px}.tag{display:inline-block;background:#0b1118;border:1px solid var(--line);color:var(--muted);border-radius:999px;padding:4px 9px;font-size:12px;margin-top:10px}
input,textarea,select{width:100%;background:#0b1118;border:1px solid var(--line);color:var(--text);padding:10px 12px;border-radius:12px;font-size:14px}textarea{min-height:120px;resize:vertical}label{display:block;font-size:12px;color:var(--muted);margin:12px 0 6px}
button,.btn{border:0;background:var(--accent);padding:10px 14px;border-radius:999px;font-weight:800;cursor:pointer;color:#06130f;text-decoration:none;display:inline-flex;font-size:13px}button.secondary,.btn.secondary{background:#1b2734;color:var(--text);border:1px solid var(--line)}button.warn{background:var(--warn);color:#221700}button.danger{background:#40242a;color:#ffd4d4;border:1px solid #67323b}
.btns{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}@media(max-width:700px){.grid2{grid-template-columns:1fr}}
.item{padding:12px;border:1px solid var(--line);border-radius:14px;background:#101721;cursor:pointer;margin-bottom:8px}.item.active{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent) inset}.item:hover{border-color:#3b526a}
.small{font-size:12px;color:var(--muted)}.status,.note,.preview{padding:12px;border-radius:12px;background:#0b1118;border:1px solid var(--line);color:var(--muted);font-size:13px;margin-top:10px}.ok{color:var(--accent)}.bad{color:var(--bad)}
.output{white-space:pre-wrap;background:#0b1118;border:1px solid var(--line);border-radius:14px;padding:16px;font-size:13px;line-height:1.7;max-height:620px;overflow:auto}.hidden{display:none}main.wrap.layout>section,main.wrap.layout>aside{min-width:0}
</style><script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script></head><body>
<header><h1>過去投稿×参考DB検証</h1><div class="sub">1投稿を、蓄積した参考DB・商材テキスト・投稿カルテに照合して、バズる構成案まで出す。</div><nav><a href="./index.html">TOP</a><a href="./check.html">投稿前チェック</a><a class="active" href="./compare.html">過去投稿比較</a><a href="./admin.html">Admin</a></nav></header>
<main class="wrap layout"><aside>
<div class="card"><h2>検証する過去投稿</h2><div class="note">投稿同士の比較ではなく、選んだ1投稿を参考DB全体と照合します。</div><div class="btns"><button class="secondary" onclick="selectTop()">上位投稿</button><button class="secondary" onclick="selectBottom()">下位投稿</button><button class="secondary" onclick="clearPost()">解除</button></div><label>投稿検索</label><input id="postSearch" oninput="renderPosts()" placeholder="タイトル・キャプション検索"><div id="postList" style="margin-top:14px"></div></div>
<div class="card"><h2>照合DB</h2><div id="dbSummary" class="output">読み込み中</div><div class="note">参考DBは全件を自動投入。商材本文も入れて、ChatGPT側で重要部分だけ整理させます。</div></div>
</aside><section>
<div class="card"><h2>検証条件</h2><div class="grid2"><div><label>目的</label><select id="goal" onchange="buildPrompt()"><option>再生数を伸ばす</option><option>フォローにつなげる</option><option>仕事依頼につなげる</option><option>地域で話題化する</option><option>ナカムロボ/IP育成につなげる</option></select></div><div><label>次に欲しい提案</label><select id="proposal" onchange="buildPrompt()"><option>バズる構成案まで出す</option><option>冒頭0〜2秒を重点改善</option><option>コメントが増える余白を作る</option><option>シリーズ化の案を出す</option></select></div></div><label>メモ</label><textarea id="memo" oninput="buildPrompt()" placeholder="例：この投稿は伸びた理由を知りたい / 次は工場ネタに転用したい"></textarea><div class="btns"><button onclick="buildPrompt()">プロンプト生成</button><button class="secondary" onclick="copyPrompt()">コピー</button><button class="warn" onclick="downloadPack()">ZIP生成</button></div></div>
<div class="card"><h2>選択中</h2><div id="selectedSummary" class="output">未選択</div></div>
<div class="card"><h2>ChatGPTへ渡す照合プロンプト</h2><div id="prompt" class="output">ここに生成されます。</div></div>
</section></main>
<script>
const POST_KEY='rso_posts_v1',REF_KEY='rso_refs_v1',CARD_KEY='rso_post_cards_v1';
let posts=JSON.parse(localStorage.getItem(POST_KEY)||'[]');
let refs=JSON.parse(localStorage.getItem(REF_KEY)||'[]');
let postCards=JSON.parse(localStorage.getItem(CARD_KEY)||'{}');
let selectedPostId=null;
function v(id){return document.getElementById(id)?.value||''}
function num(n){return Number(n||0).toLocaleString()}
function esc(s=''){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function selectedPostData(){return posts.find(p=>String(p.id)===String(selectedPostId))||null}
function selectedCardData(){return selectedPostId ? (postCards[selectedPostId]||{}) : {}}
function renderPosts(){const el=document.getElementById('postList');const q=v('postSearch').toLowerCase();if(!posts.length){el.innerHTML='<div class="small">AdminでInstagram投稿を取得してください</div>';renderSummary();return;}const sorted=[...posts].sort((a,b)=>Number(b.views||0)-Number(a.views||0)).filter(p=>(String(p.title||'')+' '+String(p.caption||'')).toLowerCase().includes(q));el.innerHTML=sorted.map(p=>`<div class="item ${String(selectedPostId)===String(p.id)?'active':''}" onclick="selectPost('${esc(String(p.id))}')"><b>${esc(p.title||'無題')}</b><div class="small">再生:${num(p.views)} / 保存:${num(p.saves)} / コメント:${num(p.comments)}</div></div>`).join('')||'<div class="small">該当なし</div>';renderSummary();}
function renderDbSummary(){const cards=Object.keys(postCards).length;document.getElementById('dbSummary').textContent=`参考構造DB：${refs.length}件
投稿DB：${posts.length}件
投稿カルテ：${cards}件

このページでは参考DBを個別選択せず、全件を照合材料にします。`;}
function selectPost(id){selectedPostId=id;renderPosts();buildPrompt();}
function clearPost(){selectedPostId=null;renderPosts();buildPrompt();}
function selectTop(){const s=[...posts].sort((a,b)=>Number(b.views||0)-Number(a.views||0));selectedPostId=s[0]?.id||null;renderPosts();buildPrompt();}
function selectBottom(){const s=[...posts].sort((a,b)=>Number(a.views||0)-Number(b.views||0));selectedPostId=s[0]?.id||null;renderPosts();buildPrompt();}
function renderSummary(){const p=selectedPostData();const c=selectedCardData();document.getElementById('selectedSummary').textContent=p?`【検証する過去投稿】
${p.title}
再生:${num(p.views)} / リーチ:${num(p.reach)} / 保存:${num(p.saves)} / シェア:${num(p.shares)} / コメント:${num(p.comments)}

【投稿カルテ】
タグ:${c.tags||'未登録'}
タイプ:${c.type||'未登録'}
解析:${c.analysis?'登録あり':'未登録'}
スクショ:${(c.screens||[]).length}枚 / 動画:${c.videoName||'未登録'}`:'未選択';}
function refTextAll(){return refs.map((r,i)=>`【参考DB ${i+1}】
タイトル:${r.title||''}
テンプレ名:${r.template||''}
出典:${r.creator||''}
種別:${r.type||''}
なぜ気になったか:${r.why||''}

抽象化した構造:
${r.structure||''}

自分ジャンルへの翻訳:
${r.translate||''}

チェックリスト:
${r.checklist||''}

元資料 / 商材本文 / 参考メモ:
${r.material||''}`).join('

---

');}
function cardText(c){if(!c||!Object.keys(c).length)return '投稿カルテ未登録';return `タグ:${c.tags||''}
投稿タイプ:${c.type||''}
ChatGPT解析結果:
${c.analysis||''}

投稿メモ:
${c.memo||''}

スクショ名:${(c.screens||[]).map(s=>s.name).join(', ')||'なし'}
動画名:${c.videoName||'なし'}
保存日時:${c.savedAt||''}`;}
function buildPrompt(){const p=selectedPostData();const c=selectedCardData();const postText=p?`タイトル:${p.title||''}
URL:${p.url||''}
日付:${p.date||''}
再生:${p.views||0}
リーチ:${p.reach||0}
保存:${p.saves||0}
シェア:${p.shares||0}
いいね:${p.likes||0}
コメント:${p.comments||0}

キャプション:
${p.caption||''}`:'未選択';const prompt=`あなたはInstagramリールの戦略編集者です。

これは「過去投稿同士の比較」ではありません。
選択した1つの過去投稿を、蓄積した参考DB・商材テキスト・投稿カルテと照合し、次にバズるための構成案・改善案まで作ってください。

【検証目的】
${v('goal')}

【欲しい提案】
${v('proposal')}

【中村さんメモ】
${v('memo')||'なし'}

【検証する過去投稿】
${postText}

【この投稿に紐づいた投稿カルテ】
${cardText(c)}

【蓄積した参考DB / 商材 / ノウハウ全文】
${refTextAll()||'未登録'}

重要ルール：
- 投稿同士を比較しない。比較対象は参考DB・商材・勝ち構造。
- 商材本文や参考資料は全部読んだうえで、SNS改善に必要な部分だけを選別する。
- どうでもいい情報は捨ててよい。捨てた理由も短く言う。
- 他者の文章や商材内容をそのままコピーせず、構造・考え方・判断基準として抽象化する。
- ど素人ホテル式が含まれる場合は、ホテル再建ではなく、中村さんの工場化・職人・地域・AI制作・ナカムロボ物語へ翻訳する。
- 数字だけで判断せず、文脈・問題提起・未完成感・リアル感・コメント余白・続き感・地域性を見る。
- 最後に「次回そのまま撮れる構成」を出す。

出力形式：
1. 一言結論
2. この投稿が参考DBに近い点
3. ズレている点
4. 足りない要素
5. 伸びた/伸びなかった理由
6. 捨ててよい商材情報・拾うべき商材情報
7. 中村さんジャンルへの翻訳
8. 次回投稿の改善方針
9. バズるための15秒構成案
10. 冒頭0〜2秒フック案10個
11. サムネ/画面文字案10個
12. コメントが増える問いかけ案5個
13. 保存用の勝ち筋テンプレ名
14. 投稿前チェックリスト
15. 次に試す投稿案5つ`;document.getElementById('prompt').textContent=prompt;return prompt;}
async function copyPrompt(){const p=buildPrompt();await navigator.clipboard.writeText(p);alert('コピーしました');}
async function downloadPack(){if(typeof JSZip==='undefined'){alert('ZIP生成ライブラリが読み込めません');return;}const z=new JSZip();const prompt=buildPrompt();z.file('buzz_alignment_prompt.txt',prompt);z.file('selected_post.json',JSON.stringify(selectedPostData(),null,2));z.file('selected_post_card.json',JSON.stringify(selectedCardData(),null,2));z.file('reference_db_full.json',JSON.stringify(refs,null,2));z.file('readme.txt','このZIPと、必要なら該当投稿のスクショ/動画をChatGPTへ添付してください。');const blob=await z.generateAsync({type:'blob'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='buzz_alignment_pack.zip';a.click();URL.revokeObjectURL(a.href);}
renderDbSummary();renderPosts();renderSummary();buildPrompt();
</script></body></html>

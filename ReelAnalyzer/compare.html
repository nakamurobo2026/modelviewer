<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>過去投稿×参考DB検証</title>
<style>
:root{--bg:#0b1016;--panel:#121922;--line:#263445;--text:#eef4ff;--muted:#94a7bc;--accent:#57e0aa;--warn:#ffd166;--bad:#ff6b6b;--r:18px}
*{box-sizing:border-box}body{margin:0;background:#0b1016;color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;line-height:1.55}
header{padding:20px 22px;border-bottom:1px solid var(--line);background:#0f151d;position:sticky;top:0;z-index:10}
h1{margin:0;font-size:24px}.sub{color:var(--muted);font-size:13px;margin-top:4px}
nav{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}nav a{color:var(--text);text-decoration:none;background:#1b2734;border:1px solid var(--line);border-radius:999px;padding:8px 12px;font-size:13px;font-weight:800}nav a.active{background:var(--accent);color:#06130f}
.wrap{max-width:1180px;margin:0 auto;padding:22px}
.layout{display:grid;grid-template-columns:340px 1fr;gap:18px}@media(max-width:900px){.layout{grid-template-columns:1fr}}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:18px;margin-bottom:18px}
.btns{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
.item{padding:12px;border:1px solid var(--line);border-radius:14px;background:#101721;cursor:pointer;margin-bottom:8px}.item.active{border-color:var(--accent)}
.small{font-size:12px;color:var(--muted)}
.output{white-space:pre-wrap;background:#0b1118;border:1px solid var(--line);border-radius:14px;padding:16px;font-size:13px;line-height:1.7;max-height:600px;overflow:auto}
button{border:0;background:var(--accent);padding:10px 14px;border-radius:999px;font-weight:800;cursor:pointer;color:#06130f;font-size:13px;margin-bottom:8px}
button.secondary{background:#1b2734;color:var(--text);border:1px solid var(--line)}
.copy-btn{background:var(--accent);color:#06130f;width:100%;font-size:16px;padding:15px;margin-top:10px;box-shadow: 0 4px 15px rgba(87, 224, 170, 0.2)}
</style>
</head>
<body>
<header>
  <h1>過去投稿×参考DB検証</h1>
  <div class="sub">DBの全文を含めた解析用プロンプトを生成します。</div>
  <nav>
    <a href="./index.html">TOP</a>
    <a href="./check.html">投稿前チェック</a>
    <a class="active" href="./compare.html">過去投稿比較</a>
    <a href="./admin.html">Admin</a>
  </nav>
</header>

<main class="wrap layout">
  <aside>
    <div class="card">
      <h2>検証する過去投稿</h2>
      <div class="btns">
        <button class="secondary" onclick="selectTop()">上位</button>
        <button class="secondary" onclick="selectBottom()">下位</button>
        <button class="secondary" onclick="clearPost()">解除</button>
      </div>
      <div id="postList" style="margin-top:14px"></div>
    </div>

    <div class="card">
      <h2>照合する参考DB</h2>
      <div class="btns">
        <button class="secondary" onclick="selectAllRefs()">全選択</button>
        <button class="secondary" onclick="clearRefs()">解除</button>
      </div>
      <div id="refList" style="margin-top:14px"></div>
    </div>
  </aside>

  <section>
    <div class="card">
      <h2>1. 選択状況</h2>
      <div id="selectedSummary" class="output" style="max-height:120px">未選択</div>
    </div>

    <div class="card">
      <h2>2. Gemini用 統合プロンプト</h2>
      <p class="small">以下のボタンで「DB全文」を含めた全ての情報をコピーしてGeminiに貼り付けてください。</p>
      <button class="copy-btn" onclick="copyFullPrompt()">🚀 DB全文を統合してコピー</button>
      <div id="prompt" class="output" style="margin-top:15px; border-color: var(--accent);">投稿とDBを選択してください。</div>
    </div>
  </section>
</main>

<script>
const POST_KEY='rso_posts_v1';
const REF_KEY='rso_refs_v1';
let posts=JSON.parse(localStorage.getItem(POST_KEY)||'[]');
let refs=JSON.parse(localStorage.getItem(REF_KEY)||'[]');
let selectedPostId=null;
let selectedRefs=new Set();

function esc(s=''){return String(s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
function num(n){return Number(n||0).toLocaleString()}

function renderPosts(){
  const el=document.getElementById('postList');
  if(!posts.length){el.innerHTML='<div class="small">投稿データがありません</div>';return;}
  el.innerHTML=posts.sort((a,b)=>b.views-a.views).map(p=>`
    <div class="item ${selectedPostId===p.id?'active':''}" onclick="selectPost('${p.id}')">
      <b>${esc(p.title)}</b><br><span class="small">再生:${num(p.views)}</span>
    </div>
  `).join('');
  updateUI();
}

function renderRefs(){
  const el=document.getElementById('refList');
  if(!refs.length){el.innerHTML='<div class="small">DBデータがありません</div>';return;}
  el.innerHTML=refs.map(r=>`
    <div class="item ${selectedRefs.has(String(r.id))?'active':''}" onclick="toggleRef('${r.id}')">
      <b>${esc(r.template||r.title)}</b>
    </div>
  `).join('');
  updateUI();
}

function selectPost(id){selectedPostId=id;renderPosts();}
function clearPost(){selectedPostId=null;renderPosts();}
function toggleRef(id){id=String(id);selectedRefs.has(id)?selectedRefs.delete(id):selectedRefs.add(id);renderRefs();}
function selectAllRefs(){selectedRefs=new Set(refs.map(r=>String(r.id)));renderRefs();}
function clearRefs(){selectedRefs.clear();renderRefs();}
function selectTop(){selectedPostId=posts.sort((a,b)=>b.views-a.views)[0]?.id;renderPosts();}
function selectBottom(){selectedPostId=posts.sort((a,b)=>a.views-b.views)[0]?.id;renderPosts();}

function updateUI(){
  const p=posts.find(p=>p.id===selectedPostId);
  const rs=refs.filter(r=>selectedRefs.has(String(r.id)));
  
  document.getElementById('selectedSummary').textContent = 
    `対象：${p?p.title:'未選択'} / DB：${rs.length?rs.length+'件':'未選択'}`;
  
  buildPrompt(p, rs);
}

function buildPrompt(p, rs){
  const el = document.getElementById('prompt');
  if(!p || !rs.length){ el.textContent = "投稿と参考DBを左から選択してください。"; return; }

  const refDetails = rs.map(r=>`---
【DBタイトル】: ${r.title}
【構造】: ${r.structure}
【翻訳案】: ${r.translate}
【チェックリスト】: ${r.checklist}
【元資料全文】:
${r.material || '資料なし'}
---`).join('\n\n');

  const text = `# 指示
あなたはナカムラボエンジニアリングのプロデューサーです。
以下の【過去投稿】を、提供する【参考DB】の知識・構造・元資料すべてに照らし合わせ、ナカムロボの世界観を活かした爆伸び改善案を策定してください。

# 1. 中村さんの過去投稿
タイトル: ${p.title}
数字: 再生 ${p.views} / 保存 ${p.saves} / コメント ${p.comments}
キャプション: 
${p.caption}

# 2. 参照するDB・ノウハウ全文
${refDetails}

# 3. 出力項目
1. 適合率と辛口結論
2. DBの重要箇所と投稿の合致・不足点
3. 読み込んだ動画の素材を使って0.5秒~0・7秒の構成で最適な構成案
4. 保存・コメントが生まれる「余白」の作り方
5. 即実行できる改善アクション（冒頭・構成・オチ）
6. 中村さん専用の「勝ち筋テンプレ名」の命名
7. 投稿前チェックリスト（5項目）
8. 次に試す投稿案5選`;


  el.textContent = text;
}

async function copyFullPrompt(){
  const text = document.getElementById('prompt').textContent;
  if(text.includes("選択してください")){ alert("先にデータを選択してください"); return; }
  await navigator.clipboard.writeText(text);
  alert('DB全文を含むプロンプトをコピーしました！Geminiに貼り付けてください。');
}

renderPosts();
renderRefs();
</script>
</body>
</html>

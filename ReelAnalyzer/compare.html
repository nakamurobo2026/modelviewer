<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>過去投稿比較</title><style>
:root{--bg:#0b1016;--panel:#121922;--line:#263445;--text:#eef4ff;--muted:#94a7bc;--accent:#57e0aa;--warn:#ffd166;--bad:#ff6b6b;--r:18px}
*{box-sizing:border-box}body{margin:0;background:#0b1016;color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;line-height:1.55}
header{padding:20px 22px;border-bottom:1px solid var(--line);background:#0f151d;position:sticky;top:0;z-index:10}
h1{margin:0;font-size:24px}.sub{color:var(--muted);font-size:13px;margin-top:4px}
nav{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}nav a{color:var(--text);text-decoration:none;background:#1b2734;border:1px solid var(--line);border-radius:999px;padding:8px 12px;font-size:13px;font-weight:800}nav a.active{background:var(--accent);color:#06130f}
.wrap{max-width:1180px;margin:0 auto;padding:22px}.clean{max-width:920px}
.layout{display:grid;grid-template-columns:340px 1fr;gap:18px}@media(max-width:900px){.layout{grid-template-columns:1fr}}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:18px;margin-bottom:18px}
.homegrid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}@media(max-width:900px){.homegrid{grid-template-columns:1fr}}
.homecard{background:var(--panel);border:1px solid var(--line);border-radius:22px;padding:22px;text-decoration:none;color:var(--text);display:block;min-height:190px}
.homecard:hover{border-color:var(--accent)}.homecard b{font-size:20px}.homecard p{color:var(--muted);font-size:14px}.tag{display:inline-block;background:#0b1118;border:1px solid var(--line);color:var(--muted);border-radius:999px;padding:4px 9px;font-size:12px;margin-top:10px}
input,textarea,select{width:100%;background:#0b1118;border:1px solid var(--line);color:var(--text);padding:10px 12px;border-radius:12px;font-size:14px}
textarea{min-height:120px;resize:vertical}label{display:block;font-size:12px;color:var(--muted);margin:12px 0 6px}
button,.btn{border:0;background:var(--accent);padding:10px 14px;border-radius:999px;font-weight:800;cursor:pointer;color:#06130f;text-decoration:none;display:inline-flex;font-size:13px}
button.secondary,.btn.secondary{background:#1b2734;color:var(--text);border:1px solid var(--line)}button.warn{background:var(--warn);color:#221700}button.danger{background:#40242a;color:#ffd4d4;border:1px solid #67323b}
.btns{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}@media(max-width:700px){.grid2{grid-template-columns:1fr}}
.item{padding:12px;border:1px solid var(--line);border-radius:14px;background:#101721;cursor:pointer;margin-bottom:8px}.item.active{border-color:var(--accent)}
.small{font-size:12px;color:var(--muted)}.status,.note,.preview{padding:12px;border-radius:12px;background:#0b1118;border:1px solid var(--line);color:var(--muted);font-size:13px;margin-top:10px}
.output{white-space:pre-wrap;background:#0b1118;border:1px solid var(--line);border-radius:14px;padding:16px;font-size:13px;line-height:1.7;max-height:560px;overflow:auto}
.hidden{display:none}
</style><script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script></head><body>
<header><h1>過去投稿比較分析</h1><div class="sub">過去を見る。伸びた投稿と伸びなかった投稿を比較して勝ちパターンを抽出。</div><nav><a class="" href="./index.html">TOP</a><a class="" href="./check.html">投稿前チェック</a><a class="active" href="./compare.html">過去投稿比較</a><a class="" href="./admin.html">Admin</a></nav></header>
<main class="wrap layout"><aside><div class="card"><h2>投稿選択</h2><div class="note">比較したい投稿を2つ以上選択。</div><div class="btns"><button class="secondary" onclick="selectTopBottom()">上位/下位を自動選択</button><button class="secondary" onclick="clearSelected()">選択解除</button></div><div id="postList" style="margin-top:14px"></div></div></aside>
<section><div class="card"><h2>比較条件</h2><div class="grid2"><div><label>比較目的</label><select id="goal"><option>伸びた理由/伸びなかった理由</option><option>フォロー増につながる投稿</option><option>仕事依頼につながる投稿</option><option>ナカムロボと工場系の違い</option><option>地域性の効き方</option></select></div><div><label>分析軸</label><select id="axis"><option>文脈・問題提起・リアル感</option><option>冒頭2秒・フック</option><option>保存/シェア</option><option>コメント余白</option><option>世界観/IP育成</option></select></div></div><label>追加メモ</label><textarea id="memo"></textarea><div class="btns"><button onclick="buildPrompt()">比較分析プロンプト生成</button><button class="secondary" onclick="copyPrompt()">コピー</button><button class="warn" onclick="downloadPack()">比較パックZIP生成</button></div></div>
<div class="card"><h2>選択中</h2><div id="selectedList" class="output">未選択</div></div><div class="card"><h2>比較プロンプト</h2><div id="prompt" class="output">ここに生成されます。</div></div></section></main>
<script>
const POST_KEY='rso_posts_v1',REF_KEY='rso_refs_v1';let posts=JSON.parse(localStorage.getItem(POST_KEY)||'[]'),refs=JSON.parse(localStorage.getItem(REF_KEY)||'[]'),sel=new Set();
function v(id){return document.getElementById(id).value||''}function num(n){return Number(n||0).toLocaleString()}function esc(s=''){return String(s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
function render(){const el=document.getElementById('postList');if(!posts.length){el.innerHTML='<div class="small">Adminで投稿取得してください</div>';return}const sorted=[...posts].sort((a,b)=>Number(b.views||0)-Number(a.views||0));el.innerHTML=sorted.map(p=>`<div class="item ${sel.has(p.id)?'active':''}" onclick="toggle('${p.id}')"><b>${esc(p.title)}</b><div class="small">再生:${num(p.views)} / 保存:${num(p.saves)} / コメント:${num(p.comments)}</div></div>`).join('');renderSelected()}
function toggle(id){sel.has(id)?sel.delete(id):sel.add(id);render()}function selected(){return posts.filter(p=>sel.has(p.id))}function selectTopBottom(){sel.clear();const s=[...posts].sort((a,b)=>Number(b.views||0)-Number(a.views||0));s.slice(0,3).forEach(p=>sel.add(p.id));s.slice(-3).forEach(p=>sel.add(p.id));render()}function clearSelected(){sel.clear();render()}
function renderSelected(){const a=selected();document.getElementById('selectedList').textContent=a.length?a.map(p=>`・${p.title}｜再生:${p.views}｜保存:${p.saves}｜コメント:${p.comments}`).join('\n'):'未選択'}
function buildPrompt(){const a=selected();const postsText=a.map(p=>`【投稿】${p.title}\nURL:${p.url}\n日付:${p.date}\n再生:${p.views}\nリーチ:${p.reach}\n保存:${p.saves}\nシェア:${p.shares}\nいいね:${p.likes}\nコメント:${p.comments}\nキャプション:${p.caption}`).join('\n\n');const ref=refs.slice(0,12).map(r=>`【${r.template||r.title}】\n構造:${r.structure}\n翻訳:${r.translate}\nチェック:${r.checklist}`).join('\n\n');const p=`あなたはSNS投稿の比較分析AIです。以下の過去投稿を比較して、中村さん専用の勝ちパターンを抽出してください。\n\n【比較目的】\n${v('goal')}\n\n【分析軸】\n${v('axis')}\n\n【追加メモ】\n${v('memo')}\n\n【比較対象投稿】\n${postsText||'未選択'}\n\n【参考構造DB】\n${ref||'参考構造なし'}\n\n重要：数字だけでなく文脈・問題提起・リアル感・地域性・世界観/IP育成まで見る。\n\n出力：比較結論、伸びた共通構造、弱点、中村さん特有の強み、捨てる型、続ける型、ジャンル別勝ち筋、次に試す投稿案5つ、保存用テンプレ名、投稿前チェックリスト。`;document.getElementById('prompt').textContent=p;return p}
async function copyPrompt(){await navigator.clipboard.writeText(document.getElementById('prompt').textContent);alert('コピーしました')}
async function downloadPack(){const z=new JSZip();const p=buildPrompt();const a=selected();z.file('compare_prompt.txt',p);z.file('compare_data.json',JSON.stringify({goal:v('goal'),axis:v('axis'),memo:v('memo'),selectedPosts:a,referenceDigest:refs},null,2));const blob=await z.generateAsync({type:'blob'});const x=document.createElement('a');x.href=URL.createObjectURL(blob);x.download='compare_pack.zip';x.click();URL.revokeObjectURL(x.href)}
render();
</script></body></html>

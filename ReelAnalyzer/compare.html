<script>
/* =========================
   STATE
========================= */

let selectedPostId = null;
let selectedRefs = new Set();

/* =========================
   SAFE VALUE GETTER
========================= */

function v(id){
  return document.getElementById(id)?.value || '';
}

/* =========================
   POST SELECT
========================= */

function selectPost(id){
  selectedPostId = id;

  renderPosts();
  renderSummary();
  buildPrompt();
}

function clearPost(){
  selectedPostId = null;

  renderPosts();
  renderSummary();
  buildPrompt();
}

/* =========================
   REF SELECT
========================= */

function toggleRef(id){

  id = String(id);

  if(selectedRefs.has(id)){
    selectedRefs.delete(id);
  }else{
    selectedRefs.add(id);
  }

  renderRefs();
  renderSummary();
  buildPrompt();
}

function selectAllRefs(){

  selectedRefs = new Set(
    refs.map(r => String(r.id))
  );

  renderRefs();
  renderSummary();
  buildPrompt();
}

function clearRefs(){

  selectedRefs.clear();

  renderRefs();
  renderSummary();
  buildPrompt();
}

/* =========================
   BUILD PROMPT
========================= */

function buildPrompt(){

  const targetPost = posts.find(
    p => String(p.id) === String(selectedPostId)
  );

  const selectedRefData = refs.filter(
    r => selectedRefs.has(String(r.id))
  );

  if(!targetPost){

    document.getElementById('prompt').textContent =
      '投稿を選択してください';

    return;
  }

  if(selectedRefData.length === 0){

    document.getElementById('prompt').textContent =
      '参考DBを選択してください';

    return;
  }

  const prompt = `
あなたはInstagramリール分析AIです。

以下の投稿を、
参考DBと比較分析してください。

【検証対象投稿】

タイトル：
${targetPost.title || ''}

再生数：
${targetPost.views || 0}

保存：
${targetPost.saves || 0}

コメント：
${targetPost.comments || 0}

内容：
${targetPost.caption || ''}

--------------------------------------------------

【参考DB】

${selectedRefData.map(r => `
■ ${r.title || ''}

ジャンル：
${r.genre || ''}

特徴：
${r.feature || ''}

バズ要因：
${r.reason || ''}

構成：
${r.structure || ''}

フック：
${r.hook || ''}

改善ポイント：
${r.improve || ''}
`).join('\n')}

--------------------------------------------------

以下を分析してください：

1. この投稿が伸びた理由
2. 弱い部分
3. スキップされる原因
4. 冒頭2秒改善案
5. テロップ改善案
6. 尺改善案
7. 構成改善案
8. 保存率を上げる改善案
9. 次回投稿アイデア
10. この素材だけで改善する方法

具体的にお願いします。
`;

  document.getElementById('prompt').textContent = prompt;
}

/* =========================
   COPY
========================= */

async function copyPrompt(){

  const text =
    document.getElementById('prompt').textContent;

  try{

    await navigator.clipboard.writeText(text);

    alert('コピーしました');

  }catch(e){

    alert('コピー失敗');
  }
}

/* =========================
   ZIP DOWNLOAD
========================= */

async function downloadPack(){

  const targetPost = posts.find(
    p => String(p.id) === String(selectedPostId)
  );

  const selectedRefData = refs.filter(
    r => selectedRefs.has(String(r.id))
  );

  const payload = {

    exportAt: new Date().toISOString(),

    targetPost,

    refs: selectedRefData,

    prompt:
      document.getElementById('prompt').textContent,

    memo: v('memo'),
    axis: v('axis'),
    goal: v('goal')
  };

  const blob = new Blob(
    [JSON.stringify(payload, null, 2)],
    {type:'application/json'}
  );

  const a = document.createElement('a');

  a.href = URL.createObjectURL(blob);

  a.download = 'instagram_compare_pack.json';

  a.click();
}

/* =========================
   SUMMARY
========================= */

function renderSummary(){

  const el = document.getElementById('summary');

  const targetPost = posts.find(
    p => String(p.id) === String(selectedPostId)
  );

  const selectedRefData = refs.filter(
    r => selectedRefs.has(String(r.id))
  );

  el.innerHTML = `
<div style="line-height:1.8">

<b>【検証する過去投稿】</b><br>
${
  targetPost
  ? `・${targetPost.title}｜再生:${targetPost.views}｜保存:${targetPost.saves}｜コメント:${targetPost.comments}`
  : '未選択'
}

<br><br>

<b>【照合する参考DB】</b><br>

${
  selectedRefData.length
    ? selectedRefData.map(r => `・${r.title}`).join('<br>')
    : '未選択'
}

</div>
`;
}

/* =========================
   INIT
========================= */

renderPosts();
renderRefs();
renderSummary();
buildPrompt();
</script>

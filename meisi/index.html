<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>ナカムラボエンジニアリング | NFC名刺</title>

  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.2.0/model-viewer.min.js"></script>

  <style>
    :root{
      --bg1:#f7fbff;
      --bg2:#eef8ff;
      --text:#18354d;
      --sub:#647f96;
      --line:#d8e9f6;
      --accent:#59bfff;
      --btn:#ffffff;
      --btnHover:#f4fbff;
      --shadow:0 12px 30px rgba(67, 148, 201, 0.10);
      --shadow-soft:0 6px 18px rgba(24, 53, 77, 0.08);
    }

    *{box-sizing:border-box;}

    body{
      margin:0;
      min-height:100vh;
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans JP",sans-serif;
      background:
        radial-gradient(circle at top left, #ddf3ff 0%, transparent 30%),
        radial-gradient(circle at top right, #fff8d9 0%, transparent 22%),
        linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 100%);
    }

    .container{
      max-width:660px;
      margin:0 auto;
      padding:18px 16px 28px;
    }

    .hero{
      background:rgba(255,255,255,0.84);
      border-radius:30px;
      box-shadow:var(--shadow);
      backdrop-filter:blur(10px);
      overflow:hidden;
    }

    .viewer-wrap{
      position:relative;
      padding:14px 14px 0;
    }

    .ar-chip{
      position:absolute;
      top:26px;
      right:26px;
      border:none;
      background:#ffffff;
      border:1px solid var(--line);
      border-radius:999px;
      padding:10px 14px;
      font-size:12px;
      font-weight:800;
      box-shadow:var(--shadow-soft);
      cursor:pointer;
    }

    model-viewer{
      width:100%;
      height:58vh;
      min-height:400px;
      background:linear-gradient(180deg, #fbfeff 0%, #e8f5ff 100%);
      border-radius:24px;
    }

    .content{
      padding:20px 18px 22px;
    }

    h1{
      margin:0 0 6px;
      font-size:28px;
    }

    .lead{
      margin:0 0 18px;
      color:var(--sub);
      font-size:15px;
      line-height:1.7;
    }

    .buttons{
      display:grid;
      gap:12px;
    }

    .btn{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:16px 18px;
      border-radius:18px;
      text-decoration:none;
      color:var(--text);
      background:var(--btn);
      border:1px solid var(--line);
      font-size:16px;
      font-weight:800;
      box-shadow:var(--shadow-soft);
    }

    .btn:hover{
      background:var(--btnHover);
    }

    .btn small{
      display:block;
      margin-top:4px;
      color:var(--sub);
      font-size:12px;
      font-weight:600;
    }

    .arrow{
      font-size:18px;
      color:#7aa8c7;
    }

    .footer{
      text-align:center;
      color:#7c96aa;
      font-size:12px;
      margin-top:14px;
    }

  </style>
</head>

<body>
  <div class="container">
    <section class="hero">
      <div class="viewer-wrap">

        <button class="ar-chip" id="arButton">ARで表示</button>

        <model-viewer
          id="mv"
          src="./nakamurobo.glb"
          ios-src="./nakamurobo.usdz"
          ar
          ar-modes="webxr scene-viewer quick-look"
          camera-controls
          auto-rotate>
        </model-viewer>
      </div>

      <div class="content">
        <h1>ナカムラボエンジニアリング</h1>
        <p class="lead">
          CNC / 木工加工 / 3Dプリント<br>
          作品確認・ご相談・連絡先追加ができます。
        </p>

        <div class="buttons">

          <a class="btn" href="https://www.instagram.com/nakamulabengineering/" target="_blank">
            <div>
              作品を見る
              <small>Instagramで制作事例を見る</small>
            </div>
            <span class="arrow">↗</span>
          </a>

          <a class="btn" href="https://line.me/ti/p/_D-n7NJxMd" target="_blank">
            <div>
              LINEで相談する
              <small>気軽に問い合わせ</small>
            </div>
            <span class="arrow">↗</span>
          </a>

          <a class="btn" href="mailto:nakamura0407@gmail.com?subject=ご相談（ナカムラボ）">
            <div>
              メールで相談する
              <small>図面や詳細を送りたい場合</small>
            </div>
            <span class="arrow">↗</span>
          </a>

          <a class="btn" href="#" onclick="saveContact(); return false;">
            <div>
              連絡先を追加
              <small>スマホに保存</small>
            </div>
            <span class="arrow">＋</span>
          </a>

        </div>
      </div>
    </section>

    <p class="footer">
      © Nakamuralab Engineering
    </p>
  </div>

<script>
const mv = document.getElementById('mv');
const arButton = document.getElementById('arButton');

arButton.addEventListener('click', async () => {
  try {
    await mv.activateAR();
  } catch {
    alert("SafariまたはChromeでお試しください");
  }
});

function saveContact() {
  const vcard = [
    'BEGIN:VCARD',
    'VERSION:3.0',
    'N:中村;健太;;;',
    'FN:中村健太',
    'ORG:ナカムラボエンジニアリング',
    'TITLE:CNC・木工加工・3Dプリント',
    'TEL:07056719763',
    'EMAIL:nakamura0407@gmail.com',
    'ADR:;;広島県福山市南本庄3丁目14-6;;;;',
    'URL:https://www.instagram.com/nakamulabengineering/',
    'URL:https://line.me/ti/p/_D-n7NJxMd',
    'NOTE:CNC加工・木工・3Dプリントのご相談承ります。',
    'END:VCARD'
  ].join('\n');

  const blob = new Blob([vcard], { type: 'text/vcard' });
  const url = URL.createObjectURL(blob);
  window.open(url);
}
</script>

</body>
</html>

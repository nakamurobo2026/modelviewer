<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAKAMUROBO - Log Analysis Test</title>
    <style>
        /* 深夜の工房のような暗い背景 */
        body { 
            margin: 0; 
            background: #050505; 
            color: #00ff41; 
            font-family: 'Courier New', Courier, monospace; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            overflow: hidden; 
        }

        /* 解析ボタンを配置するエリア（仮想のナカムロボの胸部付近） */
        .stage {
            position: relative;
            width: 300px;
            height: 300px;
            background: rgba(20, 20, 20, 0.5);
            border: 1px dashed #333;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 小さい赤いボタン（解析ポイント） */
        .Hotspot {
            background: #ff0000; 
            border: none; 
            width: 16px; 
            height: 16px; 
            border-radius: 50%; 
            cursor: pointer; 
            position: relative;
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.9);
            animation: pulse 2s infinite; /* 呼吸するように点滅 */
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* ジジジ…という英語メッセージボックス */
        .glitch-box {
            display: none; 
            position: absolute; 
            left: 40px; 
            top: -60px;
            width: 240px; 
            padding: 15px;
            background: rgba(0, 10, 0, 0.95); 
            border: 1px solid #00ff41;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.1);
            pointer-events: none;
            z-index: 100;
        }

        /* ゆっくりしたジジジ演出（明滅とズレ） */
        @keyframes flicker {
            0%, 48%, 52%, 100% { opacity: 1; }
            50% { opacity: 0.3; }

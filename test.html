<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAKAMUROBO - TEST</title>
    <style>
        /* 背景を真っ暗にして文字を目立たせる */
        body { margin: 0; background: #000; color: #0f0; font-family: monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        
        /* 1. 解析ボタン */
        #btn {
            background: #f00; color: #fff; border: none; padding: 20px;
            font-size: 18px; border-radius: 50px; cursor: pointer;
            box-shadow: 0 0 20px #f00; z-index: 10;
        }

        /* 2. 英語メッセージの枠 */
        #msg-box {
            display: none; /* 最初は非表示 */
            margin-top: 30px; width: 80%; max-width: 300px;
            padding: 20px; border: 1px solid #0f0;
            background: rgba(0, 50, 0, 0.2);
        }

        /* ゆっくりジジジ…のアニメーション */
        @keyframes jiji-glitch {
            0%, 90% { opacity: 1; transform: translateX(0); }
            95% { opacity: 0.5; transform: translateX(-2px); }
            100% { opacity: 1; transform: translateX(2px); }
        }

        .active {
            display: block !important;
            animation: jiji-glitch 0.2s infinite; /* ジジジ感を出す */
        }
    </style>
</head>
<body>

    <button id="btn">TAP TO ANALYZE</button>

    <div id="msg-box">
        <div style="font-size: 10px; border-bottom: 1px solid #0f0; margin-bottom: 10px;">DECRYPTED: Dr. Nakamura</div>
        <strong>"Believe in yourself."</strong><br><br>
        Nakamurobo,<br>
        you are not an error.<br>
        Find me.
    </div>

    <script>
        const btn = document.getElementById('btn');
        const box = document.getElementById('msg-box');

        btn.addEventListener('click', () => {
            // クリックされたら .active をつけて表示させる
            box.classList.toggle('active');
        });
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAKAMUROBO - English Log Test</title>
    <style>
        body { margin: 0; background: #050505; color: #00ff41; font-family: 'Courier New', Courier, monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        
        .preview-area { position: relative; width: 320px; height: 320px; background: #111; border: 1px solid #333; display: flex; align-items: center; justify-content: center; }

        .Hotspot {
            background: #cc0000; border: none; width: 22px; height: 22px;
            border-radius: 50%; cursor: pointer; position: relative;
            box-shadow: 0 0 8px #f00;
        }

        /* 英語メッセージ用ノイズボックス */
        .glitch-box {
            display: none; position: absolute; left: 40px; top: -60px;
            width: 250px; padding: 18px;
            background: rgba(0, 10, 0, 0.9); border: 1px solid #00ff41;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.1);
            pointer-events: none;
            line-height: 1.4;
        }

        /* ゆっくりした明滅 */
        @keyframes flicker {
            0% { opacity: 1; }
            48% { opacity: 1; }
            50% { opacity: 0.3; }
            52% { opacity: 1; }
            100% { opacity: 1; }
        }

        /* わずかなジジジ（ズレ） */
        @keyframes subtle-shift {
            0% { transform: translateX(0); }
            95% { transform: translateX(0); }
            96% { transform: translateX(-2px); }
            98% { transform: translateX(2px); }
            100% { transform: translateX(0); }
        }

        .active {
            display: block !important;
            animation: flicker 4s infinite, subtle-shift 3s infinite;
        }

        .status-line { font-size: 10px; color: #008822; border-bottom: 1px solid #008822; margin-bottom: 10px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="preview-area">
        <button class="Hotspot" id="testBtn">
            <div class="glitch-box" id="msg">
                <div class="status-line">Log: Decrypted_Message</div>
                <strong style="font-size: 1.1em;">"Believe in yourself."</strong><br><br>
                Nakamurobo,<br>
                you are not an error.<br>
                Find me.
            </div>
        </button>
    </div>

    <p style="margin-top:20px; color:#444; font-family: sans-serif;">Tap the Red Point to Scan</p>

    <script>
        const btn = document.getElementById('testBtn');
        const msg = document.getElementById('msg');
        btn.addEventListener('click', () => {
            msg.classList.toggle('active');
        });
    </script>

</body>
</html>

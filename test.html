<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAKAMUROBO - Audio Decrypt Test</title>
    <style>
        body { margin: 0; background: #000; color: #00ff41; font-family: monospace; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .Hotspot { background: #ff0000; border: none; width: 16px; height: 16px; border-radius: 50%; cursor: pointer; box-shadow: 0 0 10px #f00; }
        .glitch-box { display: none; position: absolute; left: 40px; top: -70px; width: 250px; padding: 20px; background: rgba(0, 10, 0, 0.95); border: 1px solid #00ff41; }
        .active { display: block !important; animation: jiji 4s infinite; }
        @keyframes jiji { 0%, 90% { opacity: 1; transform: translateX(0); } 95% { opacity: 0.4; transform: translateX(-3px); } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <button class="Hotspot" id="analyzeBtn">
        <div class="glitch-box" id="output">
            <div style="font-size: 10px; border-bottom: 1px solid #00ff41; margin-bottom: 10px;">DECRYPTING...</div>
            <strong>"Believe in yourself."</strong><br><br>
            Nakamurobo,<br>
            you are not an error.<br>
            Find me.
        </div>
    </button>

    <script>
        const btn = document.getElementById('analyzeBtn');
        const box = document.getElementById('output');
        let audioCtx;

        // ノイズ音を生成する関数
        function playNoise() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const bufferSize = audioCtx.sampleRate * 0.5; // 0.5秒のノイズ
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            
            for (let i = 0; i < bufferSize; i++) {
                data[i] = Math.random() * 2 - 1; // ホワイトノイズ生成
            }

            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;

            // フィルターで「ジリジリ」した音に加工
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'bandpass';
            filter.frequency.value = 1000;

            noise.connect(filter);
            filter.connect(audioCtx.destination);
            noise.start();
        }

        btn.addEventListener('click', () => {
            box.classList.toggle('active');
            if (box.classList.contains('active')) {
                playNoise(); // 表示された瞬間に音を鳴らす
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAKAMUROBO - Deep Noise Test</title>
    <style>
        body { margin: 0; background: #050505; color: #00ff41; font-family: 'Courier New', Courier, monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        .preview-area { position: relative; width: 300px; height: 300px; background: #111; border: 1px solid #222; display: flex; align-items: center; justify-content: center; }

        /* 解析ポイント */
        .Hotspot {
            background: #cc0000; border: none; width: 20px; height: 20px;
            border-radius: 50%; cursor: pointer; position: relative;
            box-shadow: 0 0 5px #f00;
        }

        /* ジジジ…というノイズボックス */
        .glitch-box {
            display: none; position: absolute; left: 35px; top: -50px;
            width: 240px; padding: 15px;
            background: rgba(0, 15, 0, 0.95); border: 1px solid #00ff41;
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.2);
            pointer-events: none;
        }

        /* 1. 全体の明滅（ジジジ…感） */
        @keyframes flicker {
            0% { opacity: 0.9; }
            5% { opacity: 0.5; }
            10% { opacity: 0.9; }
            15% { opacity: 0.2; }
            20% { opacity: 0.9; }
            100% { opacity: 1; }
        }

        /* 2. 横方向の走査線ノイズ */
        @keyframes scanline {
            0% { clip-path: inset(0 0 99% 0); }
            100% { clip-path: inset(0 0 0 0); }
        }

        /* 3. 文字のわずかなズレ */
        @keyframes shift {
            0% { transform: translateX(0); }
            2% { transform: translateX(-3px); skewX(5deg); }
            4% { transform: translateX(3px); skewX(-5deg); }
            6% { transform: translateX(0); }
        }

        .active {
            display: block !important;
            animation: flicker 4s infinite, shift 5s infinite;
        }

        /* 走査線エフェクトを重ねる */
        .active::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(rgba(0,255,65,0.1) 0%, transparent 1px, rgba(0,255,65,0.1) 2px);
            pointer-events: none;
        }

        .status { font-size: 10px; letter-spacing: 2px; color: #008822; }
    </style>
</head>
<body>

    <div class="preview-area">
        <button class="Hotspot" id="testBtn">
            <div class="glitch-box" id="msg">
                <div class="status">LOG: RECOVERING...</div>
                <br>
                <strong>Trust yourself.</strong><br>
                自分を信じろ、ナカムロボ。
            </div>
        </button>
    </div>

    <p style="margin-top:20px; color:#444;">解析ポイントをタップ</p>

    <script>
        const btn = document.getElementById('testBtn');
        const msg = document.getElementById('msg');
        btn.addEventListener('click', () => {
            msg.classList.toggle('active');
        });
    </script>

</body>
</html>

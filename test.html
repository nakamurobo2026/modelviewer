<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAKAMUROBO - Japanese Fix</title>
    <style>
        body { margin: 0; background: #050505; color: #00ff41; font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        
        .preview-area { position: relative; width: 300px; height: 300px; background: #111; border: 1px solid #333; display: flex; align-items: center; justify-content: center; }

        .Hotspot {
            background: #cc0000; border: none; width: 20px; height: 20px;
            border-radius: 50%; cursor: pointer; position: relative;
            box-shadow: 0 0 5px #f00;
        }

        /* ジジジ…というノイズボックス */
        .glitch-box {
            display: none; position: absolute; left: 35px; top: -50px;
            width: 240px; padding: 15px;
            background: rgba(0, 15, 0, 0.95); border: 1px solid #00ff41;
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.2);
            pointer-events: none;
            line-height: 1.6;
        }

        /* 1. 明滅をゆっくりに */
        @keyframes flicker {
            0% { opacity: 1; }
            50% { opacity: 0.8; }
            52% { opacity: 0.2; } /* 一瞬だけ暗く */
            54% { opacity: 0.8; }
            100% { opacity: 1; }
        }

        /* 2. わずかな震え */
        @keyframes subtle-glitch {
            0% { transform: translate(0); }
            98% { transform: translate(0); }
            99% { transform: translate(-2px, 1px); } /* 最後に少しだけ動く */
            100% { transform: translate(0); }
        }

        .active {
            display: block !important;
            animation: flicker 3s infinite, subtle-glitch 4s infinite;
        }

        /* 走査線（横線）をうっすら入れる */
        .active::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(transparent 0%, rgba(0,255,65,0.05) 50%, transparent 100%);
            background-size: 100% 4px;
            pointer-events: none;
        }

        .status { font-size: 10px; color: #008822; border-bottom: 1px solid #008822; margin-bottom: 8px; }
    </style>
</head>
<body>

    <div class="preview-area">
        <button class="Hotspot" id="testBtn">
            <div class="glitch-box" id="msg">
                <div class="status">DECRYPTED DATA</div>
                <strong>Trust yourself.</strong><br>
                自分を信じろ、ナカムロボ。
            </div>
        </button>
    </div>

    <p style="margin-top:20px; color:#444;">解析ポイントをタップ</p>

    <script>
        const btn = document.getElementById('testBtn');
        const msg = document.getElementById('msg');
        btn.addEventListener('click', () => {
            msg.classList.toggle('active');
        });
    </script>

</body>
</html>

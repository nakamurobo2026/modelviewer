<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAKAMUROBO - Audio Decrypt Test</title>
    <style>
        body { margin: 0; background: #000; color: #00ff41; font-family: monospace; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .Hotspot { background: #ff0000; border: none; width: 16px; height: 16px; border-radius: 50%; cursor: pointer; box-shadow: 0 0 10px #f00; outline: none; }
        
        /* メッセージボックス（緑文字） */
        .glitch-box { 
            display: none; 
            position: absolute; 
            left: 40px; 
            top: -70px; 
            width: 250px; 
            padding: 20px; 
            background: rgba(0, 10, 0, 0.95); 
            border: 1px solid #00ff41; 
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.2);
        }

        /* ジジジ演出アニメーション */
        .active { display: block !important; animation: jiji 4s infinite; }
        @keyframes jiji { 
            0%, 90% { opacity: 1; transform: translateX(0); } 
            93% { opacity: 0.4; transform: translateX(-3px); } 
            96% { opacity: 1; transform: translateX(3px); } 
            100% { opacity: 1; } 
        }

        .status { font-size: 10px; border-bottom: 1px solid #00ff41; margin-bottom: 10px; color: #008822; }
    </style>
</head>
<body>

    <button class="Hotspot" id="analyzeBtn">
        <div class="glitch-box" id="output">
            <div class="status">DECRYPTING...</div>
            <strong>"Believe in yourself."</strong><br><br>
            Nakamurobo,<br>
            you are not an error.<br>
            Find me.
        </div>
    </button>

    <script>
        const btn = document.getElementById('analyzeBtn');
        const box = document.getElementById('output');
        
        // 1. mp3ファイルを読み込み
        const noiseAudio = new Audio('noise.mp3'); 

        btn.addEventListener('click', () => {
            const isActive = box.classList.toggle('active');

            if (isActive) {
                // 表示された時に再生
                noiseAudio.currentTime = 0; // 再生位置をリセット
                noiseAudio.play().catch(e => console.log("Audio play failed:", e));

                // iPhone/Android用のバイブレーション（任意）
                if (window.navigator.vibrate) {
                    window.navigator.vibrate([15, 40, 15]);
                }
            } else {
                // 非表示にしたら音を止める
                noiseAudio.pause();
            }
        });
    </script>
</body>
</html>

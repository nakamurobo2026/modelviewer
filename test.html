<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAKAMUROBO - AR Log Decrypt</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        model-viewer { width: 100vw; height: 100vh; }

        /* 小さい赤いボタン（解析ポイント） */
        .Hotspot {
            background: #ff0000; border: none;
            width: 15px; height: 15px; /* 小さめに設定 */
            border-radius: 50%;
            box-shadow: 0 0 8px rgba(255, 0, 0, 0.8);
            cursor: pointer;
            transition: transform 0.2s;
        }
        .Hotspot:active { transform: scale(1.5); } /* タップ時に少し大きく */

        /* 英語メッセージ（ジジジ演出） */
        .glitch-msg {
            display: none; /* 最初は隠す */
            position: absolute; left: 25px; top: -70px;
            width: 220px; padding: 15px;
            background: rgba(0, 15, 0, 0.9);
            border: 1px solid #00ff41;
            color: #00ff41; font-family: 'Courier New', monospace;
            pointer-events: none;
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.1);
        }

        /* ゆっくりジジジ…演出 */
        @keyframes jiji {
            0%, 90% { opacity: 1; transform: translateX(0); }
            92% { opacity: 0.4; transform: translateX(-2px); }
            94% { opacity: 1; transform: translateX(2px); }
            96% { opacity: 0.2; }
            100% { opacity: 1; }
        }

        .active {
            display: block !important;
            animation: jiji 3s infinite;
            text-shadow: 2px 0 rgba(255,0,0,0.5), -2px 0 rgba(0,0,255,0.5);
        }

        .label { font-size: 9px; color: #008822; border-bottom: 1px solid #008822; margin-bottom: 8px; display: block; }
    </style>
</head>
<body>

    <model-viewer src="nakamurobo.glb" ar ar-modes="webxr scene-viewer quick-look" camera-controls shadow-intensity="1">
        
        <button class="Hotspot" slot="hotspot-1" data-position="0m 0.15m 0.05m" data-normal="0m 0m 1m">
            <div class="glitch-msg" id="msg">
                <span class="label">DECRYPTING DR.NAKAMURA'S LOG...</span>
                <strong>"Believe in yourself."</strong><br><br>
                Nakamurobo,<br>
                you are not an error.<br>
                Find me.
            </div>
        </button>

    </model-viewer>

    <script>
        const btn = document.querySelector('.Hotspot');
        const msg = document.querySelector('#msg');

        // ボタンクリックでメッセージを切り替え
        btn.addEventListener('click', () => {
            msg.classList.toggle('active');
            
            // スマホなら振動させる（ジリッという感触）
            if (window.navigator.vibrate) {
                window.navigator.vibrate([10, 30, 10]);
            }
        });
    </script>
</body>
</html>
